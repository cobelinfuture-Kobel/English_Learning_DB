<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>A1 Subject Pronouns · P03 Review</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
<main class="shell">
  <header>
    <p class="eyebrow">R7-M105P05 · Targeted review</p>
    <h1 id="unit-title">Loading P03 review…</h1>
    <p id="unit-meta">Canonical subject-pronouns item is loading.</p>
  </header>
  <section class="panel session" aria-labelledby="session-title">
    <h2 id="session-title">Session</h2>
    <div class="grid">
      <label>匿名 learner ref<input id="learner-ref" value="learner-local-01" autocomplete="off"></label>
      <label>Operator ref<input id="operator-ref" value="operator-local-01" autocomplete="off"></label>
      <label>Session ID<input id="session-id" autocomplete="off"></label>
    </div>
  </section>
  <form id="review-form" novalidate>
    <section id="items"></section>
    <section class="actions panel">
      <p id="status" role="status">正在載入 P03。</p>
      <button type="button" id="download" disabled>Validate and download JSON</button>
      <button type="button" id="clear" class="secondary">Clear local answer</button>
    </section>
  </form>
</main>
<script src="./app.js" defer></script>
</body>
</html>
