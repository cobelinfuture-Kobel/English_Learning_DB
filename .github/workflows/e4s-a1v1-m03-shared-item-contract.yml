name: E4S A1V1 M03 Shared Item Contract

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/schemas/items/a1_a1plus_shared_item.schema.json"
      - "ulga/builders/build_a1_a1plus_shared_item_contract.py"
      - "ulga/validators/validate_a1_a1plus_shared_item_contract.py"
      - "ulga/builders/build_a1_a1plus_cross_skill_learning_units.py"
      - "tests/ulga/test_e4s_a1v1_m03_shared_item_contract.py"
      - ".github/workflows/e4s-a1v1-m03-shared-item-contract.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Build 384 shared four-skill items
        run: |
          python ulga/builders/build_a1_a1plus_shared_item_contract.py \
            --output /tmp/e4s_a1v1_shared_item_contract.json
      - name: Validate shared item/answer/scoring/media contract
        run: python ulga/validators/validate_a1_a1plus_shared_item_contract.py
      - name: Run M03 focused tests
        run: python -m pytest tests/ulga/test_e4s_a1v1_m03_shared_item_contract.py -q
      - name: Re-run load-bearing M02 and skill-source regressions
        shell: bash
        run: |
          mapfile -t regression_tests < <(
            find tests/ulga -type f -name '*.py' | sort | \
            grep -E '(e4s_a1v1_m02|text_mode_private_pilot_package|listening_integration|speaking_integration)' || true
          )
          printf 'Resolved regression tests:\n%s\n' "${regression_tests[*]}"
          if [ "${#regression_tests[@]}" -lt 3 ]; then
            echo 'Insufficient load-bearing M02/text/listening/speaking regression coverage.' >&2
            exit 1
          fi
          python -m pytest "${regression_tests[@]}" -q
      - name: Verify generated artifact boundaries
        run: |
          python - <<'PY'
          import json

          artifact = json.load(open('/tmp/e4s_a1v1_shared_item_contract.json', encoding='utf-8'))
          summary = artifact['coverage_summary']
          assert summary['learning_unit_count'] == 24
          assert summary['canonical_egp_row_count'] == 109
          assert summary['direct_canonical_unit_count'] == 23
          assert summary['rowless_structural_unit_count'] == 1
          assert summary['shared_item_count'] == 384
          assert summary['items_per_unit'] == 16
          assert summary['skill_item_counts'] == {
              'reading': 96,
              'writing': 96,
              'listening': 96,
              'speaking': 96,
          }
          assert summary['skill_practice_counts'] == {
              'reading': 72,
              'writing': 72,
              'listening': 72,
              'speaking': 72,
          }
          assert summary['skill_assessment_counts'] == {
              'reading': 24,
              'writing': 24,
              'listening': 24,
              'speaking': 24,
          }
          assert summary['rendered_listening_audio_count'] == 0
          assert summary['captured_speaking_audio_count'] == 0
          assert summary['collected_speaking_transcript_count'] == 0
          boundaries = artifact['claim_boundaries']
          assert boundaries['m03_shared_item_contract_complete'] is True
          assert boundaries['answer_scoring_contract_complete'] is True
          assert boundaries['media_contract_complete'] is True
          assert boundaries['reading_v1_complete'] is False
          assert boundaries['writing_v1_complete'] is False
          assert boundaries['listening_audio_assets_complete'] is False
          assert boundaries['speaking_capture_complete'] is False
          assert boundaries['learner_mastery_claimed'] is False
          assert boundaries['retention_confirmed'] is False
          assert boundaries['a2_a2plus_in_scope'] is False
          assert artifact['stop_reason'] == 'NONE'
          assert artifact['next_short_step'] == 'E4S-A1V1-M04_ReadingV1CompletionAndIntegration'
          PY
