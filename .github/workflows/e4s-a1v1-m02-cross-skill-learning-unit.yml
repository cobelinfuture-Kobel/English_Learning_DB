name: E4S A1V1 M02 Cross-Skill LearningUnit

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/schemas/learning_units/a1_a1plus_cross_skill_learning_unit.schema.json"
      - "ulga/builders/build_a1_a1plus_cross_skill_learning_units.py"
      - "ulga/validators/validate_a1_a1plus_cross_skill_learning_units.py"
      - "ulga/query/a1_a1plus_authority_scope_query.py"
      - "tests/ulga/test_e4s_a1v1_m02_cross_skill_learning_units.py"
      - ".github/workflows/e4s-a1v1-m02-cross-skill-learning-unit.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Build 24 cross-skill LearningUnits
        run: |
          python ulga/builders/build_a1_a1plus_cross_skill_learning_units.py \
            --output /tmp/e4s_a1v1_cross_skill_learning_units.json
      - name: Validate LearningUnit contract
        id: validator
        continue-on-error: true
        run: |
          python ulga/validators/validate_a1_a1plus_cross_skill_learning_units.py \
            > /tmp/m02-validator.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: m02-validator-diagnostics
          path: /tmp/m02-validator.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce validator result
        if: steps.validator.outcome != 'success'
        run: |
          cat /tmp/m02-validator.log
          exit 1
      - name: Run M02 focused tests
        run: python -m pytest tests/ulga/test_e4s_a1v1_m02_cross_skill_learning_units.py -q
      - name: Re-run load-bearing source regressions
        shell: bash
        run: |
          mapfile -t regression_tests < <(
            find tests/ulga -type f -name '*.py' | sort | \
            grep -E '(cross_skill_closure|text_mode_private_pilot_package|e4s_a1v1_m01)' || true
          )
          printf 'Resolved regression tests:\n%s\n' "${regression_tests[*]}"
          if [ "${#regression_tests[@]}" -lt 2 ]; then
            echo 'Insufficient load-bearing M01/package/cross-skill regression coverage.' >&2
            exit 1
          fi
          python -m pytest "${regression_tests[@]}" -q
      - name: Verify generated artifact boundaries
        run: |
          python - <<'PY'
          import json

          artifact = json.load(open('/tmp/e4s_a1v1_cross_skill_learning_units.json', encoding='utf-8'))
          assert artifact['coverage_summary']['learning_unit_count'] == 24
          assert artifact['coverage_summary']['canonical_egp_row_count'] == 109
          assert artifact['coverage_summary']['candidate_four_skill_path_complete_unit_count'] == 24
          assert artifact['coverage_summary']['pending_content_authority_binding_unit_count'] == 24
          assert artifact['claim_boundaries']['m02_learning_unit_contract_complete'] is True
          assert artifact['claim_boundaries']['per_unit_content_authority_selection_complete'] is False
          assert artifact['claim_boundaries']['shared_item_contract_complete'] is False
          assert artifact['claim_boundaries']['learner_mastery_claimed'] is False
          assert artifact['claim_boundaries']['retention_confirmed'] is False
          assert artifact['claim_boundaries']['a2_a2plus_in_scope'] is False
          assert artifact['stop_reason'] == 'NONE'
          assert artifact['next_short_step'] == 'E4S-A1V1-M03_SharedItemAnswerScoringMediaContract'
          PY
