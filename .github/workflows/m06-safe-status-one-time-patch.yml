name: M06 Safe Status One-Time Patch

on:
  push:
    branches:
      - agent/e4s-a1v1-m06-speaking-evidence-export-fullfix
    paths:
      - ".github/workflows/m06-safe-status-one-time-patch.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/e4s-a1v1-m06-speaking-evidence-export-fullfix
          fetch-depth: 0
      - name: Patch safe capture status accounting and remove patch workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("ulga/builders/build_e4s_a1v1_speaking_v1.py")
          text = path.read_text(encoding="utf-8")
          old = '        "capture_status_distribution": dict(sorted(capture_statuses.items())),\n'
          new = '''        "capture_status_distribution": dict(sorted(\n            (\n                "AWAITING_HUMAN_REVIEW_INPUT"\n                if key == "AWAITING_MANUAL_TRANSCRIPT"\n                else key,\n                value,\n            )\n            for key, value in capture_statuses.items()\n        )),\n'''
          if text.count(old) != 1:
              raise SystemExit(f"expected_exact_patch_target_once:found={text.count(old)}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          git rm .github/workflows/m06-safe-status-one-time-patch.yml
      - name: Commit atomic FullFix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ulga/builders/build_e4s_a1v1_speaking_v1.py
          git diff --cached --check
          git commit -m "Fix M06 safe capture status accounting"
          git push origin HEAD:agent/e4s-a1v1-m06-speaking-evidence-export-fullfix
