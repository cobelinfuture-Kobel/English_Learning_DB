name: A1FS V1 Answerability Localization Fix

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-answerability-localization-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  localization-fix:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-stimulus-answerability-fullfix
          fetch-depth: 0
      - name: Make render manifest locale neutral
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path("ulga/builders/build_a1fs_v1_shared_learner_stimulus_contract_renderer.py")
          text = path.read_text(encoding="utf-8")

          old_labels = '''    labels = {
                  "TEXT": "情境／文本", "DIALOGUE": "對話", "IMAGE": "圖片", "AUDIO": "音訊",
                  "TABLE": "表格", "OPTIONS": "選項", "TOKENS": "提供的單字",
                  "MORPHEMES": "提供的字素", "WORD_BANK": "字詞庫", "GAP_DISPLAY": "填空句型",
              }
          '''.replace("          ", "")
          if text.count(old_labels) != 1:
              raise SystemExit(f"render label block drift:{text.count(old_labels)}")
          text = text.replace(old_labels, "", 1)

          old_label_field = '            "label": labels[row["kind"]],\n'
          if text.count(old_label_field) != 1:
              raise SystemExit(f"manifest label field drift:{text.count(old_label_field)}")
          text = text.replace(old_label_field, "", 1)

          old_js = '''JS_RENDERER = r"""
              function renderA1FSStimulus(container, learnerContract){
                const manifest=Array.isArray(learnerContract.stimulus_render_manifest)?learnerContract.stimulus_render_manifest:[];
          '''.replace("          ", "")
          new_js = '''JS_RENDERER = r"""
              const A1FS_STIMULUS_FIELDS=['gap_display_tokens','supplied_tokens','supplied_morphemes','word_bank','options'];
              const A1FS_STIMULUS_LABELS={TEXT:'情境／資料',DIALOGUE:'對話',IMAGE:'圖片',AUDIO:'音訊',TABLE:'表格',OPTIONS:'選項',TOKENS:'提供的單字',MORPHEMES:'提供的字素',WORD_BANK:'字詞庫',GAP_DISPLAY:'填空句型'};
              function renderA1FSStimulus(container, learnerContract){
                const manifest=Array.isArray(learnerContract.stimulus_render_manifest)?learnerContract.stimulus_render_manifest:[];
          '''.replace("          ", "")
          if text.count(old_js) != 1:
              raise SystemExit(f"shared renderer prefix drift:{text.count(old_js)}")
          text = text.replace(old_js, new_js, 1)

          old_title = "    const title=document.createElement('strong');title.textContent=String(block.label||block.kind||'資料');section.appendChild(title);\n"
          new_title = "    const title=document.createElement('strong');title.textContent=String(A1FS_STIMULUS_LABELS[block.kind]||block.kind||'資料');section.appendChild(title);\n"
          if text.count(old_title) != 1:
              raise SystemExit(f"shared renderer title drift:{text.count(old_title)}")
          text = text.replace(old_title, new_title, 1)

          path.write_text(text, encoding="utf-8")
          '@ | python -
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "git diff --check failed" }
      - name: Commit locale-neutral manifest fix
        shell: pwsh
        run: |
          $path = "ulga/builders/build_a1fs_v1_shared_learner_stimulus_contract_renderer.py"
          if (-not (git status --porcelain -- $path)) { throw "Expected localization change missing" }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $path
          git commit -m "Keep stimulus manifest locale neutral"
          if ($LASTEXITCODE -ne 0) { throw "git commit failed" }
          git push origin HEAD:fix/a1fs-v1-r5-stimulus-answerability-fullfix
          if ($LASTEXITCODE -ne 0) { throw "git push failed" }
