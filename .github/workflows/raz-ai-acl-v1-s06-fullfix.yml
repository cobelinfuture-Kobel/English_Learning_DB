name: RAZ AI ACL V1 S06 Integrated Consumer FullFix

on:
  pull_request:
    paths:
      - "ulga/builders/build_raz_ai_acl_v1_s06_final_closeout.py"
      - "tests/ulga/test_raz_ai_acl_v1_s06_final_closeout.py"
      - ".github/workflows/raz-ai-acl-v1-s06-fullfix.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_raz_ai_acl_v1_s06_final_closeout.py"
      - "tests/ulga/test_raz_ai_acl_v1_s06_final_closeout.py"
      - ".github/workflows/raz-ai-acl-v1-s06-fullfix.yml"

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"

jobs:
  s06-integrated-consumer-fullfix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest
      - name: Compile S06 builder
        run: python -m py_compile ulga/builders/build_raz_ai_acl_v1_s06_final_closeout.py
      - name: Run S06 focused regressions
        id: focused
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=short \
            tests/ulga/test_raz_ai_acl_v1_s06_final_closeout.py \
            > /tmp/s06-focused-pytest.log 2>&1
          status=$?
          cat /tmp/s06-focused-pytest.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload focused regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s06-focused-pytest-log
          path: /tmp/s06-focused-pytest.log
      - name: Enforce focused regression result
        if: always()
        run: test "${{ steps.focused.outputs.status }}" = "0"
