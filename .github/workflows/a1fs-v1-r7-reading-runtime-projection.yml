name: A1FS V1 R7 Reading Runtime Projection

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/build_a1fs_v1_r7_planner_redeploy_reading_stimulus_runtime_projection_fullfix.py"
      - "ulga/validators/validate_a1fs_v1_r7_planner_redeploy_reading_stimulus_runtime_projection_fullfix.py"
      - "tests/ulga/test_a1fs_v1_r7_planner_redeploy_reading_stimulus_runtime_projection_fullfix.py"
      - "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "ulga/builders/build_a1fs_v1_r7_route_batch_execution_and_replay_closure.py"
      - "ulga/builders/build_a1fs_v1_shared_learner_stimulus_contract_renderer.py"
      - ".github/workflows/a1fs-v1-r7-reading-runtime-projection.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reading-runtime-projection:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install focused dependencies
        run: python -m pip install pytest jsonschema openpyxl

      - name: Compile runtime projection implementation
        run: |
          python -m py_compile \
            ulga/builders/build_a1fs_v1_r7_planner_redeploy_reading_stimulus_runtime_projection_fullfix.py \
            ulga/validators/validate_a1fs_v1_r7_planner_redeploy_reading_stimulus_runtime_projection_fullfix.py

      - name: Run Reading runtime projection regressions
        run: |
          python -m pytest -q --tb=short \
            tests/ulga/test_a1fs_v1_r7_planner_redeploy_reading_stimulus_runtime_projection_fullfix.py \
            tests/ulga/test_a1fs_v1_shared_learner_stimulus_contract_renderer.py \
            tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r7_route_batch_execution_and_replay_closure.py

      - name: Enforce canonical content governance
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="main"
          fi
          python ulga/validators/validate_a1fs_v1_canonical_content_production_policy.py \
            --changed-from "$BASE"
          python -m pytest -q \
            tests/ulga/test_a1fs_v1_canonical_content_production_policy.py \
            tests/ulga/test_a1fs_v1_policy_bound_content_artifact.py

      - name: Verify private outputs remain ignored and worktree clean
        run: |
          git check-ignore -q .local/a1fs_v1/private-output.json
          test -z "$(git status --porcelain)"
