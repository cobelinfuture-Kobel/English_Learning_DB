name: E4S A1V1 M11 Candidate Content Review

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m11-candidate-content-review-promotion
    paths:
      - "ulga/schemas/e4s_a1v1_candidate_unit_*.schema.json"
      - "ulga/schemas/e4s_a1v1_reviewed_private_learning_unit_bank.schema.json"
      - "ulga/builders/build_e4s_a1v1_m11_candidate_content_review.py"
      - "ulga/validators/validate_e4s_a1v1_m11_candidate_content_review.py"
      - "ulga/query/e4s_a1v1_candidate_unit_review_consumer.py"
      - "tests/ulga/test_e4s_a1v1_m11_candidate_content_review.py"
      - "ulga/reports/e4s_a1v1_m11_candidate_content_review_closeout.json"
      - ".github/workflows/e4s-a1v1-m11-candidate-content-review.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  candidate-content-review-engine:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M11 review contracts
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_e4s_a1v1_m11_candidate_content_review.py
      - name: Validate M10 and candidate-source non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m10_coverage_recheck.py
          tests/ulga/test_a1_grammar_full_teachable_candidate_coverage.py
      - name: Prepare real 24-unit private review queue
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m11_candidate_content_review.py `
            prepare-review `
            --output-root ".local/e4s_a1v1/content_review/m11_ci"
      - name: Independently validate zero-decision state
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m11_candidate_content_review.py `
            --output-root ".local/e4s_a1v1/content_review/m11_ci" `
            --validation-report ".local/e4s_a1v1/content_review/m11_ci/candidate_unit_review_validation.json"
      - name: Verify safe summary query
        shell: pwsh
        run: |
          python ulga/query/e4s_a1v1_candidate_unit_review_consumer.py `
            --output-root ".local/e4s_a1v1/content_review/m11_ci" summary
      - name: Enforce zero-decision accounting and boundaries
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/content_review/m11_ci')
          report = json.loads((root / 'candidate_unit_review_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'candidate_unit_review_validation.json').read_text(encoding='utf-8'))
          assert report['candidate_unit_count'] == 24
          assert report['canonical_egp_row_count'] == 109
          assert report['decision_counts']['PENDING'] == 24
          assert report['reviewed_unit_count'] == 0
          assert report['reviewed_row_count'] == 0
          assert report['precheck_distribution']['PASS'] == 24
          assert report['precheck_distribution']['BLOCK'] == 0
          assert report['validation_status'] == 'PASS_PENDING_OPERATOR_REVIEW'
          assert report['stop_reason'] == 'OPERATOR_CONTENT_REVIEW_DECISIONS_REQUIRED'
          assert validation['error_count'] == 0
          assert validation['canonical_authority_promotion'] is False
          assert validation['learner_mastery_claimed'] is False
          assert validation['audio_or_recording_processed'] is False
          '@ | python -
      - name: Verify private queue and bank remain ignored
        shell: pwsh
        run: |
          git check-ignore .local/e4s_a1v1/content_review/m11_ci/candidate_unit_review_queue.private.json
          git check-ignore .local/e4s_a1v1/content_review/m11_ci/candidate_unit_operator_decisions.template.json
          git check-ignore .local/e4s_a1v1/content_review/m11_ci/reviewed_private_learning_unit_bank.json
          if (git status --porcelain | Select-String '^.. \.local/') {
            throw 'M11 private review output escaped ignore policy.'
          }
      - name: Verify no audio or recording artifacts
        shell: pwsh
        run: |
          $forbidden = Get-ChildItem ".local/e4s_a1v1/content_review/m11_ci" -Recurse -File |
            Where-Object { $_.Extension.ToLowerInvariant() -in @('.wav','.webm','.ogg','.m4a','.mp3') }
          if ($forbidden) {
            throw 'M11 produced prohibited audio or recording artifacts.'
          }
      - name: Build metadata-only M11 engine closeout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m11 | Out-Null
          @'
          import hashlib, json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/content_review/m11_ci')
          queue = json.loads((root / 'candidate_unit_review_queue.private.json').read_text(encoding='utf-8'))
          report = json.loads((root / 'candidate_unit_review_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'candidate_unit_review_validation.json').read_text(encoding='utf-8'))
          def digest(path):
              normalized_text = path.read_text(encoding='utf-8')
              return hashlib.sha256(normalized_text.encode('utf-8')).hexdigest()
          receipt = {
              'task_id': 'E4S-A1V1-M11_A1A1PlusCandidateContentReviewAndPrivatePromotion',
              'epic_id': 'E4S-A1V1_A1A1PlusCompleteFourSkillLearningSystem',
              'artifact_type': 'metadata_only_m11_candidate_review_engine_closeout',
              'schema_version': 'e4s.a1v1.m11_candidate_review_engine_closeout.v1',
              'scope': 'A1_A1_PLUS_ONLY',
              'validation_status': 'PASS_M11_CANDIDATE_REVIEW_AND_PRIVATE_PROMOTION_ENGINE_READY',
              'completion': {
                  'candidate_units': report['candidate_unit_count'],
                  'canonical_egp_rows': report['canonical_egp_row_count'],
                  'review_queue_entries': queue['review_entry_count'],
                  'pending_decisions': report['decision_counts']['PENDING'],
                  'reviewed_units': report['reviewed_unit_count'],
                  'reviewed_rows': report['reviewed_row_count'],
                  'precheck_pass': report['precheck_distribution']['PASS'],
                  'precheck_block': report['precheck_distribution']['BLOCK'],
                  'independent_validation_errors': validation['error_count'],
              },
              'artifact_hashes': {
                  'review_queue_sha256': digest(root / 'candidate_unit_review_queue.private.json'),
                  'decision_template_sha256': digest(root / 'candidate_unit_operator_decisions.template.json'),
                  'safe_report_sha256': digest(root / 'candidate_unit_review_safe_report.json'),
                  'validation_sha256': digest(root / 'candidate_unit_review_validation.json'),
              },
              'claim_boundaries': report['claim_boundaries'],
              'canonical_authority_promotion': False,
              'learner_mastery_claimed': False,
              'audio_or_recording_processed': False,
              'stop_reason': 'OPERATOR_CONTENT_REVIEW_DECISIONS_REQUIRED',
              'blocker_type': 'HUMAN_CANDIDATE_UNIT_CONTENT_REVIEW',
              'required_operator_action': 'Review the generated local 24-unit decision registry and record explicit decisions.',
              'last_completed_status': 'PASS_M11_CANDIDATE_REVIEW_AND_PRIVATE_PROMOTION_ENGINE_READY',
              'next_resume_task': 'E4S-A1V1-M11_A1A1PlusCandidateContentReviewAndPrivatePromotion',
          }
          Path('generated/m11/e4s_a1v1_m11_candidate_content_review_closeout.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          '@ | python -
      - name: Compare committed M11 closeout
        shell: pwsh
        run: |
          git diff --no-index --exit-code `
            "ulga/reports/e4s_a1v1_m11_candidate_content_review_closeout.json" `
            "generated/m11/e4s_a1v1_m11_candidate_content_review_closeout.json"
      - name: Upload metadata-only M11 closeout
        uses: actions/upload-artifact@v4
        with:
          name: m11-candidate-review-engine-closeout
          path: generated/m11
          if-no-files-found: error
          retention-days: 2
