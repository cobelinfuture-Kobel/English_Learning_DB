name: A1FS V1 Canonical Content Governance

on:
  push:
    branches: [main]
    paths:
      - "AGENTS.md"
      - "docs/governance/A1FS_V1_CANONICAL_CONTENT_PRODUCTION_GOVERNANCE.md"
      - "ulga/contracts/a1fs_v1_canonical_content_production_policy.json"
      - "ulga/builders/**"
      - "ulga/exporters/**"
      - "ulga/schemas/**"
      - "ulga/validators/**"
      - "tests/ulga/**"
      - "tools/validate_pr_workflow_fanout.py"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "AGENTS.md"
      - "docs/governance/A1FS_V1_CANONICAL_CONTENT_PRODUCTION_GOVERNANCE.md"
      - "ulga/contracts/a1fs_v1_canonical_content_production_policy.json"
      - "ulga/builders/**"
      - "ulga/exporters/**"
      - "ulga/schemas/**"
      - "ulga/validators/**"
      - "tests/ulga/**"
      - "tools/validate_pr_workflow_fanout.py"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-workflow-fanout-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run PR workflow fan-out policy
        id: fanout_policy
        continue-on-error: true
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [[ -n "$BASE" && "$BASE" != "0000000000000000000000000000000000000000" ]]; then
            python tools/validate_pr_workflow_fanout.py --changed-from "$BASE" --max-matching 3 > fanout-policy-report.json
          else
            python tools/validate_pr_workflow_fanout.py --max-matching 3 > fanout-policy-report.json
          fi
          status=$?
          cat fanout-policy-report.json
          exit $status
      - name: Upload fan-out policy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-workflow-fanout-policy-report
          path: fanout-policy-report.json
          if-no-files-found: error
      - name: Enforce fan-out policy result
        if: always()
        shell: bash
        run: test "${{ steps.fanout_policy.outcome }}" = "success"

  canonical-content-governance:
    needs: pr-workflow-fanout-policy
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install governance dependencies
        run: python -m pip install --upgrade pip pytest jsonschema openpyxl

      - name: Compile governance contracts
        run: |
          python -m py_compile \
            tools/validate_pr_workflow_fanout.py \
            tests/ulga/test_pr_workflow_fanout_policy.py \
            ulga/builders/build_a1fs_v1_policy_bound_content_artifact.py \
            ulga/builders/build_a1fs_v1_shared_item_policy_bound_candidate.py \
            ulga/validators/validate_a1fs_v1_canonical_content_production_policy.py \
            ulga/validators/validate_a1fs_v1_policy_bound_content_artifact.py \
            ulga/validators/validate_a1fs_v1_shared_item_policy_bound_candidate.py

      - name: Validate closed artifact schema is readable
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          schema_path = Path("ulga/schemas/a1fs_v1_policy_bound_content_artifact.schema.json")
          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          assert schema["additionalProperties"] is False
          assert "artifact_sha256" in schema["required"]
          PY

      - name: Validate committed governance contract and wiring
        id: canonical_policy
        continue-on-error: true
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          if [[ -n "$BASE" && "$BASE" != "0000000000000000000000000000000000000000" ]]; then
            python ulga/validators/validate_a1fs_v1_canonical_content_production_policy.py --changed-from "$BASE" > canonical-policy-report.txt 2>&1
          else
            python ulga/validators/validate_a1fs_v1_canonical_content_production_policy.py > canonical-policy-report.txt 2>&1
          fi
          status=$?
          cat canonical-policy-report.txt
          exit $status
      - name: Upload canonical policy report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-content-policy-report
          path: canonical-policy-report.txt
          if-no-files-found: error
      - name: Enforce canonical policy result
        if: always()
        shell: bash
        run: test "${{ steps.canonical_policy.outcome }}" = "success"

      - name: Run governance regressions
        run: |
          python -m pytest -q tests/ulga/test_pr_workflow_fanout_policy.py
          python -m pytest -q tests/ulga/test_a1fs_v1_canonical_content_production_policy.py
          python -m pytest -q tests/ulga/test_a1fs_v1_policy_bound_content_artifact.py
          python -m pytest -q tests/ulga/test_a1fs_v1_shared_item_policy_bound_candidate.py

      - name: Materialize and validate policy-bound candidate
        run: |
          python ulga/builders/build_a1fs_v1_shared_item_policy_bound_candidate.py \
            --output /tmp/e4s_a1v1_shared_item_contract.candidate.private.json
          python ulga/validators/validate_a1fs_v1_shared_item_policy_bound_candidate.py \
            /tmp/e4s_a1v1_shared_item_contract.candidate.private.json \
            --report /tmp/e4s_a1v1_shared_item_contract.candidate.validation.json

      - name: Verify no uncommitted outputs
        run: test -z "$(git status --porcelain)"
