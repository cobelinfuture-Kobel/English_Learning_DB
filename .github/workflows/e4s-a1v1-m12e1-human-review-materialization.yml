name: E4S A1V1 M12E1 Human Review Materialization

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m12e1-human-review-materialization
    paths:
      - "ulga/schemas/e4s_a1v1_m12e1_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_m12e1_human_review_decision_materialization.py"
      - "ulga/validators/validate_e4s_a1v1_m12e1_human_review_decision_materialization.py"
      - "tests/ulga/test_e4s_a1v1_m12e1_human_review_decision_materialization.py"
      - "ulga/reports/e4s_a1v1_m12e1_human_review_materialization_closeout.json"
      - ".github/workflows/e4s-a1v1-m12e1-human-review-materialization.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  human-review-materialization:
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M12E1 contracts
        shell: pwsh
        run: python -m pytest -q --tb=short tests/ulga/test_e4s_a1v1_m12e1_human_review_decision_materialization.py
      - name: Validate M12D and M12E non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m12d_representative_pilot_expansion.py
          tests/ulga/test_e4s_a1v1_m12e_representative_pilot_evidence_qa.py
      - name: Build TEST_FIXTURE M12 through M12E chain
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          from ulga.builders import build_e4s_a1v1_m12_real_learner_pilot_evidence_capture as m12
          from ulga.builders import build_e4s_a1v1_m12c_real_learner_pilot_evidence_qa as m12c
          from ulga.builders import build_e4s_a1v1_m12d_representative_pilot_expansion as m12d
          from ulga.builders import build_e4s_a1v1_m12e_representative_pilot_evidence_qa as m12e
          root = Path('.local/e4s_a1v1/pilot/m12e1_ci')
          input_root = root / 'm12'
          qa_root = root / 'm12c'
          representative_root = root / 'm12d'
          m12e_root = root / 'm12e'
          prepared = m12.prepare_capture(input_root)
          manifest = prepared['manifest']
          bank = json.loads((input_root / 'runtime/source_m08/text_mode_session_bank.private.json').read_text(encoding='utf-8'))
          allowed = set(manifest['selection']['selectable_item_ids'])
          def response_for(item):
              contract = item['private_scoring_contract']
              mode = contract['scoring_mode']
              if mode in {'EXACT_OPTION','NORMALIZED_TEXT'}:
                  return contract['accepted_texts'][0]
              if mode == 'EXACT_SEQUENCE':
                  return contract['accepted_sequence']
              return 'CI human-review fixture response.'
          prior_item = next(row for row in bank['items'] if row['item_id'] in allowed and row['private_scoring_contract']['scoring_mode'] != 'FEATURE_RUBRIC')
          prior = m12.m08.empty_attempt_registry(bank)
          prior['session_id'] = 'm12e1-ci-prior'
          prior['learner_ref'] = 'fixture-learner'
          prior['attempts'] = [{
              'item_id': prior_item['item_id'],
              'attempt_sequence': 1,
              'response': response_for(prior_item),
              'submitted_at': '2026-07-16T00:01:00.000Z',
              'operator_review': m12.m08._empty_review(),
          }]
          prior_path = root / 'prior.private.json'
          prior_path.write_text(json.dumps(prior, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          m12.import_evidence(input_root, prior_path, evidence_origin='TEST_FIXTURE')
          m12c.build_qa(input_root, qa_root, expected_origin='TEST_FIXTURE')
          prepared_batch = m12d.prepare_batch(input_root, qa_root, representative_root, expected_origin='TEST_FIXTURE')
          by_id = {row['item_id']: row for row in bank['items']}
          batch = m12.m08.empty_attempt_registry(bank)
          batch['session_id'] = 'm12e1-ci-batch'
          batch['learner_ref'] = prior['learner_ref']
          batch['attempts'] = [{
              'item_id': item_id,
              'attempt_sequence': index,
              'response': response_for(by_id[item_id]),
              'submitted_at': f'2026-07-16T00:{10 + index:02d}:00.000Z',
              'operator_review': m12.m08._empty_review(),
          } for index, item_id in enumerate(prepared_batch['manifest']['batch_selection']['item_ids'], start=1)]
          batch_path = root / 'batch.private.json'
          batch_path.write_text(json.dumps(batch, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          m12d.import_batch(input_root, qa_root, representative_root, batch_path, expected_origin='TEST_FIXTURE')
          report = m12e.build_qa(input_root, qa_root, representative_root, m12e_root, expected_origin='TEST_FIXTURE')
          assert report['evidence_summary']['pending_human_review_count'] > 0
          assert report['next_short_step'] == 'E4S-A1V1-M12E1_HumanReviewDecisionMaterialization'
          '@ | python -
      - name: Prepare and independently validate private review workbench
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m12e1_human_review_decision_materialization.py `
            prepare `
            --input-root ".local/e4s_a1v1/pilot/m12e1_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12e1_ci/m12c" `
            --representative-root ".local/e4s_a1v1/pilot/m12e1_ci/m12d" `
            --m12e-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e" `
            --output-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e1" `
            --expected-origin TEST_FIXTURE
          python ulga/validators/validate_e4s_a1v1_m12e1_human_review_decision_materialization.py `
            prepare `
            --input-root ".local/e4s_a1v1/pilot/m12e1_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12e1_ci/m12c" `
            --representative-root ".local/e4s_a1v1/pilot/m12e1_ci/m12d" `
            --m12e-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e" `
            --output-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e1" `
            --expected-origin TEST_FIXTURE `
            --validation-report ".local/e4s_a1v1/pilot/m12e1_ci/m12e1/prepare_validation.json"
          python ulga/builders/build_e4s_a1v1_m12e1_human_review_decision_materialization.py `
            serve `
            --output-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e1" `
            --dry-run
      - name: Materialize explicit TEST_FIXTURE approvals
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12e1_ci/m12e1')
          template = json.loads((root / 'human_review_decision_template.private.json').read_text(encoding='utf-8'))
          template['reviewer_id'] = 'fixture-reviewer'
          template['reviewed_at'] = '2026-07-16T02:00:00.000Z'
          for row in template['decisions']:
              row['decision'] = 'APPROVE'
              row['criteria'] = {
                  'grammar_target_match': True,
                  'meaning_matches_context': True,
                  'complete_response': True,
              }
              row['notes'] = 'CI fixture approval; not real learner review.'
          Path('.local/e4s_a1v1/pilot/m12e1_ci/decisions.private.json').write_text(
              json.dumps(template, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          '@ | python -
          python ulga/builders/build_e4s_a1v1_m12e1_human_review_decision_materialization.py `
            apply-decisions `
            --input-root ".local/e4s_a1v1/pilot/m12e1_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12e1_ci/m12c" `
            --representative-root ".local/e4s_a1v1/pilot/m12e1_ci/m12d" `
            --m12e-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e" `
            --output-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e1" `
            --decisions ".local/e4s_a1v1/pilot/m12e1_ci/decisions.private.json" `
            --expected-origin TEST_FIXTURE
          python ulga/validators/validate_e4s_a1v1_m12e1_human_review_decision_materialization.py `
            apply-decisions `
            --input-root ".local/e4s_a1v1/pilot/m12e1_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12e1_ci/m12c" `
            --representative-root ".local/e4s_a1v1/pilot/m12e1_ci/m12d" `
            --m12e-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e" `
            --output-root ".local/e4s_a1v1/pilot/m12e1_ci/m12e1" `
            --expected-origin TEST_FIXTURE `
            --validation-report ".local/e4s_a1v1/pilot/m12e1_ci/m12e1/apply_validation.json"
      - name: Verify review accounting and deterministic boundaries
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12e1_ci/m12e1')
          queue = json.loads((root / 'human_review_queue.private.json').read_text(encoding='utf-8'))
          report = json.loads((root / 'human_review_materialization_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'apply_validation.json').read_text(encoding='utf-8'))
          resolved = json.loads((root / 'resolved_m12e/representative_evidence_qa_safe_report.json').read_text(encoding='utf-8'))
          assert queue['pending_item_count'] > 0
          assert all(row['private_scoring_contract']['scoring_mode'] == 'FEATURE_RUBRIC' for row in queue['items'])
          assert report['materialized_decision_count'] == queue['pending_item_count']
          assert report['remaining_pending_count'] == 0
          assert report['outcome_counts']['HUMAN_APPROVE'] == queue['pending_item_count']
          assert report['validation_status'] == 'PASS_M12E1_HUMAN_REVIEW_DECISIONS_MATERIALIZED'
          assert resolved['evidence_summary']['pending_human_review_count'] == 0
          assert validation['error_count'] == 0
          assert validation['deterministic_outcomes_overridden'] is False
          assert validation['canonical_authority_write'] is False
          assert validation['a2_content_promoted'] is False
          assert validation['learner_mastery_claimed'] is False
          '@ | python -
      - name: Verify CI never claims real learner review
        shell: pwsh
        run: |
          $workflow = Get-Content ".github/workflows/e4s-a1v1-m12e1-human-review-materialization.yml" -Raw
          if ($workflow -match '(?m)^\s*--expected-origin\s+REAL_LEARNER\s*$') {
            throw 'M12E1 CI must not process fixture review as REAL_LEARNER.'
          }
      - name: Verify no prohibited artifacts or canonical writes
        shell: pwsh
        run: |
          $changed = git diff --name-only origin/main...HEAD
          $forbidden = $changed | Where-Object {
            $_ -match '^ulga/graph/' -or
            $_ -match '(?i)(design|planning|preview|review_packet|sync).*\.md$' -or
            $_.ToLowerInvariant().EndsWith('.wav') -or
            $_.ToLowerInvariant().EndsWith('.webm') -or
            $_.ToLowerInvariant().EndsWith('.mp3') -or
            $_.ToLowerInvariant().EndsWith('.pdf')
          }
          if ($forbidden) { throw "M12E1 touched prohibited files: $forbidden" }
      - name: Verify private outputs remain ignored
        shell: pwsh
        run: |
          git check-ignore .local/e4s_a1v1/pilot/m12e1_ci/m12e1/human_review_queue.private.json
          git check-ignore .local/e4s_a1v1/pilot/m12e1_ci/m12e1/resolved_representative/cumulative_attempt_registry.private.json
          if (git status --porcelain | Select-String '^.. \.local/') {
            throw 'M12E1 local outputs escaped ignore policy.'
          }
      - name: Build metadata-only M12E1 closeout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m12e1 | Out-Null
          @'
          import hashlib, json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12e1_ci/m12e1')
          report_path = root / 'human_review_materialization_safe_report.json'
          validation_path = root / 'apply_validation.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          validation = json.loads(validation_path.read_text(encoding='utf-8'))
          def digest(path): return hashlib.sha256(path.read_text(encoding='utf-8').encode('utf-8')).hexdigest()
          receipt = {
              'task_id': 'E4S-A1V1-M12E1_HumanReviewDecisionMaterialization',
              'artifact_type': 'metadata_only_m12e1_human_review_materialization_closeout',
              'schema_version': 'e4s.a1v1.m12e1.human_review_materialization_closeout.v1',
              'scope': 'A1_A1_PLUS_PRIVATE_CHILD_PATH_ONLY',
              'fixture_validation_status': report['validation_status'],
              'fixture_source_pending_count': report['source_pending_count'],
              'fixture_materialized_decision_count': report['materialized_decision_count'],
              'fixture_remaining_pending_count': report['remaining_pending_count'],
              'fixture_outcome_counts': report['outcome_counts'],
              'resolved_m12e': report['resolved_m12e'],
              'independent_validation_errors': validation['error_count'],
              'artifact_hashes': {
                  'fixture_materialization_report_sha256': digest(report_path),
                  'fixture_materialization_validation_sha256': digest(validation_path),
              },
              'claim_boundaries': report['claim_boundaries'],
              'real_learner_review_in_ci': False,
              'learner_mastery_claimed': False,
              'retention_confirmed': False,
              'stop_reason': 'HUMAN_REVIEW_DECISIONS_REQUIRED',
              'last_completed_status': 'PASS_M12E1_HUMAN_REVIEW_PIPELINE_READY',
              'next_short_step': 'E4S-A1V1-M12E1_HumanReviewDecisionMaterialization',
          }
          Path('generated/m12e1/e4s_a1v1_m12e1_human_review_materialization_closeout.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          '@ | python -
      - name: Compare committed M12E1 closeout
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          committed = json.loads(Path('ulga/reports/e4s_a1v1_m12e1_human_review_materialization_closeout.json').read_text(encoding='utf-8'))
          generated = json.loads(Path('generated/m12e1/e4s_a1v1_m12e1_human_review_materialization_closeout.json').read_text(encoding='utf-8'))
          assert committed == generated, 'committed M12E1 closeout drift'
          '@ | python -
      - name: Upload metadata-only M12E1 closeout
        uses: actions/upload-artifact@v4
        with:
          name: m12e1-human-review-materialization-closeout
          path: generated/m12e1
          if-no-files-found: error
          retention-days: 2
