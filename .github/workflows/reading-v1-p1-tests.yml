name: ReadingV1 P1 Tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archived-focused-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run archived ReadingV1 P1 regressions
        run: |
          python -m unittest \
            tests.ulga.test_reading_v1_practice_bank \
            tests.ulga.test_reading_v1_private_homework_overlay \
            tests.ulga.test_reading_v1_private_homework_output_gate \
            tests.ulga.test_reading_v1_private_page_export
