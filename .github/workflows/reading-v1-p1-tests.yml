name: ReadingV1 P1 Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ulga/**"
      - "tests/ulga/**"
      - "docs/ulga/READING_V1_**"
      - ".github/workflows/reading-v1-p1-tests.yml"
  pull_request:
    paths:
      - "ulga/**"
      - "tests/ulga/**"
      - "docs/ulga/READING_V1_**"
      - ".github/workflows/reading-v1-p1-tests.yml"

permissions:
  contents: read
  statuses: write

jobs:
  reading-v1-p1:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ReadingV1 P1 unittest modules
        run: |
          python -m unittest \
            tests.ulga.test_reading_v1_practice_bank \
            tests.ulga.test_reading_v1_private_homework_overlay \
            tests.ulga.test_reading_v1_private_homework_output_gate \
            tests.ulga.test_reading_v1_private_page_export

      - name: Publish commit status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          DESCRIPTION: ${{ job.status == 'success' && 'ReadingV1 P1 Tests passed' || 'ReadingV1 P1 Tests failed' }}
          TARGET_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request

          payload = {
              "state": os.environ["STATE"],
              "target_url": os.environ["TARGET_URL"],
              "description": os.environ["DESCRIPTION"][:140],
              "context": "ReadingV1 P1 Tests",
          }
          request = urllib.request.Request(
              "https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }}",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": "Bearer " + os.environ["GITHUB_TOKEN"],
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="POST",
          )
          with urllib.request.urlopen(request) as response:
              print("COMMIT_STATUS_REPORTER_STATUS=PASS")
              print("COMMIT_STATUS_REPORTER_HTTP_STATUS=" + str(response.status))
          PY
