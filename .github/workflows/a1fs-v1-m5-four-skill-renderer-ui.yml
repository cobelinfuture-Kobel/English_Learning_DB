name: A1FS V1 M5 Four-Skill Renderer and Learner UI

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_m5_four_skill_renderer_learner_ui.py"
      - "ulga/validators/validate_a1fs_v1_m5_four_skill_renderer_learner_ui.py"
      - "ulga/schemas/a1fs_v1_m5_learner_lesson_bundle.schema.json"
      - "tests/ulga/test_a1fs_v1_m5_four_skill_renderer_learner_ui.py"
      - ".github/workflows/a1fs-v1-m5-four-skill-renderer-ui.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: python -m compileall -q ulga/builders/build_a1fs_v1_m5_four_skill_renderer_learner_ui.py ulga/validators/validate_a1fs_v1_m5_four_skill_renderer_learner_ui.py
      - name: Validate schema
        run: >-
          python -c "import json; from pathlib import Path; from jsonschema.validators import validator_for;
          schema=json.loads(Path('ulga/schemas/a1fs_v1_m5_learner_lesson_bundle.schema.json').read_text());
          validator_for(schema).check_schema(schema)"
      - run: python -m pytest -q tests/ulga/test_a1fs_v1_m5_four_skill_renderer_learner_ui.py
