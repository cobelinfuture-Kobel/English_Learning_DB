name: E4S A1V1 M12C Real Evidence QA Iteration

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m12c-real-evidence-qa-iteration
    paths:
      - "ulga/schemas/e4s_a1v1_m12c_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_m12c_real_learner_pilot_evidence_qa.py"
      - "ulga/validators/validate_e4s_a1v1_m12c_real_learner_pilot_evidence_qa.py"
      - "tests/ulga/test_e4s_a1v1_m12c_real_learner_pilot_evidence_qa.py"
      - "ulga/reports/e4s_a1v1_m12c_real_evidence_qa_pipeline_closeout.json"
      - ".github/workflows/e4s-a1v1-m12c-real-evidence-qa-iteration.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-evidence-qa-iteration:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M12C contracts
        shell: pwsh
        run: python -m pytest -q --tb=short tests/ulga/test_e4s_a1v1_m12c_real_learner_pilot_evidence_qa.py
      - name: Validate M11D and M12 non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m11d_system_acceptance_closeout.py
          tests/ulga/test_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py
      - name: Build TEST_FIXTURE M12 evidence
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          from ulga.builders import build_e4s_a1v1_m08_text_mode_learner_session as m08
          from ulga.builders import build_e4s_a1v1_m12_real_learner_pilot_evidence_capture as m12
          root = Path('.local/e4s_a1v1/pilot/m12c_fixture_ci')
          prepared = m12.prepare_capture(root)
          manifest = prepared['manifest']
          bank = json.loads((root / 'runtime/source_m08/text_mode_session_bank.private.json').read_text(encoding='utf-8'))
          allowed = set(manifest['selection']['selectable_item_ids'])
          item = next(row for row in bank['items'] if row['item_id'] in allowed)
          contract = item['private_scoring_contract']
          mode = contract['scoring_mode']
          if mode in {'EXACT_OPTION','NORMALIZED_TEXT'}:
              response = contract['accepted_texts'][0]
          elif mode == 'EXACT_SEQUENCE':
              response = contract['accepted_sequence']
          else:
              response = 'This is a CI test fixture response.'
          registry = m08.empty_attempt_registry(bank)
          registry['session_id'] = 'm12c-ci-fixture'
          registry['learner_ref'] = 'fixture-not-real-learner'
          registry['attempts'] = [{
              'item_id': item['item_id'],
              'attempt_sequence': 1,
              'response': response,
              'submitted_at': '2026-07-15T13:16:05.516Z',
              'operator_review': m08._empty_review(),
          }]
          path = root / 'fixture_registry.private.json'
          path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          m12.import_evidence(root, path, evidence_origin='TEST_FIXTURE')
          '@ | python -
      - name: Build M12C fixture QA
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m12c_real_learner_pilot_evidence_qa.py `
            --input-root ".local/e4s_a1v1/pilot/m12c_fixture_ci" `
            --output-root ".local/e4s_a1v1/pilot/m12c_qa_ci" `
            --expected-origin TEST_FIXTURE
      - name: Independently validate M12C fixture QA
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m12c_real_learner_pilot_evidence_qa.py `
            --input-root ".local/e4s_a1v1/pilot/m12c_fixture_ci" `
            --output-root ".local/e4s_a1v1/pilot/m12c_qa_ci" `
            --expected-origin TEST_FIXTURE `
            --validation-report ".local/e4s_a1v1/pilot/m12c_qa_ci/real_evidence_qa_validation.json"
      - name: Enforce fixture and privacy boundaries
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12c_qa_ci')
          report = json.loads((root / 'real_evidence_qa_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'real_evidence_qa_validation.json').read_text(encoding='utf-8'))
          assert report['evidence_origin'] == 'TEST_FIXTURE'
          assert report['validation_status'] == 'PASS_M12C_TEST_FIXTURE_QA_VALIDATED'
          assert report['evidence_summary']['attempt_count'] == 1
          assert report['coverage_progress']['pilot_completed'] is False
          assert report['iteration_queue']['candidate_count'] <= 8
          assert not any(row['grammar_unit_id'] == 'GRAMMAR_WILL_FUTURE_A1' for row in report['iteration_queue']['items'])
          assert report['claim_boundaries']['private_responses_included'] is False
          assert report['claim_boundaries']['test_fixture_counted_as_real_evidence'] is False
          assert report['claim_boundaries']['learner_mastery_claimed'] is False
          assert validation['error_count'] == 0
          assert validation['learner_mastery_claimed'] is False
          '@ | python -
      - name: Verify CI never claims REAL_LEARNER
        shell: pwsh
        run: |
          $workflow = Get-Content ".github/workflows/e4s-a1v1-m12c-real-evidence-qa-iteration.yml" -Raw
          if ($workflow -match '(?m)^\s*--expected-origin\s+REAL_LEARNER\s*$') {
            throw 'M12C CI must never process fixture data as REAL_LEARNER.'
          }
      - name: Verify no prohibited artifacts or canonical writes
        shell: pwsh
        run: |
          $changed = git diff --name-only origin/main...HEAD
          $forbidden = $changed | Where-Object {
            $_ -match '^ulga/graph/' -or
            $_ -match '(?i)(design|planning|preview|review_packet|sync).*\.md$' -or
            $_.ToLowerInvariant().EndsWith('.wav') -or
            $_.ToLowerInvariant().EndsWith('.webm') -or
            $_.ToLowerInvariant().EndsWith('.mp3') -or
            $_.ToLowerInvariant().EndsWith('.pdf')
          }
          if ($forbidden) { throw "M12C touched prohibited files: $forbidden" }
      - name: Verify private outputs remain ignored
        shell: pwsh
        run: |
          git check-ignore .local/e4s_a1v1/pilot/m12c_fixture_ci/pilot_progress_ledger.private.json
          git check-ignore .local/e4s_a1v1/pilot/m12c_qa_ci/real_evidence_qa_safe_report.json
          if (git status --porcelain | Select-String '^.. \.local/') {
            throw 'M12C local outputs escaped ignore policy.'
          }
      - name: Build metadata-only M12C pipeline closeout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m12c | Out-Null
          @'
          import hashlib, json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12c_qa_ci')
          report_path = root / 'real_evidence_qa_safe_report.json'
          validation_path = root / 'real_evidence_qa_validation.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          validation = json.loads(validation_path.read_text(encoding='utf-8'))
          def digest(path): return hashlib.sha256(path.read_text(encoding='utf-8').encode('utf-8')).hexdigest()
          receipt = {
              'task_id': 'E4S-A1V1-M12C_RealLearnerPilotEvidenceQAAndIteration',
              'artifact_type': 'metadata_only_m12c_evidence_qa_pipeline_closeout',
              'schema_version': 'e4s.a1v1.m12c.evidence_qa_pipeline_closeout.v1',
              'scope': 'A1_A1_PLUS_PRIVATE_CHILD_PATH_ONLY',
              'fixture_validation_status': report['validation_status'],
              'fixture_attempt_count': report['evidence_summary']['attempt_count'],
              'iteration_candidate_count': report['iteration_queue']['candidate_count'],
              'independent_validation_errors': validation['error_count'],
              'artifact_hashes': {
                  'fixture_qa_report_sha256': digest(report_path),
                  'fixture_qa_validation_sha256': digest(validation_path),
              },
              'claim_boundaries': report['claim_boundaries'],
              'real_learner_evidence_in_ci': False,
              'learner_mastery_claimed': False,
              'retention_confirmed': False,
              'stop_reason': 'REAL_LEARNER_QA_INPUT_REQUIRED',
              'last_completed_status': 'PASS_M12C_EVIDENCE_QA_PIPELINE_READY',
              'next_short_step': 'E4S-A1V1-M12C_RealLearnerPilotEvidenceQAAndIteration',
              'required_operator_artifacts': ['pilot_progress_ledger.private.json','pilot_evidence_capture_safe_report.json','pilot_progress_query_index.json'],
          }
          Path('generated/m12c/e4s_a1v1_m12c_evidence_qa_pipeline_closeout.json').write_text(json.dumps(receipt, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          '@ | python -
      - name: Compare committed M12C closeout
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          committed = json.loads(Path('ulga/reports/e4s_a1v1_m12c_real_evidence_qa_pipeline_closeout.json').read_text(encoding='utf-8'))
          generated = json.loads(Path('generated/m12c/e4s_a1v1_m12c_evidence_qa_pipeline_closeout.json').read_text(encoding='utf-8'))
          assert committed == generated, 'committed M12C closeout drift'
          '@ | python -
      - name: Upload metadata-only M12C closeout
        uses: actions/upload-artifact@v4
        with:
          name: m12c-evidence-qa-pipeline-closeout
          path: generated/m12c
          if-no-files-found: error
          retention-days: 2
