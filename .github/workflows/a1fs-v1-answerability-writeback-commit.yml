name: A1FS V1 Answerability Writeback Commit

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-answerability-writeback-commit.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit-writeback:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-stimulus-answerability-fullfix
          fetch-depth: 0

      - name: Execute validated integration step
        shell: pwsh
        run: |
          $lines = Get-Content ".github/workflows/a1fs-v1-answerability-writeback-diagnostics.yml"
          $step = -1
          $run = -1
          $end = $lines.Count
          for ($index = 0; $index -lt $lines.Count; $index++) {
            if ($lines[$index].Trim() -eq "- name: Extract and execute bounded integration patch") {
              $step = $index
              continue
            }
            if ($step -ge 0 -and $run -lt 0 -and $lines[$index].Trim() -eq "run: |") {
              $run = $index
              continue
            }
            if ($run -ge 0 -and $index -gt $run -and $lines[$index] -match '^      - (name|uses):') {
              $end = $index
              break
            }
          }
          if ($step -lt 0 -or $run -lt 0 -or $end -le $run + 1) {
            throw "Validated integration step boundaries not found"
          }
          $scriptLines = for ($index = $run + 1; $index -lt $end; $index++) {
            $line = $lines[$index]
            if ($line.StartsWith("          ")) { $line.Substring(10) } else { $line }
          }
          $scriptPath = Join-Path $env:RUNNER_TEMP "execute_answerability_patch.ps1"
          [System.IO.File]::WriteAllText($scriptPath, ($scriptLines -join "`n"), [System.Text.UTF8Encoding]::new($false))
          & $scriptPath
          if ($LASTEXITCODE -ne 0) { throw "Validated integration step failed" }

      - name: Commit five integrated consumers
        shell: pwsh
        run: |
          $paths = @(
            "ulga/builders/build_e4s_a1v1_m12g_learner_contract_assessment_validity_fullfix.py",
            "ulga/builders/build_a1fs_v1_r3r4_authority_reviewed_production_population.py",
            "ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py",
            "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py",
            "ulga/builders/build_a1fs_v1_r5_production_bootstrap_first_session.py"
          )
          $changed = @(git status --porcelain -- $paths)
          if ($changed.Count -ne 5) {
            throw "Expected exactly five integrated files, found $($changed.Count): $($changed -join '; ')"
          }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "git diff --check failed" }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $paths
          git commit -m "Integrate shared stimulus answerability contract"
          if ($LASTEXITCODE -ne 0) { throw "git commit failed" }
          git push origin HEAD:fix/a1fs-v1-r5-stimulus-answerability-fullfix
          if ($LASTEXITCODE -ne 0) { throw "git push failed" }
