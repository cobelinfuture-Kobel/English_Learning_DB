name: R7 M105P09 Human Pilot Minimum Set

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/build_a1_private_pilot_human_minimum_set.py"
      - "tests/ulga/test_m105p09_human_pilot_minimum_set.py"
      - ".github/workflows/r7-m105p09-human-pilot-minimum-set.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_a1_private_pilot_human_minimum_set.py"
      - "tests/ulga/test_m105p09_human_pilot_minimum_set.py"
      - ".github/workflows/r7-m105p09-human-pilot-minimum-set.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Build human-pilot minimum-set report
        run: python ulga/builders/build_a1_private_pilot_human_minimum_set.py --output /tmp/a1-human-minimum-set.json
      - name: Run focused tests
        run: python -m pytest tests/ulga/test_m105p09_human_pilot_minimum_set.py -q
      - name: Verify no learner or mastery claims
        run: |
          python - <<'PY'
          import json
          report = json.load(open('/tmp/a1-human-minimum-set.json', encoding='utf-8'))
          assert report['validation_status'] == 'PASS'
          assert report['missing_dimension_count_after_recommendation'] == 0
          assert report['human_input_policy'] == 'NO_MORE_PER_UNIT_INPUT'
          assert report['claims']['learner_evidence_created'] is False
          assert report['claims']['learner_mastery_claimed'] is False
          assert report['claims']['retention_confirmed'] is False
          PY
