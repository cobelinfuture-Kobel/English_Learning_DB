name: A1FS V1 R5 Production Bootstrap

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r5_production_bootstrap_first_session.py"
      - "ulga/validators/validate_a1fs_v1_r5_production_bootstrap_first_session.py"
      - "tests/ulga/test_a1fs_v1_r5_production_bootstrap_first_session.py"
      - ".github/workflows/a1fs-v1-r5-production-bootstrap.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-bootstrap-contract:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema openpyxl
      - name: Compile production bootstrap modules
        shell: pwsh
        run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_r5_production_bootstrap_first_session.py
          ulga/validators/validate_a1fs_v1_r5_production_bootstrap_first_session.py
      - name: Validate focused production bootstrap
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_a1fs_v1_r5_production_bootstrap_first_session.py
      - name: Validate R3/R4 production population regression
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_a1fs_v1_r3r4_authority_reviewed_production_population.py
      - name: Validate R5 runtime regression
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
      - name: Validate R8 real learner gate regression
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py
