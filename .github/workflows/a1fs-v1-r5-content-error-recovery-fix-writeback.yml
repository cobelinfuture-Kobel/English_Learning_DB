name: A1FS V1 R5 Content Error Recovery Fix Writeback

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-r5-content-error-recovery-fix-writeback.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  writeback:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-content-error-session-recovery
          fetch-depth: 0
      - name: Apply bounded recovery fixes
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import re

          # Recovery snapshot: explicitly close SQLite handle on Windows.
          path = Path("ulga/builders/build_a1fs_v1_r5_content_error_session_recovery.py")
          text = path.read_text(encoding="utf-8")
          snapshot_pattern = re.compile(
              r"def _session_snapshot\(runtime: r5\.LocalEdgeRuntime, receipt: Mapping\[str, Any\]\) -> dict\[str, Any\]:\n.*?\n\n\ndef recover\(",
              re.S,
          )
          snapshot_replacement = '''def _session_snapshot(runtime: r5.LocalEdgeRuntime, receipt: Mapping[str, Any]) -> dict[str, Any]:
              session_id = str(receipt["session_id"])
              access_token = str(receipt["access_token"])
              defects: list[dict[str, str]] = []
              connection = runtime.connect()
              try:
                  session = runtime._session(connection, session_id)
                  runtime._auth(session, access_token)
                  if session["learner_id"] != receipt["learner_id"]:
                      raise ContentErrorRecoveryError("receipt_learner_session_mismatch")
                  if session["session_state"] not in {"ACTIVE", "PAUSED"}:
                      raise ContentErrorRecoveryError(f"session_not_recoverable:{session['session_state']}")
                  rows = connection.execute(
                      """SELECT a.item_id,i.item_json FROM edge_assignments a
                      JOIN edge_runtime_items i USING(item_id)
                      WHERE a.session_id=? ORDER BY a.assignment_sequence""",
                      (session_id,),
                  ).fetchall()
                  for row in rows:
                      item = json.loads(row["item_json"])
                      try:
                          r5._safe_item(item)
                      except r5.LocalEdgeRuntimeError as exc:
                          if "SESSION_ITEM_NOT_ANSWERABLE" not in str(exc):
                              raise
                          defects.append({"item_id": row["item_id"], "error": str(exc)})
                  attempts = connection.execute(
                      "SELECT attempt_id,validity_status FROM edge_attempts WHERE session_id=? ORDER BY submitted_at,attempt_id",
                      (session_id,),
                  ).fetchall()
                  return {
                      "session_id": session_id,
                      "learner_id": session["learner_id"],
                      "session_state": session["session_state"],
                      "session_version": int(session["session_version"]),
                      "defects": defects,
                      "attempts": [dict(row) for row in attempts],
                  }
              finally:
                  connection.close()


          def recover('''.replace("          ", "")
          text, count = snapshot_pattern.subn(snapshot_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"recovery_snapshot_contract_drift:{count}")
          path.write_text(text, encoding="utf-8")

          # ABANDONED transition must not render a known-invalid learner item.
          path = Path("ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py")
          text = path.read_text(encoding="utf-8")
          transition_pattern = re.compile(
              r"        return self\.session_payload\(session_id=session_id, access_token=access_token\)\n\n    def pause_session",
          )
          transition_replacement = '''        if new_state == "ABANDONED":
              return {
                  "validation_status": STATUS,
                  "session": {
                      "session_id": session_id,
                      "learner_id": session["learner_id"],
                      "breadth_cell_id": session["breadth_cell_id"],
                      "purpose": session["purpose"],
                      "session_state": "ABANDONED",
                      "session_version": expected_session_version + 1,
                      "planned_item_count": session["planned_item_count"],
                      "started_at": session["started_at"],
                      "updated_at": at,
                  },
                  "assignments": [],
                  "next_short_step": NEXT_SHORT_STEP,
              }
          return self.session_payload(session_id=session_id, access_token=access_token)

      def pause_session'''.replace("      ", "")
          text, count = transition_pattern.subn(transition_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"abandoned_transition_contract_drift:{count}")
          path.write_text(text, encoding="utf-8")

          # Focused tests: complete scoring contract and formal profile API.
          path = Path("tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py")
          text = path.read_text(encoding="utf-8")
          import_old = "from ulga.builders import build_a1fs_v1_r3r4_authority_reviewed_production_population as population\n"
          import_new = (
              "from ulga.builders import build_a1fs_v1_m3_learner_profile_session_state_storage as m3\n"
              + import_old
          )
          if text.count(import_old) != 1:
              raise SystemExit(f"test_m3_import_drift:{text.count(import_old)}")
          text = text.replace(import_old, import_new, 1)

          scoring_pattern = re.compile(
              r"    with sqlite3\.connect\(database\) as connection:\n"
              r"        item = json\.loads\(connection\.execute\(\n"
              r"            \"SELECT item_json FROM edge_runtime_items WHERE item_id=\?\", \(item_id,\)\n"
              r"        \)\.fetchone\(\)\[0\]\)\n"
              r"    answer = item\[\"private_scoring_contract\"\]\[\"accepted_texts\"\]\[0\]\n",
          )
          scoring_replacement = '''    with sqlite3.connect(database) as connection:
              item = json.loads(connection.execute(
                  "SELECT item_json FROM edge_runtime_items WHERE item_id=?", (item_id,)
              ).fetchone()[0])
              scoring = item["private_scoring_contract"]
              scoring.setdefault("case_insensitive", True)
              scoring.setdefault("punctuation_tolerance", True)
              connection.execute(
                  "UPDATE edge_runtime_items SET item_json=?,item_digest=? WHERE item_id=?",
                  (r5.canonical(item), r5.digest(item), item_id),
              )
              connection.commit()
          answer = item["private_scoring_contract"]["accepted_texts"][0]
          '''.replace("          ", "")
          text, count = scoring_pattern.subn(scoring_replacement, text, count=1)
          if count != 1:
              raise SystemExit(f"test_scoring_contract_drift:{count}")

          profile_pattern = re.compile(
              r"        connection\.execute\(\n"
              r"            \"\"\"INSERT INTO learner_profiles\n"
              r"            \(learner_id,display_label,locale,timezone_name,profile_state,created_at,updated_at\)\n"
              r"            VALUES\(\?,\?,\?,\?,\?,\?,\?\)\"\"\",\n"
              r"            \(\n"
              r"                \"learner-anonymous-02\", \"A1 Learner 2\", \"zh-TW\", \"Asia/Taipei\", \"ACTIVE\",\n"
              r"                \"2026-07-19T06:00:00Z\", \"2026-07-19T06:00:00Z\",\n"
              r"            \),\n"
              r"        \)\n",
          )
          text, count = profile_pattern.subn("", text, count=1)
          if count != 1:
              raise SystemExit(f"test_raw_profile_insert_drift:{count}")

          profile_anchor = "        connection.commit()\n    new_session = runtime.start_session(\n"
          profile_replacement = (
              "        connection.commit()\n"
              "    m3.LearnerStateStore(database).create_profile(\n"
              "        learner_id=\"learner-anonymous-02\",\n"
              "        display_label=\"A1 Learner 2\",\n"
              "        at=\"2026-07-19T06:00:00Z\",\n"
              "    )\n"
              "    new_session = runtime.start_session(\n"
          )
          if text.count(profile_anchor) != 1:
              raise SystemExit(f"test_profile_api_drift:{text.count(profile_anchor)}")
          text = text.replace(profile_anchor, profile_replacement, 1)
          path.write_text(text, encoding="utf-8")
          '@ | python -
          if ($LASTEXITCODE -ne 0) { throw "Recovery focused fix patch failed" }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "git diff --check failed" }

      - name: Commit focused fixes
        shell: pwsh
        run: |
          $paths = @(
            "ulga/builders/build_a1fs_v1_r5_content_error_session_recovery.py",
            "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py",
            "tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py"
          )
          $changed = @(git status --porcelain -- $paths)
          if ($changed.Count -ne 3) {
            throw "Expected exactly three changed files, found $($changed.Count): $($changed -join '; ')"
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $paths
          git commit -m "Fix content-error recovery transaction and fixtures"
          if ($LASTEXITCODE -ne 0) { throw "git commit failed" }
          git push origin HEAD:fix/a1fs-v1-r5-content-error-session-recovery
          if ($LASTEXITCODE -ne 0) { throw "git push failed" }
