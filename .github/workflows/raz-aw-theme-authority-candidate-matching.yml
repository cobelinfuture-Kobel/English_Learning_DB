            tests/ulga/test_raz_ai_acl_v1_s06_final_closeout.py \
            tests/ulga/test_a1fs_v1_cp03_unified_existing_24_unit_binding.py \
            tests/ulga/test_a1fs_v1_cp04_unified_content_exercise_scene_candidates.py \
            tests/ulga/test_a1fs_v1_cp04r_real_private_candidate_build.py \
