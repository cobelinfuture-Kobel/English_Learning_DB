            ulga/validators/validate_a1fs_v1_cp04_unified_content_exercise_scene_candidates.py \
            ulga/builders/run_a1fs_v1_cp04r_private_production.py \
            ulga/validators/validate_a1fs_v1_cp04r_real_private_candidate_build.py \
            ulga/builders/build_a1fs_v1_cp05_private_candidate_materialization_and_admission.py \
            ulga/validators/validate_a1fs_v1_cp05_private_candidate_materialization_and_admission.py \
            ulga/builders/build_a1fs_v1_cp06_grammar_spiral_role_population_and_content_capacity.py \
            ulga/builders/run_a1fs_v1_cp06_private_production.py \
            ulga/validators/validate_a1fs_v1_cp06_grammar_spiral_role_population_and_content_capacity.py \
            ulga/builders/build_a1fs_v1_cp07a_unified_runtime_activity_contract_and_lineage_adapter.py \
            ulga/validators/validate_a1fs_v1_cp07a_unified_runtime_activity_contract_and_lineage_adapter.py \
            ulga/builders/cp07b_ket99_canonical_mapping_and_instructional_sequence_overlay_impl.py \
            ulga/builders/build_a1fs_v1_cp07b_ket99_canonical_mapping_and_instructional_sequence_overlay.py \
            ulga/validators/validate_a1fs_v1_cp07b_ket99_canonical_mapping_and_instructional_sequence_overlay.py \
            ulga/builders/cp07c_unified_m4_lesson_composition_impl.py \
            ulga/builders/build_a1fs_v1_cp07c_unified_m4_lesson_composition.py \
            ulga/validators/validate_a1fs_v1_cp07c_unified_m4_lesson_composition.py \
            ulga/builders/build_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py \
            ulga/validators/validate_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py
      - name: Run focused regressions
        run: |
          python -m pytest -q \
            tests/ulga/test_raz_aw_theme_authority_candidate_matching.py \
            tests/ulga/test_raz_aw_theme_gap_evidence_topic_review.py \
