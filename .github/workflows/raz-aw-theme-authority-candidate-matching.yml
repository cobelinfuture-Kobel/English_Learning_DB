name: RAZ A-W Theme Authority Candidate Matching

on:
  pull_request:
    paths:
      - "ulga/builders/build_raz_aw_theme_authority_candidate_matching.py"
      - "ulga/builders/build_raz_aw_theme_gap_evidence_topic_review.py"
      - "ulga/builders/build_raz_ai_a1_a1plus_coverage_recheck.py"
      - "ulga/builders/build_raz_ai_acl_v1_s01_material_admission.py"
      - "tests/ulga/test_raz_aw_theme_authority_candidate_matching.py"
      - "tests/ulga/test_raz_aw_theme_gap_evidence_topic_review.py"
      - "tests/ulga/test_raz_ai_a1_a1plus_coverage_recheck.py"
      - "tests/ulga/test_raz_ai_acl_v1_s01_material_admission.py"
      - ".github/workflows/raz-aw-theme-authority-candidate-matching.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_raz_aw_theme_authority_candidate_matching.py"
      - "ulga/builders/build_raz_aw_theme_gap_evidence_topic_review.py"
      - "ulga/builders/build_raz_ai_a1_a1plus_coverage_recheck.py"
      - "ulga/builders/build_raz_ai_acl_v1_s01_material_admission.py"
      - "tests/ulga/test_raz_aw_theme_authority_candidate_matching.py"
      - "tests/ulga/test_raz_aw_theme_gap_evidence_topic_review.py"
      - "tests/ulga/test_raz_ai_a1_a1plus_coverage_recheck.py"
      - "tests/ulga/test_raz_ai_acl_v1_s01_material_admission.py"
      - ".github/workflows/raz-aw-theme-authority-candidate-matching.yml"

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"

jobs:
  theme-authority-candidate-matching:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest
      - name: Compile builders
        run: |
          python -m py_compile \
            ulga/builders/build_raz_aw_theme_authority_candidate_matching.py \
            ulga/builders/build_raz_aw_theme_gap_evidence_topic_review.py \
            ulga/builders/build_raz_ai_a1_a1plus_coverage_recheck.py \
            ulga/builders/build_raz_ai_acl_v1_s01_material_admission.py
      - name: Run focused regressions
        run: |
          python -m pytest -q \
            tests/ulga/test_raz_aw_theme_authority_candidate_matching.py \
            tests/ulga/test_raz_aw_theme_gap_evidence_topic_review.py \
            tests/ulga/test_raz_ai_a1_a1plus_coverage_recheck.py \
            tests/ulga/test_raz_ai_acl_v1_s01_material_admission.py
