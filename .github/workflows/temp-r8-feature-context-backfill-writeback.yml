name: TEMP R8 feature context backfill writeback

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'fix/a1fs-v1-r8-feature-rubric-context-backfill' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply hash-bound feature context compatibility patch
        shell: bash
        run: |
          python - <<'PY'
