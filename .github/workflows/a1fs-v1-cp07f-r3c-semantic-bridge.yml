name: A1FS R3G Precision Bootstrap

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-cp07f-r3c-semantic-bridge.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-precision-fullfix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch builder blob
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/c7cff7fba588f35f6f609aa72a406b676aa8cd12" --jq .content | tr -d '\n' | base64 -d | gzip -d > ulga/builders/build_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/de6e2080ed535438e9bb6d12e5c7c974f4a9d085" --jq .content | tr -d '\n' | base64 -d | gzip -d > ulga/validators/validate_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/f182388c918bc2a6073c60e16810223acdb795e5" --jq .content | tr -d '\n' | base64 -d | gzip -d > tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
      - name: Compile precision fullfix
        run: |
          python -m py_compile \
            ulga/builders/build_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py \
            ulga/validators/validate_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py \
            tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          python -m pip install -q pytest
      - name: Gate synthetic build
        run: |
          python - <<'PY'
          import runpy
          m=runpy.run_path('tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py')
          g,c,o,b=m['inputs'](); a=m['builder'].build_artifact(g,c,o,b)
          assert len(a['transcript_semantic_inventory']) == 99
          assert len(a['lesson_instructional_references']) == 5
          PY
      - name: Gate coverage expansion
        run: |
          python - <<'PY'
          import runpy
          m=runpy.run_path('tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py')
          g,c,o,b=m['inputs'](); a=m['builder'].build_artifact(g,c,o,b); s=a['coverage_summary']
          assert s['referenced_transcript_count'] > 1
          assert s['referenced_lesson_count'] > 1
          PY
      - name: Gate density pruning
        run: |
          python - <<'PY'
          import runpy
          m=runpy.run_path('tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py')
          g,c,o,b=m['inputs'](); a=m['builder'].build_artifact(g,c,o,b); p=a['precision_summary']; B=m['builder']
          assert p['maximum_reference_count_per_lesson'] <= B.MAX_REFERENCES_PER_LESSON
          assert p['pruned_reference_count'] > 0
          assert p['token_only_mapping_allowed'] is False
          PY
      - name: Gate P008 and P026 resolution
        run: |
          python - <<'PY'
          import runpy
          m=runpy.run_path('tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py')
          g,c,o,b=m['inputs'](); a=m['builder'].build_artifact(g,c,o,b); inv={r['transcript_id']:r for r in a['transcript_semantic_inventory']}
          assert inv['P008']['disposition'] == 'USED_FOR_A1_A1PLUS'
          assert inv['P026']['disposition'] == 'USED_FOR_A1_A1PLUS'
          assert inv['P030']['disposition'] == 'HUMAN_EVIDENCE_REQUIRED'
          assert a['human_evidence_resolution_summary']['unresolved_transcript_ids'] == []
          assert a['next_short_step'] == m['builder'].NEXT_SHORT_STEP
          PY
      - name: Gate cross-lesson precision
        run: |
          python - <<'PY'
          import runpy
          m=runpy.run_path('tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py')
          g,c,o,b=m['inputs'](); a=m['builder'].build_artifact(g,c,o,b); lessons={r['lesson_id']:r for r in a['lesson_instructional_references']}
          assert any(r['transcript_id']=='P008' for r in lessons['KETR-RF-L001']['instructional_references'])
          assert all(r['transcript_id']!='P008' for r in lessons['KETR-RF-L002']['instructional_references'])
          assert any(r['transcript_id']=='P026' for r in lessons['KETW-WF-L001']['instructional_references'])
          assert all(r['transcript_id']!='P030' for lesson in lessons.values() for r in lesson['instructional_references'])
          PY
      - name: Run complete precision regressions
        run: python -m pytest -q tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
      - name: Commit precision fullfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            ulga/builders/build_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py \
            ulga/validators/validate_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py \
            tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          git commit -m "CP07F-R3G: precision-guard KET99 coverage expansion"
          git push origin HEAD:${{ github.head_ref }}
