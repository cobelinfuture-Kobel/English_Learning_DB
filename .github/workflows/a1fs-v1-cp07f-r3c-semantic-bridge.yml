name: A1FS V1 CP07F R3C-R4A Capability Admission

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_cp07r3c_ket_authority_semantic_bridge.py"
      - "ulga/builders/build_a1fs_v1_cp07r3c_semantic_lesson_composition.py"
      - "ulga/builders/build_a1fs_v1_cp07r3e_ket99_lesson_instructional_reference_overlay.py"
      - "ulga/builders/build_a1fs_v1_cp07r3f_reference_aware_optional_context_lesson_composition.py"
      - "ulga/builders/build_a1fs_v1_cp07r4_reference_aware_private_delivery_consumer.py"
      - "ulga/builders/build_a1fs_v1_cp07r4a_ket_asset_response_media_capability_admission.py"
      - "ulga/builders/build_a1fs_v1_cp07c_unified_m4_lesson_composition.py"
      - "ulga/validators/validate_a1fs_v1_cp07r3c_ket_authority_semantic_bridge.py"
      - "ulga/validators/validate_a1fs_v1_cp07r3c_semantic_lesson_composition.py"
      - "ulga/validators/validate_a1fs_v1_cp07r3e_ket99_lesson_instructional_reference_overlay.py"
      - "ulga/validators/validate_a1fs_v1_cp07r3f_reference_aware_optional_context_lesson_composition.py"
      - "ulga/validators/validate_a1fs_v1_cp07r4_reference_aware_private_delivery_consumer.py"
      - "ulga/validators/validate_a1fs_v1_cp07r4a_ket_asset_response_media_capability_admission.py"
      - "tests/ulga/test_a1fs_v1_cp07r3c_ket_authority_semantic_bridge.py"
      - "tests/ulga/test_a1fs_v1_cp07r3e_ket99_lesson_instructional_reference_overlay.py"
      - "tests/ulga/test_a1fs_v1_cp07r3f_reference_aware_optional_context_lesson_composition.py"
      - "tests/ulga/test_a1fs_v1_cp07r4_reference_aware_private_delivery_consumer.py"
      - "tests/ulga/test_a1fs_v1_cp07r4a_ket_asset_response_media_capability_admission.py"
      - ".github/workflows/a1fs-v1-cp07f-r3c-semantic-bridge.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest openpyxl jsonschema
      - name: Compile R3C-R4A contracts
        run: |
          python -m py_compile \
            ulga/builders/build_a1fs_v1_cp07r3c_ket_authority_semantic_bridge.py \
            ulga/builders/build_a1fs_v1_cp07r3c_semantic_lesson_composition.py \
            ulga/builders/build_a1fs_v1_cp07r3e_ket99_lesson_instructional_reference_overlay.py \
            ulga/builders/build_a1fs_v1_cp07r3f_reference_aware_optional_context_lesson_composition.py \
            ulga/builders/build_a1fs_v1_cp07r4_reference_aware_private_delivery_consumer.py \
            ulga/builders/build_a1fs_v1_cp07r4a_ket_asset_response_media_capability_admission.py \
            ulga/builders/build_a1fs_v1_cp07c_unified_m4_lesson_composition.py \
            ulga/validators/validate_a1fs_v1_cp07r3c_ket_authority_semantic_bridge.py \
            ulga/validators/validate_a1fs_v1_cp07r3c_semantic_lesson_composition.py \
            ulga/validators/validate_a1fs_v1_cp07r3e_ket99_lesson_instructional_reference_overlay.py \
            ulga/validators/validate_a1fs_v1_cp07r3f_reference_aware_optional_context_lesson_composition.py \
            ulga/validators/validate_a1fs_v1_cp07r4_reference_aware_private_delivery_consumer.py \
            ulga/validators/validate_a1fs_v1_cp07r4a_ket_asset_response_media_capability_admission.py \
            tests/ulga/test_a1fs_v1_cp07r3c_ket_authority_semantic_bridge.py \
            tests/ulga/test_a1fs_v1_cp07r3e_ket99_lesson_instructional_reference_overlay.py \
            tests/ulga/test_a1fs_v1_cp07r3f_reference_aware_optional_context_lesson_composition.py \
            tests/ulga/test_a1fs_v1_cp07r4_reference_aware_private_delivery_consumer.py \
            tests/ulga/test_a1fs_v1_cp07r4a_ket_asset_response_media_capability_admission.py
      - name: Run R3C-R4A and downstream compatibility regressions
        run: |
          python -m pytest -q \
            tests/ulga/test_a1fs_v1_cp07r3c_ket_authority_semantic_bridge.py \
            tests/ulga/test_a1fs_v1_cp07r3e_ket99_lesson_instructional_reference_overlay.py \
            tests/ulga/test_a1fs_v1_cp07r3f_reference_aware_optional_context_lesson_composition.py \
            tests/ulga/test_a1fs_v1_cp07r4_reference_aware_private_delivery_consumer.py \
            tests/ulga/test_a1fs_v1_cp07r4a_ket_asset_response_media_capability_admission.py \
            tests/ulga/test_a1fs_v1_cp07c_unified_m4_lesson_composition.py \
            tests/ulga/test_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py
