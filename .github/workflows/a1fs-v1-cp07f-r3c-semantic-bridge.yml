name: Restore Canonical R3G Workflow

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-cp07f-r3c-semantic-bridge.yml"

permissions:
  contents: write

jobs:
  restore:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Restore exact main workflow blob
        run: |
          git fetch origin main
          git checkout origin/main -- .github/workflows/a1fs-v1-cp07f-r3c-semantic-bridge.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/a1fs-v1-cp07f-r3c-semantic-bridge.yml
          git commit -m "Restore canonical R3G focused workflow"
          git push origin HEAD:${{ github.head_ref }}
