name: A1FS R3G Precision Bootstrap

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-cp07f-r3c-semantic-bridge.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-precision-fullfix:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply exact R3G precision fullfix
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/c7cff7fba588f35f6f609aa72a406b676aa8cd12" --jq .content | tr -d '\n' | base64 -d | gzip -d > ulga/builders/build_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/de6e2080ed535438e9bb6d12e5c7c974f4a9d085" --jq .content | tr -d '\n' | base64 -d | gzip -d > ulga/validators/validate_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          gh api "repos/${GITHUB_REPOSITORY}/git/blobs/f182388c918bc2a6073c60e16810223acdb795e5" --jq .content | tr -d '\n' | base64 -d | gzip -d > tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          python -m py_compile \
            ulga/builders/build_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py \
            ulga/validators/validate_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py \
            tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          python -m pip install -q pytest
          python -m pytest -q tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            ulga/builders/build_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py \
            ulga/validators/validate_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py \
            tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
          git commit -m "CP07F-R3G: precision-guard KET99 coverage expansion"
          git push origin HEAD:${{ github.head_ref }}
