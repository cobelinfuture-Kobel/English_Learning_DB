name: A1FS V1 Answerability Writeback Diagnostics

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-answerability-writeback-diagnostics.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  writeback-and-diagnose:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-stimulus-answerability-fullfix
          fetch-depth: 0

      - name: Extract and execute bounded integration patch
        id: bounded_patch
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path generated | Out-Null
          $lines = Get-Content ".github/workflows/a1fs-v1-learner-answerability-fullfix.yml"
          $start = -1
          $end = -1
          for ($index = 0; $index -lt $lines.Count; $index++) {
            if ($start -lt 0 -and $lines[$index].Trim() -eq "@'") {
              $start = $index
              continue
            }
            if ($start -ge 0 -and $lines[$index].Trim() -eq "'@ | python -") {
              $end = $index
              break
            }
          }
          if ($start -lt 0 -or $end -le $start + 1) {
            "Embedded bounded patch script boundaries not found: start=$start end=$end" | Set-Content generated/patch.log
            throw "Embedded bounded patch script boundaries not found"
          }
          $scriptLines = @(
            for ($index = $start + 1; $index -lt $end; $index++) {
              $line = $lines[$index]
              if ($line.StartsWith("          ")) { $line.Substring(10) } else { $line }
            }
          )

          $legacyStart = -1
          $legacyEnd = -1
          for ($index = 0; $index -lt $scriptLines.Count; $index++) {
            if ($legacyStart -lt 0 -and $scriptLines[$index].StartsWith("old_render = '''  if(contract.context)")) {
              $legacyStart = $index
              continue
            }
            if ($legacyStart -ge 0 -and $scriptLines[$index].Contains('"m12g_renderer")')) {
              $legacyEnd = $index
              break
            }
          }
          if ($legacyStart -lt 0 -or $legacyEnd -lt $legacyStart) {
            "M12G legacy renderer patch block not found: start=$legacyStart end=$legacyEnd" | Set-Content generated/patch.log
            throw "M12G embedded patch block not found"
          }
          $replacementLines = @(
            'm12g_render_pattern = re.compile(',
            '    r"  if\(contract\.context\)\{\{.*?\n  addList\(article,''字詞庫'',contract\.word_bank,''word_bank''\);\n",',
            '    re.S,',
            ')',
            'text, m12g_render_count = m12g_render_pattern.subn(',
            '    "  renderA1FSStimulus(article,contract);\n", text, count=1,',
            ')',
            'if m12g_render_count != 1:',
            '    raise SystemExit(f"m12g_renderer: expected one match, got {m12g_render_count}")'
          )
          $before = if ($legacyStart -gt 0) { $scriptLines[0..($legacyStart - 1)] } else { @() }
          $after = if ($legacyEnd + 1 -lt $scriptLines.Count) { $scriptLines[($legacyEnd + 1)..($scriptLines.Count - 1)] } else { @() }
          $scriptLines = @($before) + $replacementLines + @($after)

          $r5Start = -1
          $r5End = -1
          for ($index = 0; $index -lt $scriptLines.Count; $index++) {
            if ($r5Start -lt 0 -and $scriptLines[$index].StartsWith("old_loop = '''            for item in items:")) {
              $r5Start = $index
              continue
            }
            if ($r5Start -ge 0 -and $scriptLines[$index].Contains('"r5_init_preflight")')) {
              $r5End = $index
              break
            }
          }
          if ($r5Start -lt 0 -or $r5End -lt $r5Start) {
            "R5 legacy preflight patch block not found: start=$r5Start end=$r5End" | Set-Content generated/patch.log
            throw "R5 embedded preflight patch block not found"
          }
          $r5Replacement = @(
            'r5_init_old = """            for item in items:',
            '                if item.get("admission", {}).get("status") != "APPROVED":',
            '                    raise LocalEdgeRuntimeError(f"unapproved_bank_item:{item.get(''item_id'')}")',
            '                item_digest = digest(item)',
            '"""',
            'r5_init_new = """            for item in items:',
            '                if item.get("admission", {}).get("status") != "APPROVED":',
            '                    raise LocalEdgeRuntimeError(f"unapproved_bank_item:{item.get(''item_id'')}")',
            '                item = dict(item)',
            '                item["learner_contract"] = _safe_item(item)["learner_contract"]',
            '                item_digest = digest(item)',
            '"""',
            'text = replace_once(text, r5_init_old, r5_init_new, "r5_init_preflight")'
          )
          $beforeR5 = if ($r5Start -gt 0) { $scriptLines[0..($r5Start - 1)] } else { @() }
          $afterR5 = if ($r5End + 1 -lt $scriptLines.Count) { $scriptLines[($r5End + 1)..($scriptLines.Count - 1)] } else { @() }
          $scriptLines = @($beforeR5) + $r5Replacement + @($afterR5)

          $script = $scriptLines -join "`n"
          $scriptPath = Join-Path $env:RUNNER_TEMP "apply_answerability_fullfix.py"
          [System.IO.File]::WriteAllText($scriptPath, $script, [System.Text.UTF8Encoding]::new($false))
          python $scriptPath 2>&1 | Tee-Object -FilePath generated/patch.log
          $patchExit = $LASTEXITCODE
          if ($patchExit -ne 0) { throw "Bounded integration patch failed with exit code $patchExit" }
          git diff --check 2>&1 | Tee-Object -FilePath generated/diff-check.log
          if ($LASTEXITCODE -ne 0) { throw "git diff --check failed" }

      - name: Upload bounded patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: answerability-patch-diagnostics
          path: generated/*.log
          if-no-files-found: error
          retention-days: 2

      - name: Enforce bounded patch
        if: steps.bounded_patch.outcome == 'failure'
        shell: pwsh
        run: throw "Bounded integration patch failed; inspect patch diagnostic artifact."

      - name: Commit integration to PR branch
        shell: pwsh
        run: |
          $paths = @(
            "ulga/builders/build_e4s_a1v1_m12g_learner_contract_assessment_validity_fullfix.py",
            "ulga/builders/build_a1fs_v1_r3r4_authority_reviewed_production_population.py",
            "ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py",
            "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py",
            "ulga/builders/build_a1fs_v1_r5_production_bootstrap_first_session.py"
          )
          $changed = git status --porcelain -- $paths
          if (-not $changed) {
            throw "Expected integration changes were not produced"
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $paths
          if ($LASTEXITCODE -ne 0) { throw "git add failed" }
          git commit -m "Integrate shared stimulus answerability contract"
          if ($LASTEXITCODE -ne 0) { throw "git commit failed" }
          git push origin HEAD:fix/a1fs-v1-r5-stimulus-answerability-fullfix
          if ($LASTEXITCODE -ne 0) { throw "git push failed" }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema openpyxl

      - name: Compile integrated modules
        shell: pwsh
        run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_shared_learner_stimulus_contract_renderer.py
          ulga/validators/validate_a1fs_v1_learner_answerability_gate.py
          ulga/builders/build_e4s_a1v1_m12g_learner_contract_assessment_validity_fullfix.py
          ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
          ulga/builders/build_a1fs_v1_r5_production_bootstrap_first_session.py

      - name: Shared contract unit tests
        id: shared_contract
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          --junitxml=generated/shared-contract.xml
          tests/ulga/test_a1fs_v1_shared_learner_stimulus_contract_renderer.py

      - name: Integrated defect regression tests
        id: defect_regression
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          --junitxml=generated/defect-regression.xml
          tests/ulga/test_a1fs_v1_stimulus_answerability_fullfix.py

      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: answerability-focused-diagnostics
          path: generated/*.xml
          if-no-files-found: error
          retention-days: 2

      - name: Enforce focused gates
        if: steps.shared_contract.outcome == 'failure' || steps.defect_regression.outcome == 'failure'
        shell: pwsh
        run: throw "Focused answerability tests failed; inspect JUnit artifact."
