name: E4S A1V1 M12E Diagnostic

on:
  push:
    branches:
      - agent/e4s-a1v1-m12e-representative-evidence-qa-coverage
    paths:
      - ".github/workflows/e4s-a1v1-m12e-diagnostic.yml"
      - "ulga/schemas/e4s_a1v1_m12e_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_m12e_representative_pilot_evidence_qa.py"
      - "ulga/validators/validate_e4s_a1v1_m12e_representative_pilot_evidence_qa.py"
      - "tests/ulga/test_e4s_a1v1_m12e_representative_pilot_evidence_qa.py"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-diagnostic:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Run focused tests with JUnit
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m12e-diagnostic | Out-Null
          python -m pytest -vv --tb=long `
            --junitxml=generated/m12e-diagnostic/junit.xml `
            tests/ulga/test_e4s_a1v1_m12e_representative_pilot_evidence_qa.py
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m12e-focused-diagnostic
          path: generated/m12e-diagnostic
          if-no-files-found: error
          retention-days: 1
