name: E4S A1V1 M04B2 Local Reading Content Binding

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/build_a1_a1plus_local_reading_practice_bank.py"
      - "ulga/validators/validate_a1_a1plus_local_reading_practice_bank.py"
      - "tests/ulga/test_e4s_a1v1_m04b2_local_reading_content_binding.py"
      - ".github/workflows/e4s-a1v1-m04b2-local-reading-content-binding.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Run local binder focused tests
        run: python -m pytest tests/ulga/test_e4s_a1v1_m04b2_local_reading_content_binding.py -q
      - name: Re-run selected source and Reading integration regressions
        run: |
          python -m pytest \
            tests/ulga/test_e4s_a1v1_m04b_selected_reading_source_manifest.py \
            tests/ulga/test_e4s_a1v1_m04b_safe_reading_manifest_exporter.py \
            tests/ulga/test_e4s_a1v1_m04_reading_v1_integration_gate.py \
            -q
      - name: Verify private-output ignore policy
        run: |
          python - <<'PY'
          from pathlib import Path
          ignore = Path('.gitignore').read_text(encoding='utf-8-sig')
          assert '.local/' in ignore
          builder = Path('ulga/builders/build_a1_a1plus_local_reading_practice_bank.py').read_text(encoding='utf-8')
          assert '.local/e4s_a1v1/reading/a1_a1plus_private_reading_candidates.json' in builder
          assert 'PRIVATE_REVIEW_CANDIDATE' in builder
          assert 'PENDING_OPERATOR_QUESTION_AND_ANSWER_REVIEW' in builder
          assert 'metadata_and_hashes_only' in builder
          PY
