            ),
            "response_mode": str(learner.get("response_mode") or ""),
        }
        for key, child in expected.items():
            if value.get(key) != child:
                raise LocalEdgeRuntimeError(
                    f"rendered_stimulus_reference_item_binding_invalid:{key}"
                )
    return value
'''
