name: English DB CI Readback

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
          python -m pip install pytest jsonschema openpyxl

      - name: Check required governance files
        run: |
          python - <<'PY'
          from pathlib import Path
          required = [
              "AGENTS.md",
              "docs/governance/PROJECT_TASK_EXPANSION_CONTROL_POLICY.md",
              "docs/governance/ENGLISH_GRAMMAR_PROJECT_GOVERNANCE.md",
              "docs/ulga/E4S_CI_READBACK_GATE_POLICY.md",
              "docs/ulga/E4S_CI_TEST_SURFACE_INVENTORY.md",
              "docs/ulga/E4S_CI_WORKFLOW_CONTRACT.md",
          ]
          missing = [path for path in required if not Path(path).is_file()]
          if missing:
              raise SystemExit(f"missing governance files: {missing}")
          print(f"CI_GOVERNANCE_FILES_CHECKED={len(required)}")
          PY

      - name: Compile repository Python surfaces
        run: python -m compileall -q ulga tools tests

      - name: Check JSON integrity
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          checked = 0
          failed = []
          for root in (Path("ulga"), Path("raz_output_jsons"), Path("docs")):
              if not root.exists():
                  continue
              for path in root.rglob("*.json"):
                  try:
                      json.loads(path.read_text(encoding="utf-8"))
                      checked += 1
                  except Exception as exc:
                      failed.append((str(path), str(exc)))
          print(f"CI_JSON_CHECKED={checked}")
          if failed:
              for path, error in failed[:50]:
                  print(f"JSON_FAIL={path}: {error}")
              raise SystemExit(1)
          PY

      - name: Run aggregate repository tests
        run: python -m pytest -q

      - name: Final CI summary
        run: |
          echo "CI_WORKFLOW=English DB CI Readback"
          echo "CI_EXIT_CODE=0"
