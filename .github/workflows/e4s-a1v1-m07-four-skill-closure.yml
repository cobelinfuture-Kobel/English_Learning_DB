name: E4S A1V1 M07 Four Skill Closure

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m07-four-skill-contract-closure-no-audio
    paths:
      - "ulga/builders/build_e4s_a1v1_m07_four_skill_contract_closure.py"
      - "ulga/validators/validate_e4s_a1v1_m07_four_skill_contract_closure.py"
      - "ulga/query/e4s_a1v1_four_skill_contract_consumer.py"
      - "ulga/graph/e4s_a1v1_four_skill_contract_closure.json"
      - "ulga/reports/e4s_a1v1_m07_four_skill_contract_closure.json"
      - "tests/ulga/test_e4s_a1v1_m07_four_skill_contract_closure.py"
      - ".github/workflows/e4s-a1v1-m07-four-skill-closure.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  four-skill-contract-closure:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M07 contract closure
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_e4s_a1v1_m07_four_skill_contract_closure.py
      - name: Validate M03 through M06 non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m03_shared_item_contract.py
          tests/ulga/test_e4s_a1v1_m04_reading_promotion_closeout_receipt.py
          tests/ulga/test_e4s_a1v1_m05_listening_v1.py
          tests/ulga/test_e4s_a1v1_m06_speaking_v1.py
      - name: Generate canonical M07 metadata artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m07 | Out-Null
          python ulga/builders/build_e4s_a1v1_m07_four_skill_contract_closure.py `
            --output generated/m07/e4s_a1v1_four_skill_contract_closure.json `
            --report generated/m07/e4s_a1v1_m07_four_skill_contract_closure.json
      - name: Independently validate generated M07 artifacts
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m07_four_skill_contract_closure.py `
            --artifact generated/m07/e4s_a1v1_four_skill_contract_closure.json `
            --report generated/m07/e4s_a1v1_m07_four_skill_contract_closure.json `
            --validation-report generated/m07/e4s_a1v1_m07_four_skill_contract_closure_validation.json
      - name: Verify metadata query surfaces
        shell: pwsh
        run: |
          python ulga/query/e4s_a1v1_four_skill_contract_consumer.py `
            --artifact generated/m07/e4s_a1v1_four_skill_contract_closure.json summary
          python ulga/query/e4s_a1v1_four_skill_contract_consumer.py `
            --artifact generated/m07/e4s_a1v1_four_skill_contract_closure.json skill --value speaking
          python ulga/query/e4s_a1v1_four_skill_contract_consumer.py `
            --artifact generated/m07/e4s_a1v1_four_skill_contract_closure.json gate
      - name: Compare committed generated artifacts when present
        shell: pwsh
        run: |
          if (Test-Path ulga/graph/e4s_a1v1_four_skill_contract_closure.json) {
            git diff --no-index --exit-code `
              ulga/graph/e4s_a1v1_four_skill_contract_closure.json `
              generated/m07/e4s_a1v1_four_skill_contract_closure.json
          }
          if (Test-Path ulga/reports/e4s_a1v1_m07_four_skill_contract_closure.json) {
            git diff --no-index --exit-code `
              ulga/reports/e4s_a1v1_m07_four_skill_contract_closure.json `
              generated/m07/e4s_a1v1_m07_four_skill_contract_closure.json
          }
      - name: Upload generated M07 closure evidence
        uses: actions/upload-artifact@v4
        with:
          name: m07-four-skill-closure-generated
          path: generated/m07
          if-no-files-found: error
          retention-days: 2
