name: A1FS V1 R3 Breadth Denominator Gap Planner

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r3_complete_breadth_denominator_coverage_gap_planner.py"
      - "ulga/validators/validate_a1fs_v1_r3_complete_breadth_denominator_coverage_gap_planner.py"
      - "tests/ulga/test_a1fs_v1_r3_complete_breadth_denominator_coverage_gap_planner.py"
      - ".github/workflows/a1fs-v1-r3-breadth-denominator-gap-planner.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  breadth-denominator-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_r3_complete_breadth_denominator_coverage_gap_planner.py
          ulga/validators/validate_a1fs_v1_r3_complete_breadth_denominator_coverage_gap_planner.py
      - run: >-
          python -m pytest -q
          tests/ulga/test_a1fs_v1_r3_complete_breadth_denominator_coverage_gap_planner.py
          tests/ulga/test_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py
