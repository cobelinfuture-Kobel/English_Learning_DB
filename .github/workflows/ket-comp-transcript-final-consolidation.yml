name: KET Complete Transcript Final Consolidation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archived-focused-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install --upgrade pip pytest jsonschema openpyxl
      - name: Run archived KET transcript consolidation regression
        run: python -m pytest -q tests/ulga/test_ket_comp_transcript_final_consolidation.py
