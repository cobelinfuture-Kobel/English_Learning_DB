name: A1FS V1 R5 Content Error Session Recovery

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r5_content_error_session_recovery.py"
      - "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py"
      - ".github/workflows/a1fs-v1-r5-content-error-session-recovery.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recovery-contract:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema openpyxl

      - name: Compile recovery modules
        shell: pwsh
        run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_r5_content_error_session_recovery.py
          ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py

      - name: Validate content-error recovery
        id: recovery
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/recovery.xml
          tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py

      - name: Validate R5 runtime regression
        id: r5
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/r5.xml
          tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py

      - name: Validate production bootstrap regression
        id: bootstrap
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/bootstrap.xml
          tests/ulga/test_a1fs_v1_r5_production_bootstrap_first_session.py

      - name: Validate learner answerability regression
        id: answerability
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/answerability.xml
          tests/ulga/test_a1fs_v1_stimulus_answerability_fullfix.py

      - name: Upload recovery diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r5-content-error-recovery-junit
          path: generated/*.xml
          if-no-files-found: error
          retention-days: 2

      - name: Enforce recovery gates
        if: >-
          steps.recovery.outcome == 'failure' ||
          steps.r5.outcome == 'failure' ||
          steps.bootstrap.outcome == 'failure' ||
          steps.answerability.outcome == 'failure'
        shell: pwsh
        run: throw "One or more R5 recovery gates failed; inspect JUnit artifact."
