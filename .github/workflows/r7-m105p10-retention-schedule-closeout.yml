name: R7 M105P10 Retention Schedule Closeout

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/build_a1_private_pilot_retention_schedule_closeout.py"
      - "tests/ulga/test_m105p10_retention_schedule_closeout.py"
      - ".github/workflows/r7-m105p10-retention-schedule-closeout.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_a1_private_pilot_retention_schedule_closeout.py"
      - "tests/ulga/test_m105p10_retention_schedule_closeout.py"
      - ".github/workflows/r7-m105p10-retention-schedule-closeout.yml"
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Build retention schedule and engineering closeout
        run: python ulga/builders/build_a1_private_pilot_retention_schedule_closeout.py --output /tmp/a1-retention-closeout.json
      - name: Run focused tests
        run: python -m pytest tests/ulga/test_m105p10_retention_schedule_closeout.py -q
      - name: Verify retention evidence boundary
        run: |
          python - <<'PY'
          import json
          report = json.load(open('/tmp/a1-retention-closeout.json', encoding='utf-8'))
          assert report['validation_status'] == 'PASS'
          assert report['pipeline_coverage']['pipeline_pass_unit_count'] == 24
          assert report['human_pilot_coverage']['per_unit_human_input_required'] is False
          assert report['claims']['learner_evidence_created'] is False
          assert report['claims']['learner_mastery_claimed'] is False
          assert report['claims']['retention_confirmed'] is False
          PY
