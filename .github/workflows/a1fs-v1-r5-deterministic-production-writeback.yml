name: A1FS V1 R5 Deterministic Production Writeback

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-r5-deterministic-production-writeback.yml"

permissions:
  contents: write

jobs:
  writeback:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-deterministic-production-bootstrap
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pytest jsonschema openpyxl
      - name: Apply deterministic PracticeBank identity patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, code: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{code}_replacement_count:{count}")
              return text.replace(old, new, 1)

          r4_path = Path("ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py")
          r4 = r4_path.read_text(encoding="utf-8")
          r4 = replace_once(
              r4,
              '''def candidate_digest(candidate: Mapping[str, Any]) -> str:\n    return digest(candidate_core(candidate))\n\n\ndef candidate_registry(ontology_sha256: str, coverage_sha256: str, candidates: Sequence[Mapping[str, Any]]) -> dict[str, Any]:''',
              '''def candidate_digest(candidate: Mapping[str, Any]) -> str:\n    return digest(candidate_core(candidate))\n\n\ndef candidate_semantic_core(candidate: Mapping[str, Any]) -> dict[str, Any]:\n    core = deepcopy(dict(candidate))\n    review = core.get("authority_review")\n    if isinstance(review, Mapping):\n        normalized_review = deepcopy(dict(review))\n        normalized_review.pop("reviewed_at", None)\n        core["authority_review"] = normalized_review\n    return core\n\n\ndef candidate_registry_semantic_digest(candidates: Sequence[Mapping[str, Any]]) -> str:\n    return digest([candidate_semantic_core(row) for row in candidates])\n\n\ndef candidate_registry(ontology_sha256: str, coverage_sha256: str, candidates: Sequence[Mapping[str, Any]]) -> dict[str, Any]:''',
              "semantic_helpers",
          )
          r4 = replace_once(
              r4,
              '''        "candidates": rows,\n        "candidates_sha256": digest(rows),\n    }''',
              '''        "candidates": rows,\n        "candidates_sha256": digest(rows),\n        "semantic_sha256": candidate_registry_semantic_digest(rows),\n    }''',
              "candidate_registry_semantic_digest",
          )
          r4 = replace_once(
              r4,
              '''def _load_candidates(path: Path, *, ontology_sha256: str, coverage_sha256: str) -> list[dict[str, Any]]:''',
              '''def _load_candidates(\n    path: Path, *, ontology_sha256: str, coverage_sha256: str,\n) -> tuple[list[dict[str, Any]], str]:''',
              "load_candidates_signature",
          )
          r4 = replace_once(
              r4,
              '''    rows = registry.get("candidates")\n    if not isinstance(rows, list) or registry.get("candidates_sha256") != digest(rows):\n        raise QuestionSupplyError("candidate_registry_digest_invalid")\n    return [deepcopy(dict(row)) for row in rows if isinstance(row, Mapping)]''',
              '''    rows = registry.get("candidates")\n    if not isinstance(rows, list) or registry.get("candidates_sha256") != digest(rows):\n        raise QuestionSupplyError("candidate_registry_digest_invalid")\n    semantic_sha256 = candidate_registry_semantic_digest(rows)\n    if registry.get("semantic_sha256") != semantic_sha256:\n        raise QuestionSupplyError("candidate_registry_semantic_digest_invalid")\n    return [deepcopy(dict(row)) for row in rows if isinstance(row, Mapping)], semantic_sha256''',
              "load_candidates_semantic_validation",
          )
          r4 = replace_once(
              r4,
              '''            admitted = deepcopy(candidate)\n            admitted["learner_contract"] = validated_learner\n            admitted["private_scoring_contract"] = validated_scoring''',
              '''            admitted = deepcopy(candidate)\n            review = deepcopy(dict(admitted["authority_review"]))\n            review.pop("reviewed_at", None)\n            admitted["authority_review"] = review\n            admitted["learner_contract"] = validated_learner\n            admitted["private_scoring_contract"] = validated_scoring''',
              "externalize_review_timestamp",
          )
          r4 = replace_once(
              r4,
              '''    candidates = _load_candidates(\n        candidates_path,\n        ontology_sha256=ontology["ontology_sha256"],\n        coverage_sha256=coverage_sha256,\n    )''',
              '''    candidates, candidate_registry_semantic_sha256 = _load_candidates(\n        candidates_path,\n        ontology_sha256=ontology["ontology_sha256"],\n        coverage_sha256=coverage_sha256,\n    )''',
              "build_load_candidates",
          )
          r4 = replace_once(
              r4,
              '''            "candidate_registry_sha256": file_digest(candidates_path),''',
              '''            "candidate_registry_sha256": candidate_registry_semantic_sha256,''',
              "bank_semantic_binding",
          )
          r4 = replace_once(
              r4,
              '''            "recent_reuse_policy_source": "CELL_CAPACITY_POLICY",\n        },''',
              '''            "recent_reuse_policy_source": "CELL_CAPACITY_POLICY",\n            "authority_review_timestamp_externalized": True,\n        },''',
              "selection_contract_audit_boundary",
          )
          r4_path.write_text(r4, encoding="utf-8", newline="\n")

          validator_path = Path("ulga/validators/validate_a1fs_v1_r3r4_authority_reviewed_production_population.py")
          validator = validator_path.read_text(encoding="utf-8")
          validator = replace_once(
              validator,
              '''    if candidates and candidates.get("candidates_sha256") != r4.digest(candidate_rows):\n        errors.append("candidate_registry_digest_invalid")\n    if bank:''',
              '''    if candidates and candidates.get("candidates_sha256") != r4.digest(candidate_rows):\n        errors.append("candidate_registry_digest_invalid")\n    if candidates and candidates.get("semantic_sha256") != r4.candidate_registry_semantic_digest(candidate_rows):\n        errors.append("candidate_registry_semantic_digest_invalid")\n    if bank:''',
              "validator_semantic_digest",
          )
          validator = replace_once(
              validator,
              '''        if bank.get("item_count") != len(bank.get("items", [])):\n            errors.append("practice_bank_count_invalid")''',
              '''        if bank.get("item_count") != len(bank.get("items", [])):\n            errors.append("practice_bank_count_invalid")\n        for item in bank.get("items", []):\n            review = item.get("authority_review", {}) if isinstance(item, Mapping) else {}\n            if isinstance(review, Mapping) and "reviewed_at" in review:\n                errors.append(f"practice_bank_volatile_review_timestamp:{item.get('item_id')}")''',
              "validator_bank_timestamp_boundary",
          )
          validator_path.write_text(validator, encoding="utf-8", newline="\n")

          population_test = Path("tests/ulga/test_a1fs_v1_r3r4_authority_reviewed_production_population.py")
          text = population_test.read_text(encoding="utf-8")
          marker = "def test_materialization_identity_is_stable_across_review_times"
          if marker not in text:
              text += '''\n\ndef test_materialization_identity_is_stable_across_review_times(tmp_path: Path, monkeypatch) -> None:\n    monkeypatch.setattr(population, "REPO_ROOT", tmp_path)\n    ontology, graph, consumer = _fixture(tmp_path)\n    first_root = tmp_path / ".local" / "population_first"\n    second_root = tmp_path / ".local" / "population_second"\n    first_report = population.materialize(\n        ontology_path=ontology, graph_path=graph, consumer_path=consumer,\n        output_root=first_root, reviewed_at="2026-07-19T01:00:00Z",\n    )\n    second_report = population.materialize(\n        ontology_path=ontology, graph_path=graph, consumer_path=consumer,\n        output_root=second_root, reviewed_at="2026-07-19T02:00:00Z",\n    )\n    first_bank = json.loads((first_root / population.BANK_OUTPUT).read_text(encoding="utf-8"))\n    second_bank = json.loads((second_root / population.BANK_OUTPUT).read_text(encoding="utf-8"))\n    first_supply = json.loads((first_root / population.SUPPLY_OUTPUT).read_text(encoding="utf-8"))\n    second_supply = json.loads((second_root / population.SUPPLY_OUTPUT).read_text(encoding="utf-8"))\n    first_candidates = json.loads((first_root / population.CANDIDATE_OUTPUT).read_text(encoding="utf-8"))\n    second_candidates = json.loads((second_root / population.CANDIDATE_OUTPUT).read_text(encoding="utf-8"))\n\n    assert first_report["reviewed_at"] != second_report["reviewed_at"]\n    assert first_candidates["candidates_sha256"] != second_candidates["candidates_sha256"]\n    assert first_candidates["semantic_sha256"] == second_candidates["semantic_sha256"]\n    assert first_bank == second_bank\n    assert first_bank["bank_sha256"] == second_bank["bank_sha256"]\n    assert first_supply == second_supply\n    assert first_supply["report_sha256"] == second_supply["report_sha256"]\n    assert all("reviewed_at" not in item["authority_review"] for item in first_bank["items"])\n'''
          population_test.write_text(text, encoding="utf-8", newline="\n")

          bootstrap_test = Path("tests/ulga/test_a1fs_v1_r5_production_bootstrap_first_session.py")
          text = bootstrap_test.read_text(encoding="utf-8")
          marker = "def test_second_bootstrap_reuses_stable_bank_without_rebind"
          if marker not in text:
              text += '''\n\ndef test_second_bootstrap_reuses_stable_bank_without_rebind(tmp_path: Path, monkeypatch) -> None:\n    ontology, graph, consumer, database, first_output, first_report = _bootstrap(tmp_path, monkeypatch)\n    second_output = tmp_path / ".local/r5_bootstrap_second"\n    second_report = bootstrap.bootstrap(\n        database_path=database,\n        ontology_path=ontology,\n        graph_path=graph,\n        output_root=second_output,\n        learner_id="learner-anonymous-02",\n        display_label="A1 Learner 2",\n        purpose="CORE_PRACTICE",\n        planned_item_count=1,\n        consumer_search_root=tmp_path / ".local",\n        reviewed_at="2026-07-19T04:00:00Z",\n        port=8877,\n    )\n    first_private = json.loads((first_output / bootstrap.PRIVATE_RECEIPT).read_text(encoding="utf-8"))\n    second_private = json.loads((second_output / bootstrap.PRIVATE_RECEIPT).read_text(encoding="utf-8"))\n    assert first_report["validation_status"] == bootstrap.STATUS\n    assert second_report["validation_status"] == bootstrap.STATUS\n    assert first_private["source_bindings"]["practice_bank_sha256"] == second_private["source_bindings"]["practice_bank_sha256"]\n    assert first_private["source_bindings"]["supply_report_sha256"] == second_private["source_bindings"]["supply_report_sha256"]\n'''
          bootstrap_test.write_text(text, encoding="utf-8", newline="\n")
          PY
          python -m compileall -q \
            ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py \
            ulga/validators/validate_a1fs_v1_r3r4_authority_reviewed_production_population.py \
            tests/ulga/test_a1fs_v1_r3r4_authority_reviewed_production_population.py \
            tests/ulga/test_a1fs_v1_r5_production_bootstrap_first_session.py
          python -m pytest -q \
            tests/ulga/test_a1fs_v1_r3r4_authority_reviewed_production_population.py \
            tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py \
            tests/ulga/test_a1fs_v1_r5_production_bootstrap_first_session.py \
            tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py \
            tests/ulga/test_a1fs_v1_stimulus_answerability_fullfix.py
          git diff --check
      - name: Commit deterministic production fix
        shell: bash
        run: |
          paths=(
            ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py
            ulga/validators/validate_a1fs_v1_r3r4_authority_reviewed_production_population.py
            tests/ulga/test_a1fs_v1_r3r4_authority_reviewed_production_population.py
            tests/ulga/test_a1fs_v1_r5_production_bootstrap_first_session.py
          )
          changed=$(git status --porcelain -- "${paths[@]}" | wc -l)
          test "$changed" -eq 4
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${paths[@]}"
          git commit -m "Make R5 production materialization deterministic"
          git push origin HEAD:fix/a1fs-v1-r5-deterministic-production-bootstrap
