name: A1FS V1 M0 Four-Skill Asset Body Baseline

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_m0_four_skill_asset_body_baseline.py"
      - "ulga/validators/validate_a1fs_v1_m0_four_skill_asset_body_baseline.py"
      - "ulga/schemas/a1fs_v1_m0_four_skill_asset_body_baseline.schema.json"
      - "tests/ulga/test_a1fs_v1_m0_four_skill_asset_body_baseline.py"
      - ".github/workflows/a1fs-v1-m0-four-skill-asset-body-baseline.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements.txt pytest
      - name: Run M0 fixture and adversarial tests
        run: python -m pytest -q tests/ulga/test_a1fs_v1_m0_four_skill_asset_body_baseline.py
