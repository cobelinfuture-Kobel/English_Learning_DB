name: TEMP R8 Formal M08 Bank Detection Writeback

on:
  push:
    branches:
      - fix/a1fs-v1-r8-formal-m08-bank-detection

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r8-formal-m08-bank-detection
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest jsonschema openpyxl
      - name: Patch formal M08 bank detection
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py")
          text = path.read_text(encoding="utf-8")
          old = '''        if (
              value.get("task_id") == m08.TASK_ID
              and value.get("schema_version") == m08.SESSION_SCHEMA_VERSION
              and value.get("private_local_only") is True
              and value.get("item_count") == legacy.EXPECTED_ATTEMPTS
              and isinstance(value.get("items"), list)
              and len(value["items"]) == legacy.EXPECTED_ATTEMPTS
          ):
              banks[m08.sha256_value(value)].append(path)
          '''
          new = '''        items = value.get("items")
          if (
              value.get("task_id") == m08.TASK_ID
              and value.get("schema_version") == m08.SESSION_SCHEMA_VERSION
              and value.get("private_local_only") is True
              and isinstance(items, list)
              and isinstance(value.get("item_count"), int)
              and value.get("item_count") == len(items)
              and len(items) >= legacy.EXPECTED_ATTEMPTS
              and len({
                  str(item.get("item_id"))
                  for item in items
                  if isinstance(item, Mapping) and isinstance(item.get("item_id"), str)
              }) == len(items)
              and (
                  "items_sha256" not in value
                  or value.get("items_sha256") == m08.sha256_value(items)
              )
          ):
              banks[m08.sha256_value(value)].append(path)
          '''
          if old not in text:
              if new in text:
                  raise SystemExit(0)
              raise SystemExit("formal M08 bank detection block not found")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Compile and focused tests
        run: |
          python -m compileall -q \
            ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py
          python -m pytest -q \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_e4s_a1v1_m12f_m12e1_to_a1fs_remediation_bridge.py
          git diff --check
      - name: Commit bounded writeback
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py
          git commit -m "Fix formal M08 session bank detection"
          git push origin HEAD:fix/a1fs-v1-r8-formal-m08-bank-detection
