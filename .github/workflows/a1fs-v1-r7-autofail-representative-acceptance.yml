name: A1FS V1 R7 AUTOFAIL Representative Acceptance

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/build_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py"
      - "ulga/builders/build_a1fs_v1_r7_scoring_contract_too_narrow_runtime_fullfix.py"
      - "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "ulga/validators/validate_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py"
      - "ulga/validators/validate_a1fs_v1_r7_scoring_contract_too_narrow_runtime_fullfix.py"
      - "ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py"
      - ".github/workflows/a1fs-v1-r7-autofail-representative-acceptance.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py"
      - "ulga/builders/build_a1fs_v1_r7_scoring_contract_too_narrow_runtime_fullfix.py"
      - "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "ulga/validators/validate_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py"
      - "ulga/validators/validate_a1fs_v1_r7_scoring_contract_too_narrow_runtime_fullfix.py"
      - "ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py"
      - ".github/workflows/a1fs-v1-r7-autofail-representative-acceptance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest jsonschema
      - name: Compile gate implementation
        run: |
          python -m py_compile \
            ulga/builders/build_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py \
            ulga/builders/build_a1fs_v1_r7_scoring_contract_too_narrow_runtime_fullfix.py \
            ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            ulga/validators/validate_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py \
            ulga/validators/validate_a1fs_v1_r7_scoring_contract_too_narrow_runtime_fullfix.py \
            ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
      - name: Run focused representative acceptance regressions
        run: |
          python -m pytest -q \
            tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r7_real_evidence_autofail_root_cause_and_representative_acceptance_gate.py \
            tests/ulga/test_a1fs_v1_r7_route_batch_execution_and_replay_closure.py
      - name: Verify no generated artifact was committed
        run: test -z "$(git status --porcelain)"
