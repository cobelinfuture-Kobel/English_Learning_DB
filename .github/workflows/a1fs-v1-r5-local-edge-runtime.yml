name: A1FS V1 R5 Local Edge Runtime

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r5_observability_upgrade.py"
      - ".github/workflows/a1fs-v1-r5-local-edge-runtime.yml"
      - ".github/workflows/temp-a1fs-v1-r7-code-fullfix-observability-writeback.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bounded-writeback:
    if: github.head_ref == 'fix/a1fs-v1-r7-code-fullfix-observability-closure' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Execute reviewed bounded patch recipe
        shell: bash
        run: |
          python -m pip install pyyaml
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import yaml

          recipe = Path('.github/workflows/temp-a1fs-v1-r7-code-fullfix-observability-writeback.yml')
          data = yaml.safe_load(recipe.read_text(encoding='utf-8'))
          steps = data['jobs']['patch']['steps']
          selected = {
              'Apply bounded R5 observability full fix',
              'Run focused and upstream regression',
              'Commit bounded implementation',
          }
          for step in steps:
              if step.get('name') in selected:
                  subprocess.run(step['run'], shell=True, executable='/bin/bash', check=True)
          PY

  local-runtime-validation:
    if: github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - name: Validate final R5 observability implementation
        run: >-
          python -m pytest -q
          tests/ulga/test_a1fs_v1_r5_observability_upgrade.py
          tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
          tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py
