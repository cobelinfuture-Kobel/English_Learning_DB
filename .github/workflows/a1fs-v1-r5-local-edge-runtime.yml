name: A1FS V1 R5 Local Edge Runtime

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "tests/ulga/test_a1fs_v1_r5_observability_upgrade.py"
      - ".github/scripts/temp_a1fs_v1_r7_observability_patch.py"
      - ".github/workflows/a1fs-v1-r5-local-edge-runtime.yml"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  bounded-writeback:
    if: github.head_ref == 'fix/a1fs-v1-r7-code-fullfix-observability-closure' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Apply, validate, and commit bounded implementation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > .github/workflows/a1fs-v1-r5-local-edge-runtime.yml <<'YAML'
          name: A1FS V1 R5 Local Edge Runtime

          on:
            pull_request:
              paths:
                - "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
                - "ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
                - "tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
                - ".github/workflows/a1fs-v1-r5-local-edge-runtime.yml"
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            local-runtime-validation:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                    cache: pip
                - run: python -m pip install pytest jsonschema openpyxl
                - run: >-
                    python -m compileall -q
                    ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
                    ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
                - name: Full R5 and upstream non-regression
                  run: >-
                    python -m pytest -q
                    tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
                    tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py
                    tests/ulga/test_a1fs_v1_r1_evidence_validity_system_error_governance.py
                    tests/ulga/test_a1fs_v1_m3_learner_profile_session_state_storage.py
                    tests/ulga/test_a1fs_v1_m6_response_capture_scoring_m12_evidence.py
          YAML
          set +e
          python .github/scripts/temp_a1fs_v1_r7_observability_patch.py > /tmp/r7-patch.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            gh pr comment 239 --body "R7 CODE_FULLFIX patch diagnostic:\n\n\`\`\`text\n$(tail -40 /tmp/r7-patch.log)\n\`\`\`"
            exit "$status"
          fi
          python -m pip install pytest jsonschema openpyxl >/dev/null
          python -m compileall -q \
            ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r5_observability_upgrade.py \
            > /tmp/r7-compile.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            gh pr comment 239 --body "R7 CODE_FULLFIX compile diagnostic:\n\n\`\`\`text\n$(tail -40 /tmp/r7-compile.log)\n\`\`\`"
            exit "$status"
          fi
          python -m pytest -q --tb=short \
            tests/ulga/test_a1fs_v1_r5_observability_upgrade.py \
            tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py \
            tests/ulga/test_a1fs_v1_r1_evidence_validity_system_error_governance.py \
            tests/ulga/test_a1fs_v1_m3_learner_profile_session_state_storage.py \
            tests/ulga/test_a1fs_v1_m6_response_capture_scoring_m12_evidence.py \
            > /tmp/r7-tests.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            gh pr comment 239 --body "R7 CODE_FULLFIX test diagnostic:\n\n\`\`\`text\n$(tail -80 /tmp/r7-tests.log)\n\`\`\`"
            exit "$status"
          fi
          git diff --check > /tmp/r7-diff.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            gh pr comment 239 --body "R7 CODE_FULLFIX diff diagnostic:\n\n\`\`\`text\n$(tail -40 /tmp/r7-diff.log)\n\`\`\`"
            exit "$status"
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            ulga/validators/validate_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r5_observability_upgrade.py
          git commit -m "Capture hash-bound learner stimulus observability in R5 evidence" > /tmp/r7-commit.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            gh pr comment 239 --body "R7 CODE_FULLFIX commit diagnostic:\n\n\`\`\`text\n$(tail -40 /tmp/r7-commit.log)\n$(git status --short)\n\`\`\`"
            exit "$status"
          fi
          git push origin HEAD:${{ github.head_ref }} > /tmp/r7-push.log 2>&1
          status=$?
          if [ "$status" -ne 0 ]; then
            gh pr comment 239 --body "R7 CODE_FULLFIX push diagnostic:\n\n\`\`\`text\n$(tail -40 /tmp/r7-push.log)\n\`\`\`"
            exit "$status"
          fi

  local-runtime-validation:
    if: github.actor == 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema openpyxl
      - name: Validate final R5 observability implementation
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_a1fs_v1_r5_observability_upgrade.py
          tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
          tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py
          tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py
