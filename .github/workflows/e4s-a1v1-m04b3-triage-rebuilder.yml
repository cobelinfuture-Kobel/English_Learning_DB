name: E4S A1V1 M04B3 Triage Rebuilder

on:
  pull_request:
    paths:
      - "ulga/builders/rebuild_a1_a1plus_reading_ai_assisted_triage.py"
      - "tests/ulga/test_a1_a1plus_reading_ai_assisted_triage_rebuilder.py"
      - "ulga/builders/materialize_a1_a1plus_reading_operator_decisions.py"
      - ".github/workflows/e4s-a1v1-m04b3-triage-rebuilder.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install pytest jsonschema
      - name: Compile
        run: |
          python -m py_compile \
            ulga/builders/rebuild_a1_a1plus_reading_ai_assisted_triage.py \
            ulga/builders/materialize_a1_a1plus_reading_operator_decisions.py
      - name: Run focused tests
        run: |
          python -m pytest -q \
            tests/ulga/test_a1_a1plus_reading_ai_assisted_triage_rebuilder.py \
            tests/ulga/test_a1_a1plus_reading_operator_decision_materialization.py
