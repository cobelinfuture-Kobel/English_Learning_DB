name: R7 M105R Learner Safe Delivery

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - tools/r7_m105r_apply_learner_safe_item_delivery_fullfix.py
      - .github/workflows/r7-m105r-learner-safe-delivery.yml

permissions:
  contents: write

concurrency:
  group: r7-m105r-learner-safe-delivery-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  apply-test-and-commit:
    if: github.head_ref == 'agent/r7-m105r-learner-safe-item-delivery-fullfix'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install focused test dependency
        run: python -m pip install --disable-pip-version-check pytest

      - name: Apply atomic learner-safe delivery FullFix
        run: python tools/r7_m105r_apply_learner_safe_item_delivery_fullfix.py

      - name: Compile modified runtime files
        run: |
          python -m py_compile \
            ulga/builders/build_a1_grammar_text_mode_practice_item_fullfix.py \
            ulga/builders/run_a1_grammar_text_mode_private_pilot_next_unit.py \
            ulga/builders/run_a1_grammar_text_mode_review_session.py

      - name: Run focused A1/A1+ learner-delivery chain
        run: |
          python -m pytest \
            tests/ulga/test_a1_grammar_text_mode_practice_item_fullfix.py \
            tests/ulga/test_a1_grammar_text_mode_review_session.py \
            tests/ulga/test_a1_grammar_text_mode_private_pilot_next_unit.py \
            tests/ulga/test_a1_grammar_text_mode_private_pilot_real_attempt_import.py \
            tests/ulga/test_a1_grammar_text_mode_evidence_defaults_and_projection.py \
            tests/ulga/test_a1_grammar_text_mode_retention_evidence_intake.py \
            tests/ulga/test_a1_grammar_retention_nonblocking_workflow.py \
            -q

      - name: Validate learner-facing item rendering
        run: |
          python - <<'PY'
          import io
          from contextlib import redirect_stdout

          from ulga.builders.build_a1_grammar_text_mode_private_pilot_package import (
              build_and_validate_from_repo,
          )
          from ulga.builders.run_a1_grammar_text_mode_private_pilot_next_unit import (
              _display_item,
              _learner_task_material,
              _learner_visible_context,
          )

          package, report = build_and_validate_from_repo()
          assert report["validation_status"] == "PASS", report
          assert len(package["learning_units"]) == 24
          assert len(package["by_egp_row_id"]) == 109
          assert len(package["item_bank"]) == 192

          index = {item["item_id"]: item for item in package["item_bank"]}
          p04 = index["GRAMMAR_REGULAR_PLURAL_NOUNS__TFX_P04"]
          p05 = index["GRAMMAR_REGULAR_PLURAL_NOUNS__TFX_P05"]
          p06 = index["GRAMMAR_REGULAR_PLURAL_NOUNS__TFX_P06"]
          a02 = index["GRAMMAR_REGULAR_PLURAL_NOUNS__TFX_A02"]

          assert p04["gap_spec"]["cue_contract"] == "REGULAR_PLURAL_SOURCE_FORM"
          assert p04["gap_spec"]["source_form"] == "cat"
          assert p04["prompt"] == 'Write the regular plural form of "cat": ____'
          assert _learner_task_material(p04) == ("Source form", ["cat"])

          assert _learner_task_material(p05) == ("Supplied parts", ["es", "box"])

          for item in package["item_bank"]:
              context = item.get("context", {})
              assert "model_target" not in context, item["item_id"]

          for item, forbidden in ((p06, "buses"), (a02, "boxes")):
              visible = _learner_visible_context(item)
              assert "model_target" not in visible
              stream = io.StringIO()
              with redirect_stdout(stream):
                  _display_item(item, 1, 1)
              rendered = stream.getvalue()
              assert "model_target" not in rendered
              assert forbidden not in rendered

          print("PASS_LEARNER_SAFE_RENDERING_24_UNITS_109_ROWS_192_ITEMS")
          PY

      - name: Enforce scoped diff
        run: |
          git diff --check
          python - <<'PY'
          import subprocess

          expected = {
              "tests/ulga/test_a1_grammar_text_mode_practice_item_fullfix.py",
              "tests/ulga/test_a1_grammar_text_mode_review_session.py",
              "ulga/builders/build_a1_grammar_text_mode_practice_item_fullfix.py",
              "ulga/builders/run_a1_grammar_text_mode_private_pilot_next_unit.py",
          }
          actual = {
              line.strip()
              for line in subprocess.check_output(
                  ["git", "diff", "--name-only"], text=True
              ).splitlines()
              if line.strip()
          }
          assert actual == expected, {"expected": sorted(expected), "actual": sorted(actual)}
          print("PASS_SCOPED_FOUR_FILE_DIFF")
          PY

      - name: Commit validated FullFix to feature branch
        run: |
          rm tools/r7_m105r_apply_learner_safe_item_delivery_fullfix.py
          find . -type d -name __pycache__ -prune -exec rm -rf {} +
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            ulga/builders/build_a1_grammar_text_mode_practice_item_fullfix.py \
            ulga/builders/run_a1_grammar_text_mode_private_pilot_next_unit.py \
            tests/ulga/test_a1_grammar_text_mode_practice_item_fullfix.py \
            tests/ulga/test_a1_grammar_text_mode_review_session.py \
            tools/r7_m105r_apply_learner_safe_item_delivery_fullfix.py
          git diff --cached --check
          git commit -m "R7-M105R make learner item delivery complete and answer-safe"
          git push origin HEAD:${{ github.head_ref }}
