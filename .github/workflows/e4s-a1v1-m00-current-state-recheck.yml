name: E4S A1V1 M00 Current State Recheck

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/build_e4s_a1v1_current_state_recheck.py"
      - "ulga/builders/build_a1_a1plus_actual_coverage_recheck.py"
      - "ulga/builders/build_a1_a1plus_synthetic_gap_inventory.py"
      - "ulga/builders/build_a1_grammar_cross_skill_closure.py"
      - "ulga/builders/build_a1_grammar_operator_confirmation_text_mode_pilot.py"
      - "ulga/builders/build_a1_grammar_text_mode_private_pilot_package.py"
      - "ulga/builders/build_a1_private_pilot_next_unit_pages_payload.py"
      - "tests/ulga/test_e4s_a1v1_m00_current_state_recheck.py"
      - ".github/workflows/e4s-a1v1-m00-current-state-recheck.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_e4s_a1v1_current_state_recheck.py"
      - "ulga/builders/build_a1_a1plus_actual_coverage_recheck.py"
      - "ulga/builders/build_a1_a1plus_synthetic_gap_inventory.py"
      - "ulga/builders/build_a1_grammar_cross_skill_closure.py"
      - "ulga/builders/build_a1_grammar_operator_confirmation_text_mode_pilot.py"
      - "ulga/builders/build_a1_grammar_text_mode_private_pilot_package.py"
      - "ulga/builders/build_a1_private_pilot_next_unit_pages_payload.py"
      - "tests/ulga/test_e4s_a1v1_m00_current_state_recheck.py"
      - ".github/workflows/e4s-a1v1-m00-current-state-recheck.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Recompute A1/A1+ four-skill baseline
        run: |
          python ulga/builders/build_e4s_a1v1_current_state_recheck.py \
            --output /tmp/e4s_a1v1_current_state_recheck.json \
            > /tmp/e4s-a1v1-m00.log
      - name: Run M00 focused regression tests
        run: python -m pytest tests/ulga/test_e4s_a1v1_m00_current_state_recheck.py -q
      - name: Re-run load-bearing existing coverage tests
        run: |
          python -m pytest \
            tests/ulga/test_m106_a1_a1plus_actual_coverage_recheck.py \
            tests/ulga/test_a1_grammar_cross_skill_closure.py \
            tests/ulga/test_m105p09_synthetic_gap_inventory.py \
            tests/ulga/test_m105r1_github_pages_temporary_review_ui.py \
            -q
      - name: Verify baseline gate and continuation
        run: |
          python - <<'PY'
          import json

          report = json.load(
              open('/tmp/e4s_a1v1_current_state_recheck.json', encoding='utf-8')
          )
          assert report['validation_status'] == 'PASS_CURRENT_STATE_BASELINE_RECOMPUTED'
          assert report['current_position'] == 'M00_COMPLETE_M01_NEXT'
          assert report['coverage_summary']['canonical_row_count'] == 109
          assert report['coverage_summary']['covered_row_count'] == 109
          assert report['coverage_summary']['canonical_unit_count'] == 24
          assert report['coverage_summary']['synthetic_pass_unit_count'] == 24
          assert report['coverage_summary']['synthetic_gap_unit_count'] == 0
          assert report['coverage_summary']['rendered_listening_audio_asset_count'] == 0
          assert report['coverage_summary']['captured_speaking_audio_asset_count'] == 0
          assert report['claim_boundaries']['full_four_skill_release_complete'] is False
          assert report['claim_boundaries']['a2_a2plus_in_scope'] is False
          assert report['stop_reason'] == 'NONE'
          assert report['next_short_step'] == 'E4S-A1V1-M01_AuthorityScopeAndQueryCompleteness'
          PY
