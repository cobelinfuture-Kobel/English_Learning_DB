name: M12G Dual Writing Diagnostic

on:
  pull_request:
    paths:
      - "ulga/builders/build_e4s_a1v1_m12g_dual_writing_reassessment_review_completion.py"
      - "tests/ulga/test_e4s_a1v1_m12g_dual_writing_reassessment_review_completion.py"
      - ".github/workflows/m12g-dual-writing-diagnostic.yml"

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --disable-pip-version-check pytest jsonschema
      - name: Run focused test and capture log
        id: focused
        shell: pwsh
        continue-on-error: true
        run: |
          python -m pytest -q --tb=short tests/ulga/test_e4s_a1v1_m12g_dual_writing_reassessment_review_completion.py *> dual-writing-test.log
          "exit_code=$LASTEXITCODE" >> $env:GITHUB_OUTPUT
      - name: Upload focused log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dual-writing-test-log
          path: dual-writing-test.log
      - name: Enforce focused test result
        if: always()
        shell: pwsh
        run: |
          if ('${{ steps.focused.outputs.exit_code }}' -ne '0') {
            throw 'Focused dual-writing test failed; inspect uploaded log.'
          }
