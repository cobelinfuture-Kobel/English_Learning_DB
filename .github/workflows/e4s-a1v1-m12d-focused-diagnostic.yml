name: E4S A1V1 M12D Focused Diagnostic

on:
  push:
    branches:
      - agent/e4s-a1v1-m12d-representative-pilot-expansion
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-diagnostic:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Run focused tests with JUnit
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m12d-diagnostic | Out-Null
          python -m pytest -q --tb=long `
            --junitxml=generated/m12d-diagnostic/focused.xml `
            tests/ulga/test_e4s_a1v1_m12d_representative_pilot_expansion.py
      - name: Upload focused diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m12d-focused-diagnostic
          path: generated/m12d-diagnostic
          if-no-files-found: error
          retention-days: 1
