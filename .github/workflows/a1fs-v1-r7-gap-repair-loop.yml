name: A1FS V1 R7 Gap Repair Loop

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py"
      - "ulga/validators/validate_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py"
      - "tests/ulga/test_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py"
      - ".github/workflows/a1fs-v1-r7-gap-repair-loop.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repair-loop-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py
          ulga/validators/validate_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py
      - run: >-
          python -m pytest -q
          tests/ulga/test_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py
          tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py
          tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
          tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py
          tests/ulga/test_a1fs_v1_r1_evidence_validity_system_error_governance.py
