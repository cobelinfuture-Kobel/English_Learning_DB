name: E4S A1V1 M04 Reading Integration Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/build_e4s_a1v1_reading_v1_integration_gate.py"
      - "ulga/validators/validate_e4s_a1v1_reading_v1_integration_gate.py"
      - "ulga/builders/build_a1_a1plus_shared_item_contract.py"
      - "ulga/builders/build_reading_v1_practice_bank.py"
      - "ulga/builders/build_raz_reading_authority_intake_query_index.py"
      - "tests/ulga/test_e4s_a1v1_m04_reading_v1_integration_gate.py"
      - ".github/workflows/e4s-a1v1-m04-reading-v1-integration-gate.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Build Reading integration and source gate
        run: |
          python ulga/builders/build_e4s_a1v1_reading_v1_integration_gate.py \
            --output /tmp/e4s_a1v1_reading_v1_integration_gate.json
      - name: Validate Reading integration source gate
        run: python ulga/validators/validate_e4s_a1v1_reading_v1_integration_gate.py
      - name: Run M04A focused tests
        run: python -m pytest tests/ulga/test_e4s_a1v1_m04_reading_v1_integration_gate.py -q
      - name: Re-run ReadingV1 and M03 regressions
        shell: bash
        run: |
          mapfile -t regression_tests < <(
            find tests/ulga -type f -name '*.py' | sort | \
            grep -E '(reading_v1_practice_bank|raz_reading_authority_intake_query_index_builder_output|e4s_a1v1_m03)' || true
          )
          printf 'Resolved regression tests:\n%s\n' "${regression_tests[*]}"
          if [ "${#regression_tests[@]}" -lt 3 ]; then
            echo 'Insufficient ReadingV1/M03/source-index regression coverage.' >&2
            exit 1
          fi
          python -m pytest "${regression_tests[@]}" -q
      - name: Verify fail-closed source blocker
        run: |
          python - <<'PY'
          import json

          report = json.load(open('/tmp/e4s_a1v1_reading_v1_integration_gate.json', encoding='utf-8'))
          assert report['validation_status'] == 'PASS_READING_INTEGRATION_SOURCE_GAP_IDENTIFIED'
          assert report['reading_grammar_integration']['shared_reading_item_count'] == 96
          assert report['reading_grammar_integration']['learning_unit_count'] == 24
          assert report['reading_v1_contract_fixture']['item_count'] == 6
          assert report['reading_source_availability']['github_ci_readable_intake_item_count'] == 0
          assert report['reading_source_availability']['raw_source_text_persisted'] is False
          assert report['m04_gate']['grammar_reading_bank_integrated'] is True
          assert report['m04_gate']['reading_v1_six_type_contract_healthy'] is True
          assert report['m04_gate']['source_grounded_comprehension_content_available'] is False
          assert report['m04_gate']['reading_v1_complete'] is False
          assert report['m04_gate']['m05_progression_allowed'] is False
          assert report['stop_reason'] == 'SOURCE_EVIDENCE_REQUIRED'
          assert report['blocker_type'] == 'CI_READABLE_READING_SOURCE_ARTIFACT_MISSING'
          assert report['next_short_step'] is None
          assert report['next_resume_task'] == 'E4S-A1V1-M04B_SourceGroundedReadingPracticeBankCompletion'
          PY
