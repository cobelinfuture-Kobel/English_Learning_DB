name: TEMP A1FS V1 R8 selected lineage push trigger

on:
  push:
    branches:
      - fix/a1fs-v1-r8-selected-lineage-r6-intake

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r8-selected-lineage-r6-intake
          fetch-depth: 0

      - name: Execute bounded patch embedded in PR workflow
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/temp-a1fs-v1-r8-selected-lineage-r6-intake-writeback.yml')
          text = workflow.read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "          PY\n\n      - name: Compile and focused regression tests"
          start = text.index(start_marker) + len(start_marker)
          end = text.index(end_marker, start)
          script = textwrap.dedent(text[start:end])
          exec(compile(script, str(workflow), 'exec'))
          PY

      - name: Compile and focused regression tests
        run: |
          python -m py_compile \
            ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py
          python -m pytest -q \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py \
            tests/ulga/test_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py \
            tests/ulga/test_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py

      - name: Commit bounded implementation
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py
          if git diff --cached --quiet; then
            echo "No implementation changes to commit"
          else
            git commit -m "Persist selected R8 lineage and build R6 intake"
            git push origin HEAD:fix/a1fs-v1-r8-selected-lineage-r6-intake
          fi
