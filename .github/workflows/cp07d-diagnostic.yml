name: CP07D Diagnostic

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py"
      - "ulga/validators/validate_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py"
      - "tests/ulga/test_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py"
      - "tests/ulga/conftest.py"
      - ".github/workflows/cp07d-diagnostic.yml"

permissions:
  contents: read

jobs:
  cp07d-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Upload exact CP07D sources
        uses: actions/upload-artifact@v4
        with:
          name: cp07d-source-snapshot
          path: |
            ulga/builders/build_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py
            ulga/validators/validate_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py
            tests/ulga/test_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py
          retention-days: 1
