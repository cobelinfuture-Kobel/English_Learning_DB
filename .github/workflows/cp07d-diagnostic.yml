name: CP07D Diagnostic

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py"
      - "ulga/validators/validate_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py"
      - "tests/ulga/test_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py"
      - ".github/workflows/cp07d-diagnostic.yml"

permissions:
  contents: read

jobs:
  cp07d-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -q pytest openpyxl jsonschema
      - id: test
        name: Capture CP07D pytest log
        shell: bash
        run: |
          set +e
          python -m pytest -q tests/ulga/test_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py > cp07d-pytest.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload CP07D pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cp07d-pytest-log
          path: cp07d-pytest.log
          retention-days: 1
      - name: Enforce pytest result
        shell: bash
        run: test "${{ steps.test.outputs.status }}" = "0"
