name: CP07D One-Shot Exact Patch

on:
  push:
    branches:
      - "agent/a1fs-v1-cp07d-four-skill-delivery-canary"
    paths:
      - ".github/workflows/cp07d-diagnostic.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "agent/a1fs-v1-cp07d-four-skill-delivery-canary"
          fetch-depth: 0
      - name: Apply exact CP07D production and regression patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          builder = Path("ulga/builders/build_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py")
          text = builder.read_text(encoding="utf-8")
          replacements = [
              (
                  '    *, projection: Mapping[str, Any], lesson_id: str, skill: str, role: str, suffix: str, capture: bool\n',
                  '    *, projection: Mapping[str, Any], lesson_id: str, lesson_level: str, skill: str, role: str, suffix: str, capture: bool\n',
              ),
              (
                  '        "level": projection["level_scope"][0] if len(projection["level_scope"]) == 1 else "A1+",\n',
                  '        "level": lesson_level,\n',
              ),
              (
                  'def _assets_for_projection(projection: Mapping[str, Any], lesson_id: str) -> list[dict[str, Any]]:\n',
                  'def _assets_for_projection(projection: Mapping[str, Any], lesson_id: str, lesson_level: str) -> list[dict[str, Any]]:\n',
              ),
              (
                  '_base_asset(projection=projection, lesson_id=lesson_id, skill=skill, role=',
                  '_base_asset(projection=projection, lesson_id=lesson_id, lesson_level=lesson_level, skill=skill, role=',
              ),
              (
                  '        projected_assets.extend(_assets_for_projection(projection, lesson_id))\n',
                  '        projected_assets.extend(_assets_for_projection(projection, lesson_id, str(lesson["level"])))\n',
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"builder patch target missing: {old!r}")
              text = text.replace(old, new)
          builder.write_text(text, encoding="utf-8")

          validator = Path("ulga/validators/validate_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py")
          text = validator.read_text(encoding="utf-8")
          old = '''        if asset.get("level") not in {"A1", "A1+"}:
              errors.append(f"projected_asset_a2_or_level_invalid:{key}")
          '''
          new = '''        if asset.get("level") != selected_lesson.get("level"):
              errors.append(f"projected_asset_selected_lesson_level_drift:{key}")
          '''
          if old not in text:
              raise SystemExit("validator level target missing")
          validator.write_text(text.replace(old, new), encoding="utf-8")

          tests = Path("tests/ulga/test_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py")
          text = tests.read_text(encoding="utf-8")
          replacements = [
              ('def _approved(skill: str) -> dict:\n', 'def _approved(skill: str, level_scope: list[str] | None = None) -> dict:\n'),
              ('        level_scope=["A1"],\n', '        level_scope=level_scope or ["A1"],\n'),
              (
                  'def _initialize_runtime(tmp_path: Path, skill: str) -> tuple[dict, dict, Path, m3.LearnerStateStore, m6.ResponseEvidenceStore]:\n    inputs = _inputs(skill)\n',
                  'def _initialize_runtime(tmp_path: Path, skill: str) -> tuple[dict, dict, Path, m3.LearnerStateStore, m6.ResponseEvidenceStore]:\n    tmp_path.mkdir(parents=True, exist_ok=True)\n    inputs = _inputs(skill)\n',
              ),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f"test patch target missing: {old!r}")
              text = text.replace(old, new)
          marker = '\n\ndef test_unresolved_cp05_lineage_and_a2_are_rejected() -> None:\n'
          addition = '''

          def test_projected_asset_level_follows_selected_lesson_not_global_approved_scope() -> None:
              consumer = _m2("READING")
              approved = _approved("READING", ["A1", "A1+"])
              plan = _plan("READING", consumer)
              artifact = builder.build_private_delivery_consumer(consumer, approved, plan)
              projected = [
                  row for row in artifact["asset_records"]
                  if row["asset_key"] in artifact["cp07d_delivery_contract"]["projected_asset_keys"]
              ]
              assert projected
              assert {row["level"] for row in projected} == {"A1"}
          '''
          addition = "\n".join(line[10:] if line.startswith("          ") else line for line in addition.splitlines())
          if marker not in text:
              raise SystemExit("test insertion marker missing")
          text = text.replace(marker, addition + marker)
          tests.write_text(text, encoding="utf-8")

          Path("tests/ulga/conftest.py").unlink(missing_ok=True)
          Path(".github/workflows/cp07d-diagnostic.yml").unlink(missing_ok=True)
          PY
      - name: Compile and commit exact patch
        shell: bash
        run: |
          python -m py_compile \
            ulga/builders/build_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py \
            ulga/validators/validate_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py \
            tests/ulga/test_a1fs_v1_cp07d_private_four_skill_delivery_consumer.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "CP07D: bind projected assets to selected lesson level"
          git push origin HEAD:agent/a1fs-v1-cp07d-four-skill-delivery-canary
