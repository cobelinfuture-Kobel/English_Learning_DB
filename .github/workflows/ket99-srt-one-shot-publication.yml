name: KET99 SRT One-Shot Publication

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  focused-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install focused dependencies
        run: python -m pip install --upgrade pip pytest jsonschema openpyxl
      - name: Compile KET99 consolidation contracts
        run: |
          python -m py_compile \
            ulga/builders/build_ket_comp_transcript_final_consolidation.py \
            ulga/validators/validate_ket_comp_transcript_final_consolidation.py
      - name: Run KET99 publication and downstream regressions
        run: |
          python -m pytest -q \
            tests/ulga/test_ket_comp_transcript_final_consolidation.py \
            tests/ulga/test_a1fs_v1_cp07b_ket99_canonical_mapping_and_instructional_sequence_overlay.py \
            tests/ulga/test_a1fs_v1_cp07r3g_ket99_full_semantic_inventory_and_a1a1plus_coverage_expansion.py
