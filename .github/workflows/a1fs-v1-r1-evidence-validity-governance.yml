name: A1FS V1 R1 Evidence Validity Governance

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r1_evidence_validity_system_error_governance.py"
      - "ulga/validators/validate_a1fs_v1_r1_evidence_validity_system_error_governance.py"
      - "ulga/schemas/a1fs_v1_r1_evidence_validity_governance_report.schema.json"
      - "tests/ulga/test_a1fs_v1_r1_evidence_validity_system_error_governance.py"
      - ".github/workflows/a1fs-v1-r1-evidence-validity-governance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_r1_evidence_validity_system_error_governance.py
          ulga/validators/validate_a1fs_v1_r1_evidence_validity_system_error_governance.py
      - name: Validate schema
        run: >-
          python -c "import json; from pathlib import Path; from jsonschema.validators import validator_for;
          s=json.loads(Path('ulga/schemas/a1fs_v1_r1_evidence_validity_governance_report.schema.json').read_text());
          validator_for(s).check_schema(s)"
      - run: >-
          python -m pytest -q
          tests/ulga/test_a1fs_v1_r1_evidence_validity_system_error_governance.py
          tests/ulga/test_a1fs_v1_m6_response_capture_scoring_m12_evidence.py
          tests/ulga/test_a1fs_v1_m7_mastery_error_remediation_reassessment.py
          tests/ulga/test_a1fs_v1_m8_review_scheduling_retention_spaced_practice.py
