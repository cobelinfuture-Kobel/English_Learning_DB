name: A1FS V1 R8 Legacy Real Evidence Reconciliation

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py"
      - "ulga/validators/validate_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py"
      - "tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py"
      - ".github/workflows/a1fs-v1-r8-legacy-real-evidence-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  legacy-real-evidence-reconciliation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest jsonschema openpyxl
      - name: Compile reconciliation modules
        run: |
          python -m compileall -q \
            ulga/builders/build_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            ulga/validators/validate_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py
      - name: Validate reconciliation and load-bearing regressions
        run: |
          python -m pytest -q \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_e4s_a1v1_m12f_m12e1_to_a1fs_remediation_bridge.py \
            tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py \
            tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py
      - name: Enforce clean diff
        run: git diff --check
