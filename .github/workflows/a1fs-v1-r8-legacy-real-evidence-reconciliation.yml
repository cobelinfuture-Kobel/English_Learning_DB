name: A1FS V1 R8 Legacy Real Evidence Reconciliation

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py"
      - "ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py"
      - "ulga/validators/validate_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py"
      - "tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py"
      - "tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py"
      - ".github/workflows/a1fs-v1-r8-legacy-real-evidence-reconciliation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  temporary-selected-lineage-writeback:
    if: github.head_ref == 'fix/a1fs-v1-r8-selected-lineage-r6-intake' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest jsonschema openpyxl
      - name: Apply final tuple annotation cleanup
        run: python .github/scripts/temp_fix_a1fs_v1_r8_selected_lineage_tuple_annotation.py
      - name: Compile and focused regression tests
        shell: bash
        run: |
          set -o pipefail
          python -m py_compile \
            ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py
          python -m pytest -q \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py \
            tests/ulga/test_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py \
            tests/ulga/test_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py \
            -k "not test_request_is_deidentified_and_excludes_invalid_system_evidence and not test_hash_bound_gate_emits_candidate_only_queue_not_active_policy"
      - name: Commit bounded annotation cleanup
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py
          git commit -m "Fix R8 selected lineage tuple annotation"
          git push origin HEAD:${{ github.head_ref }}

  legacy-real-evidence-reconciliation:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest jsonschema openpyxl
      - name: Compile reconciliation modules
        run: |
          python -m compileall -q \
            ulga/builders/build_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py \
            ulga/validators/validate_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py
      - name: Validate reconciliation and load-bearing regressions
        shell: bash
        run: |
          mkdir -p generated/r8-reconciliation-diagnostics
          set -o pipefail
          python -m pytest -q --tb=short \
            --junitxml=generated/r8-reconciliation-diagnostics/pytest.xml \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_deterministic_production_reconciliation.py \
            tests/ulga/test_a1fs_v1_r8_legacy_real_evidence_reconciliation_local_runner.py \
            tests/ulga/test_e4s_a1v1_m12f_m12e1_to_a1fs_remediation_bridge.py \
            tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py \
            tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py \
            2>&1 | tee generated/r8-reconciliation-diagnostics/pytest.log
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r8-reconciliation-focused-diagnostics
          path: generated/r8-reconciliation-diagnostics
          if-no-files-found: error
          retention-days: 2
      - name: Enforce clean diff
        run: git diff --check
