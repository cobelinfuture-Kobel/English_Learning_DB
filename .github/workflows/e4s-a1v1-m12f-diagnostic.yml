name: E4S A1V1 M12F Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  focused-diagnostic:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Run focused tests with JUnit
        shell: pwsh
        continue-on-error: true
        run: |
          New-Item -ItemType Directory -Force generated/diagnostic | Out-Null
          python -m pytest -q --tb=long `
            --junitxml=generated/diagnostic/m12f-pytest.xml `
            tests/ulga/test_e4s_a1v1_m12f_m12e1_to_a1fs_remediation_bridge.py
          $LASTEXITCODE | Set-Content generated/diagnostic/exit-code.txt
      - uses: actions/upload-artifact@v4
        with:
          name: m12f-focused-diagnostic
          path: generated/diagnostic
          if-no-files-found: error
          retention-days: 1
