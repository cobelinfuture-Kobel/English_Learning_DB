name: R7 M105R1 Temporary Review Pages

on:
  pull_request:
    branches: [main]
    paths:
      - "pages/**"
      - "tests/ulga/test_m105r1_github_pages_temporary_review_ui.py"
      - ".github/workflows/r7-m105r1-temporary-review-pages.yml"
  push:
    branches: [main]
    paths:
      - "pages/**"
      - "tests/ulga/test_m105r1_github_pages_temporary_review_ui.py"
      - ".github/workflows/r7-m105r1-temporary-review-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Run temporary review UI contract tests
        run: python -m pytest tests/ulga/test_m105r1_github_pages_temporary_review_ui.py -q
      - name: Static privacy smoke
        run: |
          test -f pages/private-pilot-review/index.html
          test -f pages/private-pilot-review/app.js
          ! grep -R -E 'answer_key|canonical_target|model_target|BEGIN (RSA|OPENSSH) PRIVATE KEY' pages

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
