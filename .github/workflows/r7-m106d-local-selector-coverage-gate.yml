name: R7 M106E Shared A1 A1Plus Delivery Coverage Gate

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/validators/a1_a1plus_delivery_coverage_gate.py"
      - "ulga/builders/build_a1_private_pilot_next_unit_pages_payload.py"
      - "ulga/builders/run_a1_grammar_text_mode_private_pilot_covered_next_unit.py"
      - "ulga/builders/run_a1_grammar_text_mode_private_pilot_next_unit.py"
      - "ulga/query/a1_a1plus_coverage_query.py"
      - "ulga/builders/build_a1_a1plus_actual_coverage_recheck.py"
      - "tests/ulga/test_m106d_local_private_pilot_selector_coverage_gate.py"
      - "tests/ulga/test_m106e_shared_delivery_coverage_gate.py"
      - "tests/ulga/test_m105r1_github_pages_temporary_review_ui.py"
      - ".github/workflows/r7-m106d-local-selector-coverage-gate.yml"
  push:
    branches: [main]
    paths:
      - "ulga/validators/a1_a1plus_delivery_coverage_gate.py"
      - "ulga/builders/build_a1_private_pilot_next_unit_pages_payload.py"
      - "ulga/builders/run_a1_grammar_text_mode_private_pilot_covered_next_unit.py"
      - "ulga/builders/run_a1_grammar_text_mode_private_pilot_next_unit.py"
      - "ulga/query/a1_a1plus_coverage_query.py"
      - "ulga/builders/build_a1_a1plus_actual_coverage_recheck.py"
      - "tests/ulga/test_m106d_local_private_pilot_selector_coverage_gate.py"
      - "tests/ulga/test_m106e_shared_delivery_coverage_gate.py"
      - "tests/ulga/test_m105r1_github_pages_temporary_review_ui.py"
      - ".github/workflows/r7-m106d-local-selector-coverage-gate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Run shared delivery coverage gate tests
        run: |
          python -m pytest \
            tests/ulga/test_m106e_shared_delivery_coverage_gate.py \
            tests/ulga/test_m106d_local_private_pilot_selector_coverage_gate.py \
            tests/ulga/test_a1_grammar_text_mode_private_pilot_next_unit.py \
            tests/ulga/test_m105r1_github_pages_temporary_review_ui.py \
            -q
      - name: Smoke Pages payload and local preview
        run: |
          python ulga/builders/build_a1_private_pilot_next_unit_pages_payload.py --output /tmp/next-unit.json
          python ulga/builders/run_a1_grammar_text_mode_private_pilot_covered_next_unit.py \
            --preview \
            --local-root .local/ci-a1-private-pilot-units \
            --legacy-normalized .local/ci-normalized.json \
            --legacy-projection .local/ci-projection.json
