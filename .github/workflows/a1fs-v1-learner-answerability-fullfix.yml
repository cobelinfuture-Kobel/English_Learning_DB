name: A1FS V1 Learner Answerability FullFix

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_shared_learner_stimulus_contract_renderer.py"
      - "ulga/validators/validate_a1fs_v1_learner_answerability_gate.py"
      - "ulga/builders/build_e4s_a1v1_m12g_learner_contract_assessment_validity_fullfix.py"
      - "ulga/builders/build_a1fs_v1_r3r4_authority_reviewed_production_population.py"
      - "ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py"
      - "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
      - "ulga/builders/build_a1fs_v1_r5_production_bootstrap_first_session.py"
      - "tests/ulga/test_a1fs_v1_shared_learner_stimulus_contract_renderer.py"
      - "tests/ulga/test_a1fs_v1_stimulus_answerability_fullfix.py"
      - ".github/workflows/a1fs-v1-learner-answerability-fullfix.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  answerability-fullfix:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema openpyxl

      - name: Compile learner answerability modules
        shell: pwsh
        run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_shared_learner_stimulus_contract_renderer.py
          ulga/validators/validate_a1fs_v1_learner_answerability_gate.py
          ulga/builders/build_e4s_a1v1_m12g_learner_contract_assessment_validity_fullfix.py
          ulga/builders/build_a1fs_v1_r3r4_authority_reviewed_production_population.py
          ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py
          ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
          ulga/builders/build_a1fs_v1_r5_production_bootstrap_first_session.py

      - name: Validate shared stimulus contract
        id: shared
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/shared.xml
          tests/ulga/test_a1fs_v1_shared_learner_stimulus_contract_renderer.py

      - name: Validate reproduced defect and end-to-end answerability
        id: defect
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/defect.xml
          tests/ulga/test_a1fs_v1_stimulus_answerability_fullfix.py

      - name: Validate M12G learner contract regression
        id: m12g
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/m12g.xml
          tests/ulga/test_e4s_a1v1_m12g_learner_contract_assessment_validity_fullfix.py

      - name: Validate R3/R4 production population regression
        id: r3r4
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/r3r4.xml
          tests/ulga/test_a1fs_v1_r3r4_authority_reviewed_production_population.py

      - name: Validate R4 supply regression
        id: r4
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/r4.xml
          tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py

      - name: Validate R5 local runtime regression
        id: r5
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/r5.xml
          tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py

      - name: Validate R5 production bootstrap regression
        id: bootstrap
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/bootstrap.xml
          tests/ulga/test_a1fs_v1_r5_production_bootstrap_first_session.py

      - name: Validate R8 real learner gate regression
        id: r8
        continue-on-error: true
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short --junitxml=generated/r8.xml
          tests/ulga/test_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py

      - name: Upload answerability diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: learner-answerability-junit
          path: generated/*.xml
          if-no-files-found: error
          retention-days: 2

      - name: Enforce all answerability gates
        if: >-
          steps.shared.outcome == 'failure' ||
          steps.defect.outcome == 'failure' ||
          steps.m12g.outcome == 'failure' ||
          steps.r3r4.outcome == 'failure' ||
          steps.r4.outcome == 'failure' ||
          steps.r5.outcome == 'failure' ||
          steps.bootstrap.outcome == 'failure' ||
          steps.r8.outcome == 'failure'
        shell: pwsh
        run: throw "One or more learner answerability gates failed; inspect JUnit artifact."
