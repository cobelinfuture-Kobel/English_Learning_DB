name: E4S A1V1 M12F M12E1 to A1FS Remediation Bridge

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  archived-focused-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install --upgrade pip pytest jsonschema openpyxl
      - name: Run archived M12F regression
        run: python -m pytest -q tests/ulga/test_e4s_a1v1_m12f_dedicated_private_bridge_assets.py
