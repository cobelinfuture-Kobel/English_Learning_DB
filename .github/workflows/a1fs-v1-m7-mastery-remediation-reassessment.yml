name: A1FS V1 M7 Mastery Remediation Reassessment

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_m7_mastery_error_remediation_reassessment.py"
      - "ulga/validators/validate_a1fs_v1_m7_mastery_error_remediation_reassessment.py"
      - "ulga/schemas/a1fs_v1_m7_mastery_snapshot.schema.json"
      - "tests/ulga/test_a1fs_v1_m7_mastery_error_remediation_reassessment.py"
      - ".github/workflows/a1fs-v1-m7-mastery-remediation-reassessment.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: python -m compileall -q ulga/builders/build_a1fs_v1_m7_mastery_error_remediation_reassessment.py ulga/validators/validate_a1fs_v1_m7_mastery_error_remediation_reassessment.py
      - name: Validate schema
        run: >-
          python -c "import json; from pathlib import Path; from jsonschema.validators import validator_for;
          s=json.loads(Path('ulga/schemas/a1fs_v1_m7_mastery_snapshot.schema.json').read_text()); validator_for(s).check_schema(s)"
      - run: python -m pytest -q tests/ulga/test_a1fs_v1_m7_mastery_error_remediation_reassessment.py
