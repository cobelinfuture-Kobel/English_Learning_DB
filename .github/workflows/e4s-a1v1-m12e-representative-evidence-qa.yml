name: E4S A1V1 M12E Representative Evidence QA

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m12e-representative-evidence-qa-coverage
      - agent/e4s-a1v1-m12e1-legacy-m12d-compatibility-fullfix
    paths:
      - "ulga/schemas/e4s_a1v1_m12e_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_m12e_representative_pilot_evidence_qa.py"
      - "ulga/builders/build_e4s_a1v1_m12e_representative_pilot_evidence_qa_core.py"
      - "ulga/validators/validate_e4s_a1v1_m12e_representative_pilot_evidence_qa.py"
      - "tests/ulga/test_e4s_a1v1_m12e_representative_pilot_evidence_qa.py"
      - "ulga/reports/e4s_a1v1_m12e_representative_evidence_qa_closeout.json"
      - ".github/workflows/e4s-a1v1-m12e-representative-evidence-qa.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  representative-evidence-qa:
    runs-on: windows-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M12E contracts
        shell: pwsh
        run: python -m pytest -q --tb=short tests/ulga/test_e4s_a1v1_m12e_representative_pilot_evidence_qa.py
      - name: Validate M12C and M12D non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m12c_real_learner_pilot_evidence_qa.py
          tests/ulga/test_e4s_a1v1_m12d_representative_pilot_expansion.py
      - name: Build TEST_FIXTURE M12 through M12D chain
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          from ulga.builders import build_e4s_a1v1_m12_real_learner_pilot_evidence_capture as m12
          from ulga.builders import build_e4s_a1v1_m12c_real_learner_pilot_evidence_qa as m12c
          from ulga.builders import build_e4s_a1v1_m12d_representative_pilot_expansion as m12d
          root = Path('.local/e4s_a1v1/pilot/m12e_ci')
          m12_root, m12c_root, m12d_root = root/'m12', root/'m12c', root/'m12d'
          prepared = m12.prepare_capture(m12_root)
          manifest = prepared['manifest']
          bank = json.loads((m12_root/'runtime/source_m08/text_mode_session_bank.private.json').read_text(encoding='utf-8'))
          allowed = set(manifest['selection']['selectable_item_ids'])
          def response_for(item):
              contract = item['private_scoring_contract']
              mode = contract['scoring_mode']
              if mode in {'EXACT_OPTION','NORMALIZED_TEXT'}:
                  return contract['accepted_texts'][0]
              if mode == 'EXACT_SEQUENCE':
                  return contract['accepted_sequence']
              return 'M12E CI fixture response.'
          prior_item = next(row for row in bank['items'] if row['item_id'] in allowed and row['private_scoring_contract']['scoring_mode'] != 'FEATURE_RUBRIC')
          prior = m12.m08.empty_attempt_registry(bank)
          prior['session_id'] = 'm12e-ci-prior'
          prior['learner_ref'] = 'fixture-learner'
          prior['attempts'] = [{
              'item_id': prior_item['item_id'],
              'attempt_sequence': 1,
              'response': response_for(prior_item),
              'submitted_at': '2026-07-16T00:01:00.000Z',
              'operator_review': m12.m08._empty_review(),
          }]
          prior_path = root/'prior.private.json'
          prior_path.write_text(json.dumps(prior, ensure_ascii=False, indent=2)+'\n', encoding='utf-8')
          m12.import_evidence(m12_root, prior_path, evidence_origin='TEST_FIXTURE')
          m12c.build_qa(m12_root, m12c_root, expected_origin='TEST_FIXTURE')
          batch_prepared = m12d.prepare_batch(m12_root, m12c_root, m12d_root, expected_origin='TEST_FIXTURE')
          ids = batch_prepared['manifest']['batch_selection']['item_ids']
          by_id = {row['item_id']: row for row in bank['items']}
          batch = m12.m08.empty_attempt_registry(bank)
          batch['session_id'] = 'm12e-ci-batch'
          batch['learner_ref'] = prior['learner_ref']
          batch['attempts'] = [{
              'item_id': item_id,
              'attempt_sequence': index,
              'response': response_for(by_id[item_id]),
              'submitted_at': f'2026-07-16T00:{10+index:02d}:00.000Z',
              'operator_review': m12.m08._empty_review(),
          } for index, item_id in enumerate(ids, start=1)]
          batch_path = root/'batch.private.json'
          batch_path.write_text(json.dumps(batch, ensure_ascii=False, indent=2)+'\n', encoding='utf-8')
          m12d.import_batch(m12_root, m12c_root, m12d_root, batch_path, expected_origin='TEST_FIXTURE')
          '@ | python -
      - name: Build M12E fixture QA
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m12e_representative_pilot_evidence_qa.py `
            --input-root ".local/e4s_a1v1/pilot/m12e_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12e_ci/m12c" `
            --representative-root ".local/e4s_a1v1/pilot/m12e_ci/m12d" `
            --output-root ".local/e4s_a1v1/pilot/m12e_ci/m12e" `
            --expected-origin TEST_FIXTURE
      - name: Independently validate M12E fixture QA
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m12e_representative_pilot_evidence_qa.py `
            --input-root ".local/e4s_a1v1/pilot/m12e_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12e_ci/m12c" `
            --representative-root ".local/e4s_a1v1/pilot/m12e_ci/m12d" `
            --output-root ".local/e4s_a1v1/pilot/m12e_ci/m12e" `
            --expected-origin TEST_FIXTURE `
            --validation-report ".local/e4s_a1v1/pilot/m12e_ci/m12e/representative_evidence_qa_validation.json"
      - name: Enforce evidence QA coverage and queue accounting
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12e_ci/m12e')
          report = json.loads((root/'representative_evidence_qa_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root/'representative_evidence_qa_validation.json').read_text(encoding='utf-8'))
          queue = json.loads((root/'coverage_expansion_queue.json').read_text(encoding='utf-8'))
          assert report['evidence_origin'] == 'TEST_FIXTURE'
          assert report['validation_status'] == 'PASS_M12E_TEST_FIXTURE_QA_VALIDATED'
          assert report['representative_batch']['batch_attempt_count'] == 8
          assert report['representative_batch']['complete'] is True
          assert report['evidence_summary']['attempt_count'] == 9
          assert report['coverage_progress']['delta']['items'] == 8
          assert report['coverage_progress']['current']['items'] + report['coverage_progress']['remaining']['items'] == 184
          assert report['coverage_progress']['current']['units'] + report['coverage_progress']['remaining']['units'] == 23
          assert report['coverage_progress']['current']['rows'] + report['coverage_progress']['remaining']['rows'] == 107
          assert report['coverage_progress']['representative_pilot_completed'] is True
          assert queue == report['coverage_expansion_queue']
          assert queue['candidate_count'] == 8
          assert len({row['item_id'] for row in queue['items']}) == 8
          assert not any(row['grammar_unit_id'] == 'GRAMMAR_WILL_FUTURE_A1' for row in queue['items'])
          assert validation['error_count'] == 0
          assert validation['attempt_count'] == 9
          assert validation['representative_pilot_completed'] is True
          assert validation['learner_mastery_claimed'] is False
          '@ | python -
      - name: Verify CI never claims REAL_LEARNER
        shell: pwsh
        run: |
          $workflow = Get-Content ".github/workflows/e4s-a1v1-m12e-representative-evidence-qa.yml" -Raw
          if ($workflow -match '(?m)^\s*--expected-origin\s+REAL_LEARNER\s*$') {
            throw 'M12E CI must never process fixture data as REAL_LEARNER.'
          }
      - name: Verify no prohibited artifacts or canonical writes
        shell: pwsh
        run: |
          $changed = git diff --name-only origin/main...HEAD
          $forbidden = $changed | Where-Object {
            $_ -match '^ulga/graph/' -or
            $_ -match '(?i)(design|planning|preview|review_packet|sync).*\.md$' -or
            $_.ToLowerInvariant().EndsWith('.wav') -or
            $_.ToLowerInvariant().EndsWith('.webm') -or
            $_.ToLowerInvariant().EndsWith('.mp3') -or
            $_.ToLowerInvariant().EndsWith('.pdf')
          }
          if ($forbidden) { throw "M12E touched prohibited files: $forbidden" }
      - name: Verify private outputs remain ignored
        shell: pwsh
        run: |
          git check-ignore .local/e4s_a1v1/pilot/m12e_ci/m12d/cumulative_attempt_registry.private.json
          git check-ignore .local/e4s_a1v1/pilot/m12e_ci/m12e/representative_evidence_qa_safe_report.json
          if (git status --porcelain | Select-String '^.. \.local/') {
            throw 'M12E local outputs escaped ignore policy.'
          }
      - name: Build metadata-only M12E closeout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m12e | Out-Null
          @'
          import hashlib, json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12e_ci/m12e')
          report_path = root/'representative_evidence_qa_safe_report.json'
          validation_path = root/'representative_evidence_qa_validation.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          validation = json.loads(validation_path.read_text(encoding='utf-8'))
          def digest(path): return hashlib.sha256(path.read_text(encoding='utf-8').encode('utf-8')).hexdigest()
          receipt = {
              'task_id': 'E4S-A1V1-M12E_RepresentativePilotEvidenceQAAndCoverageExpansion',
              'artifact_type': 'metadata_only_m12e_representative_evidence_qa_closeout',
              'schema_version': 'e4s.a1v1.m12e.representative_evidence_qa_closeout.v1',
              'scope': 'A1_A1_PLUS_PRIVATE_CHILD_PATH_ONLY',
              'fixture_validation_status': report['validation_status'],
              'fixture_attempt_count': report['evidence_summary']['attempt_count'],
              'fixture_attempted_unit_count': report['evidence_summary']['attempted_unit_count'],
              'fixture_attempted_row_count': report['evidence_summary']['attempted_row_count'],
              'fixture_coverage_delta': report['coverage_progress']['delta'],
              'fixture_quality_state': report['quality_gate']['state'],
              'fixture_iteration_candidate_count': report['coverage_expansion_queue']['candidate_count'],
              'independent_validation_errors': validation['error_count'],
              'artifact_hashes': {
                  'fixture_qa_report_sha256': digest(report_path),
                  'fixture_qa_validation_sha256': digest(validation_path),
              },
              'claim_boundaries': report['claim_boundaries'],
              'real_learner_evidence_in_ci': False,
              'learner_mastery_claimed': False,
              'retention_confirmed': False,
              'stop_reason': 'REAL_LEARNER_REPRESENTATIVE_QA_INPUT_REQUIRED',
              'last_completed_status': 'PASS_M12E_REPRESENTATIVE_EVIDENCE_QA_PIPELINE_READY',
              'next_short_step': 'E4S-A1V1-M12E_RepresentativePilotEvidenceQAAndCoverageExpansion',
          }
          Path('generated/m12e/e4s_a1v1_m12e_representative_evidence_qa_closeout.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2)+'\n', encoding='utf-8'
          )
          '@ | python -
      - name: Compare committed M12E closeout
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          committed = json.loads(Path('ulga/reports/e4s_a1v1_m12e_representative_evidence_qa_closeout.json').read_text(encoding='utf-8'))
          generated = json.loads(Path('generated/m12e/e4s_a1v1_m12e_representative_evidence_qa_closeout.json').read_text(encoding='utf-8'))
          assert committed == generated, 'committed M12E closeout drift'
          '@ | python -
      - name: Upload metadata-only M12E closeout
        uses: actions/upload-artifact@v4
        with:
          name: m12e-representative-evidence-qa-closeout
          path: generated/m12e
          if-no-files-found: error
          retention-days: 2
