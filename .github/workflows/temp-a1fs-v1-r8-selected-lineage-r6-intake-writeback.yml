name: TEMP A1FS V1 R8 selected lineage R6 intake writeback

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: github.head_ref == 'fix/a1fs-v1-r8-selected-lineage-r6-intake' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply bounded selected-lineage and R6-intake full fix
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_between(text: str, start: str, end: str, replacement: str) -> str:
              left = text.find(start)
              if left < 0:
                  raise SystemExit(f'start anchor not found: {start!r}')
              right = text.find(end, left)
              if right < 0:
                  raise SystemExit(f'end anchor not found: {end!r}')
              return text[:left] + replacement + text[right:]

          runner_path = Path('ulga/builders/run_a1fs_v1_r8_legacy_real_evidence_reconciliation_local.py')
          text = runner_path.read_text(encoding='utf-8')

