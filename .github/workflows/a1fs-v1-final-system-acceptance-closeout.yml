name: A1FS V1 Final System Acceptance Closeout

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/build_a1fs_v1_final_system_acceptance_and_closeout.py"
      - "ulga/validators/validate_a1fs_v1_final_system_acceptance_and_closeout.py"
      - "tests/ulga/test_a1fs_v1_final_system_acceptance_and_closeout.py"
      - ".github/workflows/a1fs-v1-final-system-acceptance-closeout.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_a1fs_v1_final_system_acceptance_and_closeout.py"
      - "ulga/validators/validate_a1fs_v1_final_system_acceptance_and_closeout.py"
      - "tests/ulga/test_a1fs_v1_final_system_acceptance_and_closeout.py"
      - ".github/workflows/a1fs-v1-final-system-acceptance-closeout.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-closeout:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest
      - name: Compile closeout implementation
        run: |
          python -m py_compile \
            ulga/builders/build_a1fs_v1_final_system_acceptance_and_closeout.py \
            ulga/validators/validate_a1fs_v1_final_system_acceptance_and_closeout.py
      - name: Run focused closeout regressions
        run: python -m pytest -q tests/ulga/test_a1fs_v1_final_system_acceptance_and_closeout.py
      - name: Verify no generated artifact was committed
        run: test -z "$(git status --porcelain)"
