name: A1FS V1 R2 Complete Breadth Ontology Contract

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py"
      - "ulga/validators/validate_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py"
      - "tests/ulga/test_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py"
      - ".github/workflows/a1fs-v1-r2-complete-breadth-ontology-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  complete-contract-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py
          ulga/validators/validate_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py
      - name: Generate complete ontology and JSON Schema
        run: >-
          python ulga/builders/build_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py
          --ontology-output .local/ci/a1fs_v1_r2_complete_breadth_ontology.json
          --schema-output .local/ci/a1fs_v1_r2_breadth_deployment_contract.schema.json
      - name: Validate generated ontology and schema
        run: >-
          python ulga/validators/validate_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py
          --ontology .local/ci/a1fs_v1_r2_complete_breadth_ontology.json
          --schema .local/ci/a1fs_v1_r2_breadth_deployment_contract.schema.json
      - run: python -m pytest -q tests/ulga/test_a1fs_v1_r2_complete_breadth_ontology_deployment_contract.py
