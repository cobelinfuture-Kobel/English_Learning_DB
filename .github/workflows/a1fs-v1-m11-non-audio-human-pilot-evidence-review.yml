name: A1FS V1 M11 Non-Audio Human Pilot Evidence Review

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_m11_non_audio_human_pilot_evidence_review.py"
      - "ulga/validators/validate_a1fs_v1_m11_non_audio_human_pilot_evidence_review.py"
      - "ulga/schemas/a1fs_v1_m11_non_audio_human_pilot.schema.json"
      - "tests/ulga/test_a1fs_v1_m11_non_audio_human_pilot_evidence_review.py"
      - ".github/workflows/a1fs-v1-m11-non-audio-human-pilot-evidence-review.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fixture-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_m11_non_audio_human_pilot_evidence_review.py
          ulga/validators/validate_a1fs_v1_m11_non_audio_human_pilot_evidence_review.py
      - name: Validate schema
        run: >-
          python -c "import json; from pathlib import Path; from jsonschema.validators import validator_for;
          s=json.loads(Path('ulga/schemas/a1fs_v1_m11_non_audio_human_pilot.schema.json').read_text()); validator_for(s).check_schema(s)"
      - run: >-
          python -m pytest -q
          tests/ulga/test_a1fs_v1_m11_non_audio_human_pilot_evidence_review.py
