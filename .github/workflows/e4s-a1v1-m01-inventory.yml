name: E4S A1V1 M01 Authority Inventory

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - agent/e4s-a1v1-m01-authority-scope-query
  workflow_dispatch:

permissions:
  contents: read

jobs:
  inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build compact authority inventory
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          tokens = (
              'vocab', 'chunk', 'pattern', 'theme', 'situation',
              'query', 'constraint', 'candidate', 'frequency'
          )
          rows = []
          for path in sorted(Path('ulga').rglob('*')):
              if not path.is_file() or not any(token in str(path).lower() for token in tokens):
                  continue
              row = {'path': str(path), 'suffix': path.suffix.lower()}
              if path.suffix.lower() == '.json':
                  try:
                      payload = json.loads(path.read_text(encoding='utf-8'))
                  except Exception as exc:
                      row['json_error'] = type(exc).__name__
                  else:
                      row['payload_type'] = type(payload).__name__
                      if isinstance(payload, dict):
                          row['keys'] = sorted(payload)[:40]
                          row['counts'] = {
                              key: len(value)
                              for key, value in payload.items()
                              if isinstance(value, (list, dict))
                          }
                      elif isinstance(payload, list):
                          row['count'] = len(payload)
                          row['sample_keys'] = (
                              sorted(payload[0])[:40]
                              if payload and isinstance(payload[0], dict)
                              else []
                          )
              rows.append(row)
          Path('/tmp/m01-authority-inventory.json').write_text(
              json.dumps({'path_count': len(rows), 'artifacts': rows}, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps({'validation_status': 'PASS', 'path_count': len(rows)}))
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: m01-authority-inventory
          path: /tmp/m01-authority-inventory.json
          if-no-files-found: error
          retention-days: 1
