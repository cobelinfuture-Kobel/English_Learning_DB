name: A1FS V1 CP07F Real Learner Acceptance

on:
  pull_request:
    paths:
      - "ulga/builders/run_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py"
      - "ulga/validators/validate_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py"
      - "tests/ulga/test_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py"
      - ".github/workflows/a1fs-v1-cp07f-real-learner-acceptance.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/run_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py"
      - "ulga/validators/validate_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py"
      - "tests/ulga/test_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py"
      - ".github/workflows/a1fs-v1-cp07f-real-learner-acceptance.yml"

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"

jobs:
  cp07f-real-learner-acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest jsonschema openpyxl
      - name: Compile CP07F runner validator and regressions
        run: |
          python -m py_compile \
            ulga/builders/run_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py \
            ulga/validators/validate_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py \
            tests/ulga/test_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py
      - id: focused
        name: Capture CP07F focused regression log
        shell: bash
        run: |
          set +e
          python -m pytest -q --tb=long tests/ulga/test_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py > cp07f-pytest.log 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload CP07F pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cp07f-pytest-log
          path: cp07f-pytest.log
          retention-days: 1
      - name: Enforce CP07F focused regression result
        run: test "${{ steps.focused.outputs.status }}" = "0"
      - name: Prepare private real learner acceptance template only
        run: |
          python ulga/builders/run_a1fs_v1_cp07f_real_learner_end_to_end_acceptance.py \
            prepare \
            --output-root .local/a1fs_v1/cp07f-ci
      - name: Enforce CI evidence boundary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path('.local/a1fs_v1/cp07f-ci')
          report = json.loads((root / 'real_learner_acceptance_readiness.safe.json').read_text())
          assert report['validation_status'] == 'PASS_CP07F_REAL_LEARNER_ACCEPTANCE_PIPELINE_READY'
          assert report['real_learner_acceptance_completed'] is False
          assert report['real_retention_claimed'] is False
          assert report['stop_reason'] == 'REAL_LEARNER_FOUR_SKILL_EVIDENCE_REQUIRED'
          workflow = Path('.github/workflows/a1fs-v1-cp07f-real-learner-acceptance.yml').read_text()
          assert ' validate ' not in workflow
          PY
      - name: Verify private outputs remain ignored
        run: |
          git check-ignore .local/a1fs_v1/cp07f-ci/real_learner_acceptance_manifest.template.private.json
          if git status --porcelain | grep -E '^.. \.local/'; then
            echo 'CP07F private output escaped ignore policy.' >&2
            exit 1
          fi
