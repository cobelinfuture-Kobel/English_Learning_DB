name: A1FS V1 R5 Content Error Recovery Indentation Writeback

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-r5-content-error-recovery-indentation-writeback.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  writeback:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-content-error-session-recovery
          fetch-depth: 0
      - name: Rebuild damaged Python blocks with explicit indentation
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          def replace_range(text: str, start_marker: str, end_marker: str, lines: list[str], code: str) -> str:
              start = text.find(start_marker)
              if start < 0:
                  raise SystemExit(f"{code}_start_missing")
              end = text.find(end_marker, start)
              if end < 0:
                  raise SystemExit(f"{code}_end_missing")
              return text[:start] + "\n".join(lines) + text[end:]

          recovery = Path("ulga/builders/build_a1fs_v1_r5_content_error_session_recovery.py")
          text = recovery.read_text(encoding="utf-8")
          snapshot_lines = [
              "def _session_snapshot(runtime: r5.LocalEdgeRuntime, receipt: Mapping[str, Any]) -> dict[str, Any]:",
              "    session_id = str(receipt[\"session_id\"])",
              "    access_token = str(receipt[\"access_token\"])",
              "    defects: list[dict[str, str]] = []",
              "    connection = runtime.connect()",
              "    try:",
              "        session = runtime._session(connection, session_id)",
              "        runtime._auth(session, access_token)",
              "        if session[\"learner_id\"] != receipt[\"learner_id\"]:",
              "            raise ContentErrorRecoveryError(\"receipt_learner_session_mismatch\")",
              "        if session[\"session_state\"] not in {\"ACTIVE\", \"PAUSED\"}:",
              "            raise ContentErrorRecoveryError(f\"session_not_recoverable:{session['session_state']}\")",
              "        rows = connection.execute(",
              "            \"\"\"SELECT a.item_id,i.item_json FROM edge_assignments a",
              "            JOIN edge_runtime_items i USING(item_id)",
              "            WHERE a.session_id=? ORDER BY a.assignment_sequence\"\"\"",
              "            (session_id,),",
              "        ).fetchall()",
              "        for row in rows:",
              "            item = json.loads(row[\"item_json\"])",
              "            try:",
              "                r5._safe_item(item)",
              "            except r5.LocalEdgeRuntimeError as exc:",
              "                if \"SESSION_ITEM_NOT_ANSWERABLE\" not in str(exc):",
              "                    raise",
              "                defects.append({\"item_id\": row[\"item_id\"], \"error\": str(exc)})",
              "        attempts = connection.execute(",
              "            \"SELECT attempt_id,validity_status FROM edge_attempts WHERE session_id=? ORDER BY submitted_at,attempt_id\"",
              "            (session_id,),",
              "        ).fetchall()",
              "        return {",
              "            \"session_id\": session_id,",
              "            \"learner_id\": session[\"learner_id\"],",
              "            \"session_state\": session[\"session_state\"],",
              "            \"session_version\": int(session[\"session_version\"]),",
              "            \"defects\": defects,",
              "            \"attempts\": [dict(row) for row in attempts],",
              "        }",
              "    finally:",
              "        connection.close()",
          ]
          text = replace_range(text, "def _session_snapshot(", "\n\ndef recover(", snapshot_lines, "snapshot")
          recovery.write_text(text, encoding="utf-8")

          runtime = Path("ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py")
          text = runtime.read_text(encoding="utf-8")
          transition_lines = [
              "        if new_state == \"ABANDONED\":",
              "            return {",
              "                \"validation_status\": STATUS,",
              "                \"session\": {",
              "                    \"session_id\": session_id,",
              "                    \"learner_id\": session[\"learner_id\"],",
              "                    \"breadth_cell_id\": session[\"breadth_cell_id\"],",
              "                    \"purpose\": session[\"purpose\"],",
              "                    \"session_state\": \"ABANDONED\",",
              "                    \"session_version\": expected_session_version + 1,",
              "                    \"planned_item_count\": session[\"planned_item_count\"],",
              "                    \"started_at\": session[\"started_at\"],",
              "                    \"updated_at\": at,",
              "                },",
              "                \"assignments\": [],",
              "                \"next_short_step\": NEXT_SHORT_STEP,",
              "            }",
              "        return self.session_payload(session_id=session_id, access_token=access_token)",
              "",
              "    def pause_session(self, **kwargs: Any) -> dict[str, Any]:",
              "        return self._transition(new_state=\"PAUSED\", **kwargs)",
          ]
          text = replace_range(text, "  if new_state == \"ABANDONED\":", "\n    def resume_session", transition_lines, "transition")
          runtime.write_text(text, encoding="utf-8")

          tests = Path("tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py")
          text = tests.read_text(encoding="utf-8")
          scoring_lines = [
              "    with sqlite3.connect(database) as connection:",
              "        item = json.loads(connection.execute(",
              "            \"SELECT item_json FROM edge_runtime_items WHERE item_id=?\", (item_id,)",
              "        ).fetchone()[0])",
              "        scoring = item[\"private_scoring_contract\"]",
              "        scoring.setdefault(\"case_insensitive\", True)",
              "        scoring.setdefault(\"punctuation_tolerance\", True)",
              "        connection.execute(",
              "            \"UPDATE edge_runtime_items SET item_json=?,item_digest=? WHERE item_id=?\",",
              "            (r5.canonical(item), r5.digest(item), item_id),",
              "        )",
              "        connection.commit()",
              "    answer = item[\"private_scoring_contract\"][\"accepted_texts\"][0]",
          ]
          text = replace_range(
              text,
              "    with sqlite3.connect(database) as connection:\n    item = json.loads(",
              "    result = runtime.submit_response(",
              scoring_lines,
              "test_scoring",
          )
          tests.write_text(text, encoding="utf-8")
          '@ | python -
          if ($LASTEXITCODE -ne 0) { throw "Indentation repair failed" }
          python -m compileall -q `
            ulga/builders/build_a1fs_v1_r5_content_error_session_recovery.py `
            ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py `
            tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py
          if ($LASTEXITCODE -ne 0) { throw "Repaired modules do not compile" }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "git diff --check failed" }
      - name: Commit indentation repair
        shell: pwsh
        run: |
          $paths = @(
            "ulga/builders/build_a1fs_v1_r5_content_error_session_recovery.py",
            "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py",
            "tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py"
          )
          $changed = @(git status --porcelain -- $paths)
          if ($changed.Count -ne 3) {
            throw "Expected exactly three repaired files, found $($changed.Count): $($changed -join '; ')"
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $paths
          git commit -m "Repair content-error recovery block indentation"
          if ($LASTEXITCODE -ne 0) { throw "git commit failed" }
          git push origin HEAD:fix/a1fs-v1-r5-content-error-session-recovery
          if ($LASTEXITCODE -ne 0) { throw "git push failed" }
