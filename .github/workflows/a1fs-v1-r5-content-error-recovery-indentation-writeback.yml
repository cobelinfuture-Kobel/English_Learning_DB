name: A1FS V1 R5 Content Error Recovery Indentation Writeback

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-r5-content-error-recovery-indentation-writeback.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  writeback:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-content-error-session-recovery
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pytest jsonschema openpyxl
      - name: Apply bounded repair and run focused validation
        shell: bash
        run: |
          python -c "import base64; exec(base64.b64decode(''))"
          git diff --check
      - name: Commit focused repair
        shell: bash
        run: |
          changed=$(git status --porcelain -- \
            ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py | wc -l)
          test "$changed" -eq 2
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- \
            ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py \
            tests/ulga/test_a1fs_v1_r5_content_error_session_recovery.py
          git commit -m "Repair R5 content-error recovery indentation"
          git push origin HEAD:fix/a1fs-v1-r5-content-error-session-recovery
