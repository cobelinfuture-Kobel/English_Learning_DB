name: A1FS V1 R4 Central Question Supply

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py"
      - "ulga/validators/validate_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py"
      - "tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py"
      - ".github/workflows/a1fs-v1-r4-central-question-supply.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  question-supply-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py
          ulga/validators/validate_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py
      - run: >-
          python -m pytest -q
          tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py
          tests/ulga/test_a1fs_v1_r3_complete_breadth_denominator_coverage_gap_planner.py
          tests/ulga/test_e4s_a1v1_m12g_learner_contract_assessment_validity_fullfix.py
