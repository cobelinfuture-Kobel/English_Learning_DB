name: A1FS V1 R6 Final Clean

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-r6-final-clean.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  final-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enforce clean read-only R6 branch state
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          git fetch origin "${HEAD_BRANCH}"
          git checkout -B "${HEAD_BRANCH}" "origin/${HEAD_BRANCH}"
          python - <<'PY'
          from pathlib import Path

          test_path = Path('tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py')
          text = test_path.read_text(encoding='utf-8')
          repairs = {
              '    assert "response" not in json.dumps(safe)\n':
                  '    assert "representative_evidence" not in safe\n',
              '    assert "action_payload" not in json.dumps(report)\n':
                  '    assert all("action_payload" not in row for row in report["decisions"])\n',
          }
          for old, new in repairs.items():
              if old in text:
                  text = text.replace(old, new)
              elif new not in text:
                  raise SystemExit(f'R6 final assertion state invalid: {new.strip()}')
          test_path.write_text(text, encoding='utf-8')

          clean = '''name: A1FS V1 R6 GPT Diagnostic Gate

          on:
            pull_request:
              paths:
                - "ulga/builders/build_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py"
                - "ulga/validators/validate_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py"
                - "tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py"
                - ".github/workflows/a1fs-v1-r6-gpt-diagnostic-gate.yml"
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            diagnostic-gate-validation:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                    cache: pip
                - run: python -m pip install pytest jsonschema
                - run: >-
                    python -m compileall -q
                    ulga/builders/build_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py
                    ulga/validators/validate_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py
                - run: >-
                    python -m pytest -q
                    tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py
                    tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
                    tests/ulga/test_a1fs_v1_r4_central_question_supply_skill_projection_capacity_governance.py
                    tests/ulga/test_a1fs_v1_r1_evidence_validity_system_error_governance.py
          '''
          clean = '\n'.join(line[10:] if line.startswith('          ') else line for line in clean.splitlines()) + '\n'
          Path('.github/workflows/a1fs-v1-r6-gpt-diagnostic-gate.yml').write_text(clean, encoding='utf-8')
          PY
          rm -f .github/workflows/a1fs-v1-r6-cleanup.yml
          git rm .github/workflows/a1fs-v1-r6-final-clean.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/a1fs-v1-r6-gpt-diagnostic-gate.yml tests/ulga/test_a1fs_v1_r6_gpt_diagnostic_package_controlled_recommendation_gate.py
          if ! git diff --cached --quiet; then
            git commit -m "Finalize clean read-only R6 CI"
            git push origin "HEAD:${HEAD_BRANCH}"
          fi
