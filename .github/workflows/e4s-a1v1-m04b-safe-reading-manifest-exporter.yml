name: E4S A1V1 M04B Safe Reading Manifest Exporter

on:
  pull_request:
    branches: [main]
    paths:
      - "ulga/builders/export_a1_a1plus_safe_reading_source_manifest.py"
      - "ulga/validators/validate_a1_a1plus_safe_reading_source_manifest.py"
      - "tests/ulga/test_e4s_a1v1_m04b_safe_reading_manifest_exporter.py"
      - ".github/workflows/e4s-a1v1-m04b-safe-reading-manifest-exporter.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check pytest
      - name: Run focused exporter tests
        run: python -m pytest tests/ulga/test_e4s_a1v1_m04b_safe_reading_manifest_exporter.py -q
      - name: Run CLI export and validator smoke
        shell: bash
        run: |
          mkdir -p /tmp/raz_output_jsons/derived/Level_A/normalized
          cat > /tmp/raz_output_jsons/derived/Level_A/normalized/units.json <<'JSON'
          {
            "items": [
              {
                "reading_intake_id": "RAZ_A_SMOKE_001",
                "source_level": "A",
                "book_id": "SMOKE_BOOK",
                "clean_text": "I see a cat. The cat can run.",
                "tags": {
                  "theme_tags": ["animals"],
                  "grammar_tags": ["present_simple"],
                  "reusability_tags": ["short_reading_seed"]
                }
              }
            ]
          }
          JSON
          python ulga/builders/export_a1_a1plus_safe_reading_source_manifest.py \
            --source-root /tmp/raz_output_jsons \
            --output /tmp/a1_a1plus_reading_source_manifest.json \
            --levels A B C D E F
          python ulga/validators/validate_a1_a1plus_safe_reading_source_manifest.py \
            --manifest /tmp/a1_a1plus_reading_source_manifest.json \
            --report /tmp/a1_a1plus_reading_source_manifest_validation.json
      - name: Verify no source text escaped
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest_path = Path('/tmp/a1_a1plus_reading_source_manifest.json')
          manifest_text = manifest_path.read_text(encoding='utf-8')
          manifest = json.loads(manifest_text)
          report = json.loads(Path('/tmp/a1_a1plus_reading_source_manifest_validation.json').read_text(encoding='utf-8'))
          assert manifest['summary']['manifest_record_count'] == 1
          assert manifest['summary']['levels'] == {'A': 1}
          assert 'I see a cat' not in manifest_text
          assert 'The cat can run' not in manifest_text
          assert '"clean_text"' not in manifest_text
          assert report['validation_status'] == 'PASS_SAFE_READING_SOURCE_MANIFEST'
          assert report['validation_counts']['record_count'] == 1
          assert report['validation_counts']['unsafe_policy_count'] == 0
          PY
