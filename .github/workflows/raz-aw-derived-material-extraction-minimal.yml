name: RAZ A-W Derived Material Extraction Minimal

on:
  pull_request:
    paths:
      - "ulga/builders/build_raz_aw_per_level_derived_semantic_material_extraction.py"
      - "ulga/builders/build_raz_aw_derived_material_extraction_minimal.py"
      - "ulga/validators/validate_raz_aw_derived_material_extraction_minimal.py"
      - "tests/ulga/test_raz_aw_derived_material_extraction_minimal.py"
      - ".github/workflows/raz-aw-derived-material-extraction-minimal.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_raz_aw_per_level_derived_semantic_material_extraction.py"
      - "ulga/builders/build_raz_aw_derived_material_extraction_minimal.py"
      - "ulga/validators/validate_raz_aw_derived_material_extraction_minimal.py"
      - "tests/ulga/test_raz_aw_derived_material_extraction_minimal.py"
      - ".github/workflows/raz-aw-derived-material-extraction-minimal.yml"

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"

jobs:
  derived-material-extraction-minimal:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest
      - name: Compile extraction modules
        run: |
          python -m py_compile \
            ulga/builders/build_raz_aw_per_level_derived_semantic_material_extraction.py \
            ulga/builders/build_raz_aw_derived_material_extraction_minimal.py \
            ulga/validators/validate_raz_aw_derived_material_extraction_minimal.py
      - name: Run focused regressions
        run: python -m pytest -q tests/ulga/test_raz_aw_derived_material_extraction_minimal.py
