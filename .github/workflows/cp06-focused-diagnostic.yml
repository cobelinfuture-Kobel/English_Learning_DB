name: CP06 Focused Diagnostic

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_cp06_grammar_spiral_role_population_and_content_capacity.py"
      - "ulga/builders/run_a1fs_v1_cp06_private_production.py"
      - "ulga/validators/validate_a1fs_v1_cp06_grammar_spiral_role_population_and_content_capacity.py"
      - "tests/ulga/test_a1fs_v1_cp06_grammar_spiral_role_population_and_content_capacity.py"
      - ".github/workflows/cp06-focused-diagnostic.yml"

permissions:
  contents: read

jobs:
  cp06-focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install pytest openpyxl jsonschema
      - name: Run full RAZ CP03-CP06 suite and capture complete log
        id: test
        continue-on-error: true
        run: |
          set +e
          python -m pytest -vv \
            tests/ulga/test_raz_aw_theme_authority_candidate_matching.py \
            tests/ulga/test_raz_aw_theme_gap_evidence_topic_review.py \
            tests/ulga/test_raz_ai_a1_a1plus_coverage_recheck.py \
            tests/ulga/test_raz_ai_acl_v1_s01_material_admission.py \
            tests/ulga/test_raz_ai_acl_v1_s02_semantic_dedup.py \
            tests/ulga/test_raz_ai_acl_v1_s03_authority_linkage.py \
            tests/ulga/test_raz_ai_acl_v1_s04_admission_resolution.py \
            tests/ulga/test_raz_ai_acl_v1_s05_material_registry.py \
            tests/ulga/test_raz_ai_acl_v1_s06_final_closeout.py \
            tests/ulga/test_a1fs_v1_cp03_unified_existing_24_unit_binding.py \
            tests/ulga/test_a1fs_v1_cp04_unified_content_exercise_scene_candidates.py \
            tests/ulga/test_a1fs_v1_cp04r_real_private_candidate_build.py \
            tests/ulga/test_a1fs_v1_cp05_private_candidate_materialization_and_admission.py \
            tests/ulga/test_a1fs_v1_cp06_grammar_spiral_role_population_and_content_capacity.py \
            > cp06-focused.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit $status
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cp06-full-suite-log
          path: cp06-focused.log
          retention-days: 1
      - name: Enforce focused result
        if: steps.test.outcome == 'failure'
        run: exit 1
