name: A1FS V1 R8 Real Learner Pilot Gate

on:
  pull_request:
    paths:
      - "ulga/builders/build_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py"
      - "ulga/validators/validate_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py"
      - "ulga/schemas/a1fs_v1_r8_real_learner_pilot_report.schema.json"
      - "tests/ulga/test_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py"
      - ".github/workflows/a1fs-v1-r8-real-learner-pilot.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-learner-pilot-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install pytest jsonschema
      - run: >-
          python -m compileall -q
          ulga/builders/build_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py
          ulga/validators/validate_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py
      - name: Validate R8 schema
        run: >-
          python -c "import json; from pathlib import Path; from jsonschema.validators import validator_for;
          s=json.loads(Path('ulga/schemas/a1fs_v1_r8_real_learner_pilot_report.schema.json').read_text()); validator_for(s).check_schema(s)"
      - run: >-
          python -m pytest -q
          tests/ulga/test_a1fs_v1_r8_real_learner_breadth_transfer_repair_pilot.py
          tests/ulga/test_a1fs_v1_r7_collector_runtime_coverage_gap_repair_loop.py
          tests/ulga/test_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py
          tests/ulga/test_a1fs_v1_r1_evidence_validity_system_error_governance.py
