name: A1FS V1 R5 Content Error Recovery Writeback

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-r5-content-error-recovery-writeback.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  writeback:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-content-error-session-recovery
          fetch-depth: 0

      - name: Apply bounded R5 recovery integration
        shell: pwsh
        run: |
          @'
          from pathlib import Path

          path = Path("ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str, code: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{code}_replacement_drift:{count}")
              text = text.replace(old, new, 1)

          replace_once(
              "    def initialize(self, *, bank_path: Path, supply_report_path: Path) -> dict[str, Any]:\n",
              "    def initialize(\n"
              "        self, *, bank_path: Path, supply_report_path: Path,\n"
              "        allow_bank_rebind: bool = False,\n"
              "    ) -> dict[str, Any]:\n",
              "initialize_signature",
          )

          replace_once(
              "            existing_bank = dict(connection.execute(\"SELECT key,value FROM r5_metadata\")).get(\"source_bank_sha256\")\n"
              "            if existing_bank and existing_bank != bank[\"bank_sha256\"]:\n"
              "                raise LocalEdgeRuntimeError(\"runtime_bank_binding_mismatch\")\n",
              "            existing_bank = dict(connection.execute(\"SELECT key,value FROM r5_metadata\")).get(\"source_bank_sha256\")\n"
              "            bank_rebound = bool(existing_bank and existing_bank != bank[\"bank_sha256\"])\n"
              "            if bank_rebound:\n"
              "                if not allow_bank_rebind:\n"
              "                    raise LocalEdgeRuntimeError(\"runtime_bank_binding_mismatch\")\n"
              "                open_sessions = connection.execute(\n"
              "                    \"SELECT COUNT(*) FROM edge_sessions WHERE session_state IN('ACTIVE','PAUSED')\"\n"
              "                ).fetchone()[0]\n"
              "                if open_sessions:\n"
              "                    raise LocalEdgeRuntimeError(\"runtime_bank_rebind_open_session\")\n"
              "                self._append_event(\n"
              "                    connection, learner_id=\"SYSTEM\", session_id=None,\n"
              "                    event_type=\"EDGE_RUNTIME_BANK_REBOUND\", event_at=utc(),\n"
              "                    payload={\n"
              "                        \"previous_bank_sha256\": existing_bank,\n"
              "                        \"new_bank_sha256\": bank[\"bank_sha256\"],\n"
              "                        \"new_supply_report_sha256\": report[\"report_sha256\"],\n"
              "                    },\n"
              "                )\n",
              "bank_rebind_guard",
          )

          replace_once(
              "        return {\n"
              "            \"validation_status\": STATUS,\n"
              "            \"item_count\": len(items),\n"
              "            \"assignable_cell_count\": sum(row.get(\"supply_status\") == ASSIGNABLE_CELL_STATUS for row in cell_rows),\n"
              "            \"qwen_required\": False,\n"
              "            \"next_short_step\": NEXT_SHORT_STEP,\n"
              "        }\n",
              "        return {\n"
              "            \"validation_status\": STATUS,\n"
              "            \"item_count\": len(items),\n"
              "            \"assignable_cell_count\": sum(row.get(\"supply_status\") == ASSIGNABLE_CELL_STATUS for row in cell_rows),\n"
              "            \"source_bank_sha256\": bank[\"bank_sha256\"],\n"
              "            \"source_supply_report_sha256\": report[\"report_sha256\"],\n"
              "            \"bank_rebound\": bank_rebound,\n"
              "            \"qwen_required\": False,\n"
              "            \"next_short_step\": NEXT_SHORT_STEP,\n"
              "        }\n",
              "initialize_return",
          )

          replace_once(
              "            items = connection.execute(\n"
              "                \"SELECT * FROM edge_runtime_items WHERE breadth_cell_id=? AND purpose=? ORDER BY item_id\",\n"
              "                (breadth_cell_id, purpose),\n"
              "            ).fetchall()\n"
              "            if len(items) < planned_item_count:\n",
              "            approved_ids = set(json.loads(cell[\"approved_item_ids_json\"]))\n"
              "            items = connection.execute(\n"
              "                \"SELECT * FROM edge_runtime_items WHERE breadth_cell_id=? AND purpose=? ORDER BY item_id\",\n"
              "                (breadth_cell_id, purpose),\n"
              "            ).fetchall()\n"
              "            items = [row for row in items if row[\"item_id\"] in approved_ids]\n"
              "            if len(items) < planned_item_count:\n",
              "current_supply_filter",
          )

          replace_once(
              "    def complete_session(self, **kwargs: Any) -> dict[str, Any]:\n"
              "        return self._transition(new_state=\"COMPLETED\", **kwargs)\n\n"
              "    def export_evidence(\n",
              "    def complete_session(self, **kwargs: Any) -> dict[str, Any]:\n"
              "        return self._transition(new_state=\"COMPLETED\", **kwargs)\n\n"
              "    def abandon_session(self, **kwargs: Any) -> dict[str, Any]:\n"
              "        return self._transition(new_state=\"ABANDONED\", **kwargs)\n\n"
              "    def export_evidence(\n",
              "abandon_method",
          )

          replace_once(
              "    init = commands.add_parser(\"init\"); init.add_argument(\"--database\", type=Path, required=True); init.add_argument(\"--bank\", type=Path, required=True); init.add_argument(\"--report\", type=Path, required=True)\n",
              "    init = commands.add_parser(\"init\"); init.add_argument(\"--database\", type=Path, required=True); init.add_argument(\"--bank\", type=Path, required=True); init.add_argument(\"--report\", type=Path, required=True); init.add_argument(\"--allow-bank-rebind\", action=\"store_true\")\n",
              "init_cli",
          )

          replace_once(
              "    if args.command == \"init\": result = runtime.initialize(bank_path=args.bank, supply_report_path=args.report)\n",
              "    if args.command == \"init\": result = runtime.initialize(bank_path=args.bank, supply_report_path=args.report, allow_bank_rebind=args.allow_bank_rebind)\n",
              "init_dispatch",
          )

          path.write_text(text, encoding="utf-8")
          '@ | python -
          if ($LASTEXITCODE -ne 0) { throw "R5 recovery integration patch failed" }
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "git diff --check failed" }

      - name: Commit R5 recovery integration
        shell: pwsh
        run: |
          $path = "ulga/builders/build_a1fs_v1_r5_local_edge_runtime_complete_evidence_collector.py"
          $changed = @(git status --porcelain -- $path)
          if ($changed.Count -ne 1) {
            throw "Expected exactly one changed R5 runtime file, found $($changed.Count): $($changed -join '; ')"
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $path
          if ($LASTEXITCODE -ne 0) { throw "git add failed" }
          git commit -m "Add content-error recovery and controlled bank rebind"
          if ($LASTEXITCODE -ne 0) { throw "git commit failed" }
          git push origin HEAD:fix/a1fs-v1-r5-content-error-session-recovery
          if ($LASTEXITCODE -ne 0) { throw "git push failed" }
