name: E4S A1V1 M12 Real Pilot Evidence Capture

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m12-real-pilot-evidence-capture
    paths:
      - "ulga/schemas/e4s_a1v1_m12_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py"
      - "ulga/validators/validate_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py"
      - "tests/ulga/test_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py"
      - "ulga/reports/e4s_a1v1_m12_pilot_capture_pipeline_closeout.json"
      - ".github/workflows/e4s-a1v1-m12-real-pilot-evidence-capture.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  real-pilot-capture-pipeline:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M12 capture contracts
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py
      - name: Validate M11C and M11D non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m11c_authority_reviewed_private_runtime.py
          tests/ulga/test_e4s_a1v1_m11d_system_acceptance_closeout.py
      - name: Prepare real learner pilot capture runtime
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py `
            prepare `
            --output-root ".local/e4s_a1v1/pilot/m12_prepare_ci"
      - name: Independently validate PREPARE state
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py `
            prepare `
            --output-root ".local/e4s_a1v1/pilot/m12_prepare_ci" `
            --validation-report ".local/e4s_a1v1/pilot/m12_prepare_ci/pilot_capture_validation.json"
      - name: Build one-attempt TEST_FIXTURE registry
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          from ulga.builders import build_e4s_a1v1_m08_text_mode_learner_session as m08
          root = Path('.local/e4s_a1v1/pilot/m12_fixture_ci')
          import subprocess, sys
          subprocess.run([
              sys.executable,
              'ulga/builders/build_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py',
              'prepare',
              '--output-root',
              str(root),
          ], check=True)
          manifest = json.loads((root / 'pilot_capture_manifest.private.json').read_text(encoding='utf-8'))
          bank = json.loads((root / 'runtime/source_m08/text_mode_session_bank.private.json').read_text(encoding='utf-8'))
          allowed = set(manifest['selection']['selectable_item_ids'])
          item = next(row for row in bank['items'] if row['item_id'] in allowed)
          contract = item['private_scoring_contract']
          mode = contract['scoring_mode']
          if mode in {'EXACT_OPTION', 'NORMALIZED_TEXT'}:
              response = contract['accepted_texts'][0]
          elif mode == 'EXACT_SEQUENCE':
              response = contract['accepted_sequence']
          elif mode == 'FEATURE_RUBRIC':
              response = 'This is a CI fixture response.'
          else:
              raise AssertionError(f'unsupported scoring mode: {mode}')
          registry = m08.empty_attempt_registry(bank)
          registry['session_id'] = 'ci-test-fixture-session'
          registry['learner_ref'] = 'ci-fixture-not-real-learner'
          registry['attempts'] = [{
              'item_id': item['item_id'],
              'attempt_sequence': 1,
              'response': response,
              'submitted_at': '2026-07-15T12:30:00+08:00',
              'operator_review': m08._empty_review(),
          }]
          path = root / 'ci_test_fixture_registry.private.json'
          path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          '@ | python -
      - name: Import only the TEST_FIXTURE registry
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py `
            import-evidence `
            --output-root ".local/e4s_a1v1/pilot/m12_fixture_ci" `
            --attempt-registry ".local/e4s_a1v1/pilot/m12_fixture_ci/ci_test_fixture_registry.private.json" `
            --evidence-origin TEST_FIXTURE
      - name: Independently validate TEST_FIXTURE import
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py `
            import-evidence `
            --output-root ".local/e4s_a1v1/pilot/m12_fixture_ci" `
            --expected-origin TEST_FIXTURE `
            --validation-report ".local/e4s_a1v1/pilot/m12_fixture_ci/pilot_capture_validation.json"
      - name: Enforce prepare and fixture evidence boundaries
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          prepare_root = Path('.local/e4s_a1v1/pilot/m12_prepare_ci')
          fixture_root = Path('.local/e4s_a1v1/pilot/m12_fixture_ci')
          manifest = json.loads((prepare_root / 'pilot_capture_manifest.private.json').read_text(encoding='utf-8'))
          readiness = json.loads((prepare_root / 'pilot_capture_readiness_safe_report.json').read_text(encoding='utf-8'))
          prepare_validation = json.loads((prepare_root / 'pilot_capture_validation.json').read_text(encoding='utf-8'))
          fixture = json.loads((fixture_root / 'pilot_evidence_capture_safe_report.json').read_text(encoding='utf-8'))
          fixture_validation = json.loads((fixture_root / 'pilot_capture_validation.json').read_text(encoding='utf-8'))
          assert manifest['selection']['selectable_item_count'] == 184
          assert manifest['selection']['private_ready_unit_count'] == 23
          assert manifest['selection']['private_ready_row_count'] == 107
          assert len(manifest['selection']['selectable_item_ids']) == 184
          assert manifest['deferred_unit']['grammar_unit_id'] == 'GRAMMAR_WILL_FUTURE_A1'
          assert manifest['deferred_unit']['excluded_item_count'] == 8
          assert manifest['attempt_registry_contract']['minimum_attempt_count'] == 1
          assert manifest['attempt_registry_contract']['evidence_origin_required'] == 'REAL_LEARNER'
          assert readiness['mode'] == 'PREPARE'
          assert readiness['actual_attempt_count'] == 0
          assert readiness['real_learner_evidence_captured'] is False
          assert readiness['validation_status'] == 'PASS_M12_REAL_LEARNER_PILOT_CAPTURE_PIPELINE_READY'
          assert readiness['stop_reason'] == 'REAL_LEARNER_SESSION_EVIDENCE_REQUIRED'
          assert prepare_validation['error_count'] == 0
          assert prepare_validation['real_learner_evidence_captured'] is False
          assert fixture['mode'] == 'IMPORT'
          assert fixture['evidence_origin'] == 'TEST_FIXTURE'
          assert fixture['actual_attempt_count'] == 1
          assert fixture['real_learner_evidence_captured'] is False
          assert fixture['real_learner_pilot_completed'] is False
          assert fixture['learner_mastery_claimed'] is False
          assert fixture['retention_confirmed'] is False
          assert fixture['validation_status'] == 'PASS_M12_CAPTURE_PIPELINE_TEST_FIXTURE_VALIDATED'
          assert fixture['stop_reason'] == 'REAL_LEARNER_SESSION_EVIDENCE_REQUIRED'
          assert fixture_validation['error_count'] == 0
          assert fixture_validation['evidence_origin'] == 'TEST_FIXTURE'
          assert fixture_validation['real_learner_evidence_captured'] is False
          assert fixture_validation['learner_mastery_claimed'] is False
          '@ | python -
      - name: Verify no real learner import is executed in CI
        shell: pwsh
        run: |
          $workflow = Get-Content ".github/workflows/e4s-a1v1-m12-real-pilot-evidence-capture.yml" -Raw
          if ($workflow -match '(?m)^\s*--evidence-origin\s+REAL_LEARNER\s*$') {
            throw 'M12 CI must never execute a REAL_LEARNER import.'
          }
          if ($workflow -match '(?m)^\s*--expected-origin\s+REAL_LEARNER\s*$') {
            throw 'M12 CI must never validate a fixture as REAL_LEARNER.'
          }
      - name: Verify no prohibited artifacts or canonical writes
        shell: pwsh
        run: |
          $changed = git diff --name-only origin/main...HEAD
          $forbidden = $changed | Where-Object {
            $_ -match '^ulga/graph/' -or
            $_ -match '(?i)(design|planning|preview|review_packet|sync).*\.md$' -or
            $_.ToLowerInvariant().EndsWith('.wav') -or
            $_.ToLowerInvariant().EndsWith('.webm') -or
            $_.ToLowerInvariant().EndsWith('.mp3') -or
            $_.ToLowerInvariant().EndsWith('.pdf')
          }
          if ($forbidden) {
            throw "M12 touched prohibited files: $forbidden"
          }
      - name: Verify private outputs remain ignored
        shell: pwsh
        run: |
          git check-ignore .local/e4s_a1v1/pilot/m12_prepare_ci/pilot_capture_manifest.private.json
          git check-ignore .local/e4s_a1v1/pilot/m12_fixture_ci/pilot_progress_ledger.private.json
          if (git status --porcelain | Select-String '^.. \.local/') {
            throw 'M12 private capture output escaped ignore policy.'
          }
      - name: Build metadata-only M12 pipeline closeout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m12 | Out-Null
          @'
          import hashlib, json
          from pathlib import Path
          prepare_root = Path('.local/e4s_a1v1/pilot/m12_prepare_ci')
          fixture_root = Path('.local/e4s_a1v1/pilot/m12_fixture_ci')
          manifest_path = prepare_root / 'pilot_capture_manifest.private.json'
          readiness_path = prepare_root / 'pilot_capture_readiness_safe_report.json'
          prepare_validation_path = prepare_root / 'pilot_capture_validation.json'
          fixture_report_path = fixture_root / 'pilot_evidence_capture_safe_report.json'
          fixture_validation_path = fixture_root / 'pilot_capture_validation.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          readiness = json.loads(readiness_path.read_text(encoding='utf-8'))
          prepare_validation = json.loads(prepare_validation_path.read_text(encoding='utf-8'))
          fixture = json.loads(fixture_report_path.read_text(encoding='utf-8'))
          fixture_validation = json.loads(fixture_validation_path.read_text(encoding='utf-8'))
          def digest(path):
              return hashlib.sha256(path.read_text(encoding='utf-8').encode('utf-8')).hexdigest()
          receipt = {
              'task_id': 'E4S-A1V1-M12_A1A1PlusRealLearnerPilotEvidenceCapture',
              'artifact_type': 'metadata_only_m12_real_pilot_capture_pipeline_closeout',
              'schema_version': 'e4s.a1v1.m12_pilot_capture_pipeline_closeout.v1',
              'scope': 'A1_A1_PLUS_PRIVATE_CHILD_PATH_ONLY',
              'pipeline_status': readiness['validation_status'],
              'test_fixture_status': fixture['validation_status'],
              'capture_contract': {
                  'selectable_items': manifest['selection']['selectable_item_count'],
                  'private_ready_units': manifest['selection']['private_ready_unit_count'],
                  'private_ready_rows': manifest['selection']['private_ready_row_count'],
                  'minimum_real_attempts': manifest['attempt_registry_contract']['minimum_attempt_count'],
                  'maximum_real_attempts': manifest['attempt_registry_contract']['maximum_attempt_count'],
                  'deferred_unit': manifest['deferred_unit'],
              },
              'ci_fixture_evidence': {
                  'evidence_origin': fixture['evidence_origin'],
                  'attempt_count': fixture['actual_attempt_count'],
                  'real_learner_evidence_captured': fixture['real_learner_evidence_captured'],
                  'learner_mastery_claimed': fixture['learner_mastery_claimed'],
                  'retention_confirmed': fixture['retention_confirmed'],
              },
              'validation': {
                  'prepare_errors': prepare_validation['error_count'],
                  'fixture_import_errors': fixture_validation['error_count'],
              },
              'artifact_hashes': {
                  'capture_manifest_sha256': digest(manifest_path),
                  'readiness_safe_report_sha256': digest(readiness_path),
                  'prepare_validation_sha256': digest(prepare_validation_path),
                  'fixture_safe_report_sha256': digest(fixture_report_path),
                  'fixture_validation_sha256': digest(fixture_validation_path),
              },
              'claim_boundaries': readiness['claim_boundaries'],
              'real_learner_evidence_captured': False,
              'real_learner_pilot_completed': False,
              'learner_mastery_claimed': False,
              'retention_confirmed': False,
              'stop_reason': 'REAL_LEARNER_SESSION_EVIDENCE_REQUIRED',
              'last_completed_status': 'PASS_M12_REAL_LEARNER_PILOT_CAPTURE_PIPELINE_READY',
              'next_short_step': 'E4S-A1V1-M12B_RealLearnerPilotEvidenceImportAndQA',
              'required_operator_artifact': 'm08_text_mode_attempt_registry.private.json',
          }
          Path('generated/m12/e4s_a1v1_m12_pilot_capture_pipeline_closeout.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          '@ | python -
      - name: Upload metadata-only M12 pipeline closeout
        uses: actions/upload-artifact@v4
        with:
          name: m12-real-pilot-capture-pipeline-closeout
          path: generated/m12
          if-no-files-found: error
          retention-days: 2
