name: RAZ A-F Full Material Yield

on:
  pull_request:
    paths:
      - "ulga/builders/build_raz_af_full_material_yield_and_sufficiency.py"
      - "ulga/validators/validate_raz_af_full_material_yield_and_sufficiency.py"
      - "ulga/schemas/raz_af_full_material_yield_and_sufficiency.schema.json"
      - "tests/ulga/test_raz_af_full_material_yield_and_sufficiency.py"
      - ".github/workflows/raz-af-full-material-yield.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_raz_af_full_material_yield_and_sufficiency.py"
      - "ulga/validators/validate_raz_af_full_material_yield_and_sufficiency.py"
      - "ulga/schemas/raz_af_full_material_yield_and_sufficiency.schema.json"
      - "tests/ulga/test_raz_af_full_material_yield_and_sufficiency.py"
      - ".github/workflows/raz-af-full-material-yield.yml"

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"

jobs:
  material-yield-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        run: python -m pip install pytest jsonschema
      - name: Compile builder and validator
        run: |
          python -m py_compile \
            ulga/builders/build_raz_af_full_material_yield_and_sufficiency.py \
            ulga/validators/validate_raz_af_full_material_yield_and_sufficiency.py
      - name: Validate schema
        run: |
          python - <<'PY'
          import json
          from jsonschema import Draft202012Validator
          schema = json.load(open(
              "ulga/schemas/raz_af_full_material_yield_and_sufficiency.schema.json",
              encoding="utf-8",
          ))
          Draft202012Validator.check_schema(schema)
          assert schema["additionalProperties"] is False
          PY
      - name: Run focused material-yield regressions
        run: python -m pytest -q tests/ulga/test_raz_af_full_material_yield_and_sufficiency.py
