name: E4S A1V1 M06 Speaking V1

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m06-speaking-v1-integration
      - agent/e4s-a1v1-m06-speaking-evidence-export-fullfix
    paths:
      - "ulga/schemas/e4s_a1v1_speaking_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_speaking_v1.py"
      - "ulga/builders/build_e4s_a1v1_speaking_evidence_registry.py"
      - "ulga/validators/validate_e4s_a1v1_speaking_v1.py"
      - "ulga/query/e4s_a1v1_speaking_consumer.py"
      - "tests/ulga/test_e4s_a1v1_m06_speaking_v1.py"
      - "tests/ulga/test_e4s_a1v1_m06_speaking_evidence_registry.py"
      - ".github/workflows/e4s-a1v1-m06-speaking-v1.yml"
      - "ulga/reports/e4s_a1v1_m06_speaking_v1_closeout.json"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deterministic-speaking-contract:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused test dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Run browser-evidence FullFix diagnostic
        id: focused
        continue-on-error: true
        shell: pwsh
        run: |
          python -m pytest -q --tb=line --maxfail=1 tests/ulga/test_e4s_a1v1_m06_speaking_evidence_registry.py *> m06-evidence-fullfix.log
          $code = $LASTEXITCODE
          Get-Content m06-evidence-fullfix.log
          exit $code
      - name: Upload browser-evidence FullFix diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: m06-evidence-fullfix-diagnostic
          path: m06-evidence-fullfix.log
          if-no-files-found: error
          retention-days: 1
      - name: Enforce browser-evidence FullFix result
        if: steps.focused.outcome != 'success'
        shell: pwsh
        run: throw 'M06 evidence FullFix failed; diagnostic artifact uploaded.'
      - name: Validate existing M06 and upstream non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m06_speaking_v1.py
          tests/ulga/test_a1_grammar_speaking_integration.py
          tests/ulga/test_e4s_a1v1_m03_shared_item_contract.py
          tests/ulga/test_e4s_a1v1_m05_listening_v1.py
      - name: Verify direct CLI entry points
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_speaking_v1.py --help
          python ulga/builders/build_e4s_a1v1_speaking_evidence_registry.py --help
          python ulga/validators/validate_e4s_a1v1_speaking_v1.py --help
          python ulga/query/e4s_a1v1_speaking_consumer.py --help
