name: E4S A1V1 M11B Authority Exception Resolution

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m11b-authority-exception-revision
    paths:
      - "ulga/evidence/e4s_a1v1_m11b_*.json"
      - "ulga/schemas/e4s_a1v1_m11b_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_m11b_authority_exception_resolution.py"
      - "ulga/validators/validate_e4s_a1v1_m11b_authority_exception_resolution.py"
      - "tests/ulga/test_e4s_a1v1_m11b_authority_exception_resolution.py"
      - "ulga/reports/e4s_a1v1_m11b_authority_exception_resolution_closeout.json"
      - ".github/workflows/e4s-a1v1-m11b-authority-exception-resolution.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authority-exception-resolution:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M11B contracts
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_e4s_a1v1_m11b_authority_exception_resolution.py
      - name: Validate M10 M11 M11A and candidate-source non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m10_coverage_recheck.py
          tests/ulga/test_e4s_a1v1_m11_candidate_content_review.py
          tests/ulga/test_e4s_a1v1_m11a_authority_evidence_review.py
          tests/ulga/test_a1_grammar_full_teachable_candidate_coverage.py
      - name: Build real M11B authority exception resolution
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m11b_authority_exception_resolution.py `
            --output-root ".local/e4s_a1v1/content_review/m11b_ci"
      - name: Independently validate M11B outputs
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m11b_authority_exception_resolution.py `
            --output-root ".local/e4s_a1v1/content_review/m11b_ci" `
            --validation-report ".local/e4s_a1v1/content_review/m11b_ci/authority_exception_resolution_validation.json"
      - name: Verify resolution accounting and boundaries
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/content_review/m11b_ci')
          matrix = json.loads((root / 'authority_exception_resolution_matrix.private.json').read_text(encoding='utf-8'))
          bank = json.loads((root / 'reviewed_private_learning_unit_bank.json').read_text(encoding='utf-8'))
          report = json.loads((root / 'authority_exception_resolution_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'authority_exception_resolution_validation.json').read_text(encoding='utf-8'))
          assert matrix['exception_count'] == 4
          assert report['resolution_counts'] == {
              'RESOLVED_AUTO_PASS': 3,
              'DEFERRED_CAMBRIDGE_CEILING': 1,
              'UNRESOLVED': 0,
          }
          assert bank['reviewed_unit_count'] == 23
          assert bank['deferred_unit_count'] == 1
          assert report['unresolved_exception_count'] == 0
          assert report['validation_status'] == 'PASS_M11B_AUTHORITY_EXCEPTIONS_RESOLVED'
          assert report['stop_reason'] == 'NONE'
          assert report['next_short_step'] == 'E4S-A1V1-M11C_AuthorityReviewedPrivateBankConsumerAndRuntimeIntegration'
          assert validation['error_count'] == 0
          assert validation['canonical_egp_mapping_changed'] is False
          assert validation['canonical_authority_promotion'] is False
          assert validation['learner_mastery_claimed'] is False
          assert validation['a2_content_promoted'] is False
          reviewed_ids = {row['grammar_unit_id'] for row in bank['reviewed_units']}
          assert 'GRAMMAR_WILL_FUTURE_A1' not in reviewed_ids
          assert bank['deferred_units'][0]['canonical_egp_mapping_preserved'] is True
          '@ | python -
      - name: Verify no canonical graph or Cambridge source bytes changed
        shell: pwsh
        run: |
          $changed = git diff --name-only origin/main...HEAD
          $forbidden = $changed | Where-Object {
            $_ -match '^ulga/graph/' -or
            ($_.ToLowerInvariant().EndsWith('.pdf') -and $_ -match 'cambridge|yle|key')
          }
          if ($forbidden) {
            throw "M11B touched forbidden canonical/source files: $forbidden"
          }
      - name: Verify private outputs remain ignored
        shell: pwsh
        run: |
          git check-ignore .local/e4s_a1v1/content_review/m11b_ci/authority_exception_resolution_matrix.private.json
          git check-ignore .local/e4s_a1v1/content_review/m11b_ci/reviewed_private_learning_unit_bank.json
          if (git status --porcelain | Select-String '^.. \.local/') {
            throw 'M11B private output escaped ignore policy.'
          }
      - name: Build metadata-only M11B closeout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m11b | Out-Null
          @'
          import hashlib, json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/content_review/m11b_ci')
          report = json.loads((root / 'authority_exception_resolution_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'authority_exception_resolution_validation.json').read_text(encoding='utf-8'))
          def digest(path):
              return hashlib.sha256(path.read_text(encoding='utf-8').encode('utf-8')).hexdigest()
          receipt = {
              'task_id': 'E4S-A1V1-M11B_AuthorityExceptionContentRevisionAndRevalidation',
              'artifact_type': 'metadata_only_m11b_authority_exception_resolution_closeout',
              'schema_version': 'e4s.a1v1.m11b_authority_exception_resolution_closeout.v1',
              'scope': 'A1_A1_PLUS_PRIVATE_CHILD_PATH_ONLY',
              'validation_status': report['validation_status'],
              'completion': {
                  'candidate_units': report['candidate_unit_count'],
                  'canonical_egp_rows': report['canonical_egp_row_count'],
                  'source_exceptions': report['source_exception_count'],
                  'resolution_counts': report['resolution_counts'],
                  'private_ready_units': report['private_ready_unit_count'],
                  'private_ready_rows': report['private_ready_row_count'],
                  'deferred_units': report['deferred_unit_count'],
                  'unresolved_exceptions': report['unresolved_exception_count'],
                  'independent_validation_errors': validation['error_count'],
              },
              'artifact_hashes': {
                  'safe_report_sha256': digest(root / 'authority_exception_resolution_safe_report.json'),
                  'validation_sha256': digest(root / 'authority_exception_resolution_validation.json'),
              },
              'claim_boundaries': report['claim_boundaries'],
              'stop_reason': report['stop_reason'],
              'last_completed_status': 'PASS_M11B_AUTHORITY_EXCEPTIONS_RESOLVED',
              'next_short_step': report['next_short_step'],
          }
          Path('generated/m11b/e4s_a1v1_m11b_authority_exception_resolution_closeout.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          '@ | python -
      - name: Upload metadata-only M11B closeout
        uses: actions/upload-artifact@v4
        with:
          name: m11b-authority-exception-resolution-closeout
          path: generated/m11b
          if-no-files-found: error
          retention-days: 2
