name: E4S A1V1 M12D Representative Pilot Expansion

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m12d-representative-pilot-expansion
    paths:
      - "ulga/schemas/e4s_a1v1_m12d_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_m12d_representative_pilot_expansion.py"
      - "ulga/validators/validate_e4s_a1v1_m12d_representative_pilot_expansion.py"
      - "tests/ulga/test_e4s_a1v1_m12d_representative_pilot_expansion.py"
      - "ulga/reports/e4s_a1v1_m12d_representative_pilot_pipeline_closeout.json"
      - ".github/workflows/e4s-a1v1-m12d-representative-pilot-expansion.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  representative-pilot-expansion:
    runs-on: windows-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M12D contracts
        shell: pwsh
        run: python -m pytest -q --tb=short tests/ulga/test_e4s_a1v1_m12d_representative_pilot_expansion.py
      - name: Validate M12 and M12C non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m12_real_learner_pilot_evidence_capture.py
          tests/ulga/test_e4s_a1v1_m12c_real_learner_pilot_evidence_qa.py
      - name: Build TEST_FIXTURE prior evidence and M12C QA
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          from ulga.builders import build_e4s_a1v1_m12_real_learner_pilot_evidence_capture as m12
          from ulga.builders import build_e4s_a1v1_m12c_real_learner_pilot_evidence_qa as m12c
          root = Path('.local/e4s_a1v1/pilot/m12d_fixture_ci')
          m12_root = root / 'm12'
          m12c_root = root / 'm12c'
          prepared = m12.prepare_capture(m12_root)
          manifest = prepared['manifest']
          bank = json.loads((m12_root / 'runtime/source_m08/text_mode_session_bank.private.json').read_text(encoding='utf-8'))
          allowed = set(manifest['selection']['selectable_item_ids'])
          item = next(row for row in bank['items'] if row['item_id'] in allowed and row['private_scoring_contract']['scoring_mode'] != 'HUMAN_REVIEW')
          contract = item['private_scoring_contract']
          mode = contract['scoring_mode']
          if mode in {'EXACT_OPTION','NORMALIZED_TEXT'}:
              response = contract['accepted_texts'][0]
          elif mode == 'EXACT_SEQUENCE':
              response = contract['accepted_sequence']
          elif mode == 'EXACT_MORPHOLOGY':
              response = ' '.join(str(value) for value in contract.get('correct_morphology_parts', []))
          else:
              response = 'CI prior fixture response.'
          registry = m12.m08.empty_attempt_registry(bank)
          registry['session_id'] = 'm12d-ci-prior'
          registry['learner_ref'] = 'fixture-learner'
          registry['attempts'] = [{
              'item_id': item['item_id'],
              'attempt_sequence': 1,
              'response': response,
              'submitted_at': '2026-07-15T13:16:05.516Z',
              'operator_review': m12.m08._empty_review(),
          }]
          path = root / 'prior_registry.private.json'
          path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          m12.import_evidence(m12_root, path, evidence_origin='TEST_FIXTURE')
          m12c.build_qa(m12_root, m12c_root, expected_origin='TEST_FIXTURE')
          '@ | python -
      - name: Prepare balanced M12D representative batch
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m12d_representative_pilot_expansion.py `
            prepare `
            --input-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12c" `
            --output-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12d" `
            --expected-origin TEST_FIXTURE
      - name: Build TEST_FIXTURE batch registry and import
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          from ulga.builders import build_e4s_a1v1_m12_real_learner_pilot_evidence_capture as m12
          root = Path('.local/e4s_a1v1/pilot/m12d_fixture_ci')
          m12_root = root / 'm12'
          m12d_root = root / 'm12d'
          manifest = json.loads((m12d_root / 'representative_batch_manifest.private.json').read_text(encoding='utf-8'))
          bank = json.loads((m12_root / 'runtime/source_m08/text_mode_session_bank.private.json').read_text(encoding='utf-8'))
          prior = json.loads((m12_root / 'pilot_attempt_registry.private.json').read_text(encoding='utf-8'))
          by_id = {row['item_id']: row for row in bank['items']}
          def response_for(item):
              contract = item['private_scoring_contract']
              mode = contract['scoring_mode']
              if mode in {'EXACT_OPTION','NORMALIZED_TEXT'}:
                  return contract['accepted_texts'][0]
              if mode == 'EXACT_SEQUENCE':
                  return contract['accepted_sequence']
              if mode == 'EXACT_MORPHOLOGY':
                  return ' '.join(str(value) for value in contract.get('correct_morphology_parts', []))
              return 'CI batch fixture response.'
          registry = m12.m08.empty_attempt_registry(bank)
          registry['session_id'] = 'm12d-ci-batch'
          registry['learner_ref'] = prior['learner_ref']
          registry['attempts'] = [{
              'item_id': item_id,
              'attempt_sequence': index,
              'response': response_for(by_id[item_id]),
              'submitted_at': f'2026-07-15T13:{20 + index:02d}:05.516Z',
              'operator_review': m12.m08._empty_review(),
          } for index, item_id in enumerate(manifest['batch_selection']['item_ids'], start=1)]
          path = root / 'batch_registry.private.json'
          path.write_text(json.dumps(registry, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          '@ | python -
          python ulga/builders/build_e4s_a1v1_m12d_representative_pilot_expansion.py `
            import-batch `
            --input-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12c" `
            --output-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12d" `
            --batch-registry ".local/e4s_a1v1/pilot/m12d_fixture_ci/batch_registry.private.json" `
            --expected-origin TEST_FIXTURE
      - name: Independently validate M12D fixture import
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m12d_representative_pilot_expansion.py `
            import-batch `
            --input-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12" `
            --qa-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12c" `
            --output-root ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12d" `
            --expected-origin TEST_FIXTURE `
            --validation-report ".local/e4s_a1v1/pilot/m12d_fixture_ci/m12d/representative_pilot_validation.json"
      - name: Enforce representative accounting and fixture boundaries
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12d_fixture_ci/m12d')
          manifest = json.loads((root / 'representative_batch_manifest.private.json').read_text(encoding='utf-8'))
          report = json.loads((root / 'representative_pilot_expansion_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'representative_pilot_validation.json').read_text(encoding='utf-8'))
          assert manifest['batch_selection']['batch_size'] == 8
          assert manifest['batch_selection']['grammar_unit_count'] == 4
          assert manifest['batch_selection']['skill_counts'] == {'reading': 4, 'writing': 4}
          assert manifest['batch_selection']['role_counts'] == {'practice': 4, 'assessment': 4}
          assert not any(item_id.startswith('GRAMMAR_WILL_FUTURE_A1') for item_id in manifest['batch_selection']['item_ids'])
          assert report['evidence_origin'] == 'TEST_FIXTURE'
          assert report['prior_attempt_count'] == 1
          assert report['batch_attempt_count'] == 8
          assert report['cumulative_attempt_count'] == 9
          assert report['validation_status'] == 'PASS_M12D_TEST_FIXTURE_REPRESENTATIVE_BATCH_VALIDATED'
          assert report['stop_reason'] == 'REAL_LEARNER_REPRESENTATIVE_BATCH_REQUIRED'
          assert report['claim_boundaries']['test_fixture_counted_as_real_evidence'] is False
          assert report['claim_boundaries']['learner_mastery_claimed'] is False
          assert validation['error_count'] == 0
          assert validation['cumulative_attempt_count'] == 9
          '@ | python -
      - name: Verify CI never claims real learner expansion
        shell: pwsh
        run: |
          $workflow = Get-Content ".github/workflows/e4s-a1v1-m12d-representative-pilot-expansion.yml" -Raw
          if ($workflow -match '(?m)^\s*--expected-origin\s+REAL_LEARNER\s*$') {
            throw 'M12D CI must never process fixture data as REAL_LEARNER.'
          }
      - name: Verify no prohibited artifacts or canonical writes
        shell: pwsh
        run: |
          $changed = git diff --name-only origin/main...HEAD
          $forbidden = $changed | Where-Object {
            $_ -match '^ulga/graph/' -or
            $_ -match '(?i)(design|planning|preview|review_packet|sync).*\.md$' -or
            $_.ToLowerInvariant().EndsWith('.wav') -or
            $_.ToLowerInvariant().EndsWith('.webm') -or
            $_.ToLowerInvariant().EndsWith('.mp3') -or
            $_.ToLowerInvariant().EndsWith('.pdf')
          }
          if ($forbidden) { throw "M12D touched prohibited files: $forbidden" }
      - name: Verify private outputs remain ignored
        shell: pwsh
        run: |
          git check-ignore .local/e4s_a1v1/pilot/m12d_fixture_ci/m12d/cumulative_attempt_registry.private.json
          git check-ignore .local/e4s_a1v1/pilot/m12d_fixture_ci/m12d/representative_pilot_expansion_safe_report.json
          if (git status --porcelain | Select-String '^.. \.local/') {
            throw 'M12D local outputs escaped ignore policy.'
          }
      - name: Build metadata-only M12D pipeline closeout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m12d | Out-Null
          @'
          import hashlib, json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/pilot/m12d_fixture_ci/m12d')
          report_path = root / 'representative_pilot_expansion_safe_report.json'
          validation_path = root / 'representative_pilot_validation.json'
          report = json.loads(report_path.read_text(encoding='utf-8'))
          validation = json.loads(validation_path.read_text(encoding='utf-8'))
          def digest(path): return hashlib.sha256(path.read_text(encoding='utf-8').encode('utf-8')).hexdigest()
          receipt = {
              'task_id': 'E4S-A1V1-M12D_RepresentativePilotExpansion',
              'artifact_type': 'metadata_only_m12d_representative_pilot_pipeline_closeout',
              'schema_version': 'e4s.a1v1.m12d.representative_pilot_pipeline_closeout.v1',
              'scope': 'A1_A1_PLUS_PRIVATE_CHILD_PATH_ONLY',
              'fixture_validation_status': report['validation_status'],
              'fixture_prior_attempt_count': report['prior_attempt_count'],
              'fixture_batch_attempt_count': report['batch_attempt_count'],
              'fixture_cumulative_attempt_count': report['cumulative_attempt_count'],
              'batch_selection': report['batch_selection'],
              'independent_validation_errors': validation['error_count'],
              'artifact_hashes': {
                  'fixture_expansion_report_sha256': digest(report_path),
                  'fixture_expansion_validation_sha256': digest(validation_path),
              },
              'claim_boundaries': report['claim_boundaries'],
              'real_learner_evidence_in_ci': False,
              'learner_mastery_claimed': False,
              'retention_confirmed': False,
              'stop_reason': 'REAL_LEARNER_REPRESENTATIVE_BATCH_REQUIRED',
              'last_completed_status': 'PASS_M12D_REPRESENTATIVE_PILOT_PIPELINE_READY',
              'next_short_step': 'E4S-A1V1-M12D_RepresentativePilotExpansion',
          }
          Path('generated/m12d/e4s_a1v1_m12d_representative_pilot_pipeline_closeout.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          '@ | python -
      - name: Compare committed M12D closeout
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          committed = json.loads(Path('ulga/reports/e4s_a1v1_m12d_representative_pilot_pipeline_closeout.json').read_text(encoding='utf-8'))
          generated = json.loads(Path('generated/m12d/e4s_a1v1_m12d_representative_pilot_pipeline_closeout.json').read_text(encoding='utf-8'))
          assert committed == generated, 'committed M12D closeout drift'
          '@ | python -
      - name: Upload metadata-only M12D closeout
        uses: actions/upload-artifact@v4
        with:
          name: m12d-representative-pilot-pipeline-closeout
          path: generated/m12d
          if-no-files-found: error
          retention-days: 2
