name: E4S A1V1 M11A Authority Evidence Review

on:
  push:
    branches:
      - main
      - agent/e4s-a1v1-m11a-authority-evidence-review-fullfix
    paths:
      - "ulga/evidence/e4s_a1v1_m11a_*.json"
      - "ulga/schemas/e4s_a1v1_m11a_*.schema.json"
      - "ulga/builders/build_e4s_a1v1_m11a_authority_evidence_review.py"
      - "ulga/validators/validate_e4s_a1v1_m11a_authority_evidence_review.py"
      - "ulga/query/e4s_a1v1_m11a_authority_evidence_consumer.py"
      - "tests/ulga/test_e4s_a1v1_m11a_authority_evidence_review.py"
      - "ulga/reports/e4s_a1v1_m11a_authority_evidence_review_closeout.json"
      - ".github/workflows/e4s-a1v1-m11a-authority-evidence-review.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  authority-evidence-review:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependencies
        shell: pwsh
        run: python -m pip install pytest jsonschema
      - name: Validate focused M11A contracts
        shell: pwsh
        run: >-
          python -m pytest -q --tb=short
          tests/ulga/test_e4s_a1v1_m11a_authority_evidence_review.py
      - name: Validate M10/M11 and candidate-source non-regression
        shell: pwsh
        run: >-
          python -m pytest -q
          tests/ulga/test_e4s_a1v1_m10_coverage_recheck.py
          tests/ulga/test_e4s_a1v1_m11_candidate_content_review.py
          tests/ulga/test_a1_grammar_full_teachable_candidate_coverage.py
      - name: Build real 24-unit authority evidence review
        shell: pwsh
        run: |
          python ulga/builders/build_e4s_a1v1_m11a_authority_evidence_review.py `
            --output-root ".local/e4s_a1v1/content_review/m11a_ci"
      - name: Independently validate authority evidence review
        shell: pwsh
        run: |
          python ulga/validators/validate_e4s_a1v1_m11a_authority_evidence_review.py `
            --output-root ".local/e4s_a1v1/content_review/m11a_ci" `
            --validation-report ".local/e4s_a1v1/content_review/m11a_ci/authority_review_validation.json"
      - name: Verify safe query and evidence accounting
        shell: pwsh
        run: |
          python ulga/query/e4s_a1v1_m11a_authority_evidence_consumer.py `
            --output-root ".local/e4s_a1v1/content_review/m11a_ci" summary
          @'
          import json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/content_review/m11a_ci')
          matrix = json.loads((root / 'authority_evidence_matrix.private.json').read_text(encoding='utf-8'))
          bank = json.loads((root / 'reviewed_private_learning_unit_bank.json').read_text(encoding='utf-8'))
          report = json.loads((root / 'authority_review_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'authority_review_validation.json').read_text(encoding='utf-8'))
          assert matrix['unit_count'] == 24
          assert matrix['canonical_egp_row_count'] == 109
          assert report['decision_counts'] == {
              'AUTO_PASS': 20,
              'REVISION_REQUIRED': 3,
              'AUTHORITY_CONFLICT': 1,
              'SOURCE_EVIDENCE_MISSING': 0,
          }
          assert bank['reviewed_unit_count'] == 20
          assert report['stop_reason'] == 'NONE'
          assert report['next_short_step'] == 'E4S-A1V1-M11B_AuthorityExceptionContentRevisionAndRevalidation'
          assert validation['error_count'] == 0
          assert validation['manual_checkbox_approval_required'] is False
          assert validation['canonical_authority_promotion'] is False
          assert validation['learner_mastery_claimed'] is False
          assert validation['a2_content_promoted'] is False
          '@ | python -
      - name: Verify Cambridge raw source boundary
        shell: pwsh
        run: |
          $trackedPdf = git diff --name-only origin/main...HEAD | Where-Object { $_.ToLowerInvariant().EndsWith('.pdf') -and $_ -match 'cambridge|yle|key' }
          if ($trackedPdf) {
            throw "M11A must not commit Cambridge PDF bytes: $trackedPdf"
          }
          @'
          import json
          from pathlib import Path
          manifest = json.loads(Path('ulga/evidence/e4s_a1v1_m11a_cambridge_source_manifest.json').read_text(encoding='utf-8'))
          boundaries = manifest['claim_boundaries']
          assert boundaries['raw_pdf_committed'] is False
          assert boundaries['official_question_text_committed'] is False
          assert boundaries['official_answer_text_committed'] is False
          assert boundaries['full_wordlist_committed'] is False
          assert boundaries['metadata_and_page_refs_only'] is True
          assert all(source['learner_facing_copy_allowed'] is False for source in manifest['sources'])
          '@ | python -
      - name: Verify private outputs remain ignored
        shell: pwsh
        run: |
          git check-ignore .local/e4s_a1v1/content_review/m11a_ci/authority_evidence_matrix.private.json
          git check-ignore .local/e4s_a1v1/content_review/m11a_ci/reviewed_private_learning_unit_bank.json
          if (git status --porcelain | Select-String '^.. \.local/') {
            throw 'M11A private output escaped ignore policy.'
          }
      - name: Build metadata-only M11A closeout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force generated/m11a | Out-Null
          @'
          import hashlib, json
          from pathlib import Path
          root = Path('.local/e4s_a1v1/content_review/m11a_ci')
          report = json.loads((root / 'authority_review_safe_report.json').read_text(encoding='utf-8'))
          validation = json.loads((root / 'authority_review_validation.json').read_text(encoding='utf-8'))
          def digest(path):
              return hashlib.sha256(path.read_text(encoding='utf-8').encode('utf-8')).hexdigest()
          receipt = {
              'task_id': 'E4S-A1V1-M11A_AuthorityAndCambridgeEvidenceDrivenCandidateReviewFullFix',
              'artifact_type': 'metadata_only_m11a_authority_evidence_review_closeout',
              'schema_version': 'e4s.a1v1.m11a_authority_evidence_review_closeout.v1',
              'scope': 'A1_A1_PLUS_ONLY',
              'validation_status': report['validation_status'],
              'completion': {
                  'candidate_units': report['candidate_unit_count'],
                  'canonical_egp_rows': report['canonical_egp_row_count'],
                  'decision_counts': report['decision_counts'],
                  'reviewed_units': report['reviewed_unit_count'],
                  'reviewed_rows': report['reviewed_row_count'],
                  'independent_validation_errors': validation['error_count'],
              },
              'artifact_hashes': {
                  'safe_report_sha256': digest(root / 'authority_review_safe_report.json'),
                  'validation_sha256': digest(root / 'authority_review_validation.json'),
              },
              'source_verification': report['source_verification'],
              'claim_boundaries': report['claim_boundaries'],
              'stop_reason': report['stop_reason'],
              'last_completed_status': 'PASS_M11A_AUTHORITY_EVIDENCE_REVIEW_AND_PRIVATE_AUTO_PROMOTION',
              'next_short_step': report['next_short_step'],
          }
          Path('generated/m11a/e4s_a1v1_m11a_authority_evidence_review_closeout.json').write_text(
              json.dumps(receipt, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          '@ | python -
      - name: Compare committed M11A closeout
        shell: pwsh
        run: |
          @'
          import json
          from pathlib import Path
          committed = json.loads(Path('ulga/reports/e4s_a1v1_m11a_authority_evidence_review_closeout.json').read_text(encoding='utf-8'))
          generated = json.loads(Path('generated/m11a/e4s_a1v1_m11a_authority_evidence_review_closeout.json').read_text(encoding='utf-8'))
          assert committed == generated, 'committed M11A closeout drift'
          '@ | python -
      - name: Upload metadata-only M11A closeout
        uses: actions/upload-artifact@v4
        with:
          name: m11a-authority-evidence-review-closeout
          path: generated/m11a
          if-no-files-found: error
          retention-days: 2
