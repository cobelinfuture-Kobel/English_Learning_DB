name: RAZ A-W Derived Schema Compatibility

on:
  pull_request:
    paths:
      - "ulga/builders/build_raz_aw_derived_schema_compatibility.py"
      - "tests/ulga/test_raz_aw_derived_schema_compatibility.py"
      - ".github/workflows/raz-aw-derived-schema-compatibility.yml"
  push:
    branches: [main]
    paths:
      - "ulga/builders/build_raz_aw_derived_schema_compatibility.py"
      - "tests/ulga/test_raz_aw_derived_schema_compatibility.py"
      - ".github/workflows/raz-aw-derived-schema-compatibility.yml"

permissions:
  contents: read

env:
  PYTHONHASHSEED: "0"

jobs:
  derived-schema-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install focused dependency
        run: python -m pip install pytest
      - name: Compile compatibility loader
        run: python -m py_compile ulga/builders/build_raz_aw_derived_schema_compatibility.py
      - name: Run focused regressions
        run: python -m pytest -q tests/ulga/test_raz_aw_derived_schema_compatibility.py
