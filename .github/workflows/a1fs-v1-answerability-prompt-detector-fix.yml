name: A1FS V1 Answerability Prompt Detector Fix

on:
  pull_request:
    paths:
      - ".github/workflows/a1fs-v1-answerability-prompt-detector-fix.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prompt-detector-fix:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/a1fs-v1-r5-stimulus-answerability-fullfix
          fetch-depth: 0
      - name: Remove ambiguous read verb from TEXT dependency inference
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          path = Path("ulga/builders/build_a1fs_v1_shared_learner_stimulus_contract_renderer.py")
          text = path.read_text(encoding="utf-8")
          old = r're.compile(r"\b(?:text|passage|paragraph|story|read(?:ing)?)\b", re.I),'
          new = r're.compile(r"\b(?:text|passage|paragraph|story)\b", re.I),'
          if text.count(old) != 1:
              raise SystemExit(f"prompt detector replacement drift:{text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          '@ | python -
          git diff --check
          if ($LASTEXITCODE -ne 0) { throw "git diff --check failed" }
      - name: Commit prompt detector precision fix
        shell: pwsh
        run: |
          $path = "ulga/builders/build_a1fs_v1_shared_learner_stimulus_contract_renderer.py"
          $changed = git status --porcelain -- $path
          if (-not $changed) { throw "Expected prompt detector change missing" }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- $path
          git commit -m "Refine learner stimulus prompt dependency inference"
          if ($LASTEXITCODE -ne 0) { throw "git commit failed" }
          git push origin HEAD:fix/a1fs-v1-r5-stimulus-answerability-fullfix
          if ($LASTEXITCODE -ne 0) { throw "git push failed" }
